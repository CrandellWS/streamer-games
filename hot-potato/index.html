<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Potato — Streamer Games</title>
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg2: #14141f;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.5);
  --danger: #ff4466;
  --success: #44ff88;
  --potato: #ff8c00;
  --potato-glow: rgba(255,140,0,0.6);
  --hot: #ff3300;
  --hot-glow: rgba(255,51,0,0.7);
  --panel-width: 360px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --bg2: #e8e8f0;
  --surface: #ffffff;
  --surface2: #f5f5fa;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-dim: #666680;
}

[data-theme="neon"] {
  --bg: #0a0a0a;
  --bg2: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #333333;
  --text: #ffffff;
  --text-dim: #888888;
  --accent: #00ffcc;
  --accent-glow: rgba(0,255,204,0.4);
  --gold: #ff00ff;
  --gold-glow: rgba(255,0,255,0.5);
  --potato: #ff6600;
  --potato-glow: rgba(255,102,0,0.7);
  --hot: #ff0000;
  --hot-glow: rgba(255,0,0,0.8);
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body.transparent-bg { background: transparent !important; }

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
}

#game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════════ */
#admin-panel {
  width: var(--panel-width);
  height: 100%;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  z-index: 100;
  flex-shrink: 0;
}

#admin-panel.hidden {
  transform: translateX(100%);
  opacity: 0;
  position: absolute;
  right: 0; top: 0;
  pointer-events: none;
}

#admin-toggle {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 200;
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#admin-toggle:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.panel-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.panel-header p {
  font-size: 12px;
  color: var(--text-dim);
}

.panel-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.panel-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Form Elements */
.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

input[type="text"], textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

textarea {
  resize: vertical;
  min-height: 70px;
  font-size: 12px;
  line-height: 1.6;
}

.btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover {
  filter: brightness(1.15);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-danger { color: var(--danger); border-color: rgba(255,68,102,0.3); }
.btn-danger:hover { background: rgba(255,68,102,0.1); border-color: var(--danger); }

.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-group { display: flex; gap: 8px; }

#start-btn {
  padding: 14px 24px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff6600, #ff3300);
  border: none;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 30px rgba(255,102,0,0.5);
  width: 100%;
  position: relative;
  overflow: hidden;
}
#start-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
#start-btn:hover::before { left: 100%; }
#start-btn:hover { filter: brightness(1.15); box-shadow: 0 8px 40px rgba(255,102,0,0.7); }
#start-btn:active { transform: scale(0.98); }
#start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Names list */
.name-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.name-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  transition: background 0.15s;
}
.name-item:hover { background: var(--surface2); }
.name-item .name-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.name-item .remove-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; line-height: 1;
  padding: 0 2px; transition: color 0.15s;
}
.name-item .remove-btn:hover { color: var(--danger); }

/* Speed selector */
.speed-group {
  display: flex;
  gap: 6px;
}
.speed-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.speed-btn:hover { border-color: var(--accent); color: var(--text); }
.speed-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Sound toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.toggle-label { font-size: 13px; color: var(--text-dim); }
.toggle-switch {
  width: 40px; height: 22px;
  background: var(--border);
  border-radius: 11px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  border: none;
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}
.toggle-switch.on::after { transform: translateX(18px); }

/* Status line */
#status-bar {
  padding: 12px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}
#status-dot.idle { background: var(--text-dim); }
#status-dot.running { background: var(--potato); animation: pulse-dot 0.5s infinite alternate; }
#status-dot.winner { background: var(--gold); }

@keyframes pulse-dot {
  from { opacity: 0.5; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1.2); }
}

/* ═══════════════════════════════════════════════
   GAME RING AREA
   ═══════════════════════════════════════════════ */
#ring-container {
  position: relative;
  width: 100%;
  height: 100%;
}

/* Player cards */
.player-card {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 120px;
  min-height: 52px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
              border-color 0.25s, box-shadow 0.25s,
              opacity 0.5s, filter 0.5s;
  cursor: default;
  z-index: 10;
  text-align: center;
}

.player-card .player-name {
  font-size: 13px;
  font-weight: 600;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}

.player-card .player-avatar {
  font-size: 22px;
  line-height: 1;
  margin-bottom: 2px;
}

.player-card.holding {
  border-color: var(--potato);
  box-shadow: 0 0 20px var(--potato-glow), 0 0 40px rgba(255,140,0,0.3);
  transform: translate(-50%, -50%) scale(1.15);
  z-index: 20;
  background: var(--surface2);
}

.player-card.holding.very-hot {
  border-color: var(--hot);
  box-shadow: 0 0 30px var(--hot-glow), 0 0 60px rgba(255,51,0,0.4);
  animation: shake-card 0.15s infinite;
}

.player-card.eliminated {
  opacity: 0.35;
  filter: grayscale(1);
  border-color: var(--border);
  box-shadow: none;
  transform: translate(-50%, -50%) scale(0.85);
  z-index: 5;
}

.player-card .elim-x {
  display: none;
  font-size: 20px;
  color: var(--danger);
  position: absolute;
  top: -8px; right: -8px;
  background: var(--bg);
  border-radius: 50%;
  width: 22px; height: 22px;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  line-height: 1;
  border: 1px solid var(--border);
}
.player-card.eliminated .elim-x { display: flex; }

.player-card.winner-card {
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(255,215,0,0.3);
  transform: translate(-50%, -50%) scale(1.2);
  z-index: 30;
  animation: winner-pulse 1s ease-in-out infinite alternate;
}

@keyframes winner-pulse {
  from { box-shadow: 0 0 20px var(--gold-glow); }
  to   { box-shadow: 0 0 50px var(--gold-glow), 0 0 100px rgba(255,215,0,0.2); }
}

@keyframes shake-card {
  0%   { transform: translate(calc(-50% - 2px), -50%) scale(1.15); }
  50%  { transform: translate(calc(-50% + 2px), -50%) scale(1.15); }
  100% { transform: translate(calc(-50% - 2px), -50%) scale(1.15); }
}

/* Crown badge */
.crown-badge {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  display: none;
  animation: crown-bounce 0.6s ease-in-out infinite alternate;
}
.winner-card .crown-badge { display: block; }

@keyframes crown-bounce {
  from { transform: translateX(-50%) translateY(0); }
  to   { transform: translateX(-50%) translateY(-4px); }
}

/* ═══════════════════════════════════════════════
   POTATO ELEMENT
   ═══════════════════════════════════════════════ */
#potato {
  position: absolute;
  font-size: 52px;
  line-height: 1;
  transform: translate(-50%, -50%);
  z-index: 50;
  pointer-events: none;
  filter: drop-shadow(0 0 12px var(--potato-glow));
  transition: left 0.15s ease-in-out, top 0.15s ease-in-out;
  will-change: left, top, filter;
}

#potato.very-hot {
  filter: drop-shadow(0 0 20px var(--hot-glow));
  animation: potato-flames 0.2s infinite alternate;
}

@keyframes potato-flames {
  from { transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
  to   { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); }
}

#potato.hidden { display: none; }

/* ═══════════════════════════════════════════════
   EXPLOSION
   ═══════════════════════════════════════════════ */
.explosion-particle {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  font-size: 20px;
  transform: translate(-50%, -50%);
  animation: particle-fly 0.8s ease-out forwards;
}

@keyframes particle-fly {
  0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
}

.explosion-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid var(--hot);
  transform: translate(-50%, -50%) scale(0);
  pointer-events: none;
  z-index: 99;
  animation: ring-expand 0.6s ease-out forwards;
}

@keyframes ring-expand {
  0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
}

/* ═══════════════════════════════════════════════
   FIREWORKS (winner)
   ═══════════════════════════════════════════════ */
.firework {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 80;
  animation: firework-burst 1.2s ease-out forwards;
}

@keyframes firework-burst {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(0); }
}

/* ═══════════════════════════════════════════════
   OVERLAYS
   ═══════════════════════════════════════════════ */
#idle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 60;
  pointer-events: none;
  gap: 16px;
}

.idle-title {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, var(--potato), var(--hot));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  filter: drop-shadow(0 0 20px rgba(255,140,0,0.5));
}

.idle-emoji {
  font-size: 80px;
  animation: float-potato 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--potato-glow));
}

@keyframes float-potato {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50%       { transform: translateY(-16px) rotate(5deg); }
}

.idle-hint {
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
}

#winner-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 70;
  pointer-events: none;
  gap: 12px;
  background: radial-gradient(circle at center, rgba(255,215,0,0.08) 0%, transparent 70%);
}

#winner-overlay.show { display: flex; }

.winner-title {
  font-size: clamp(20px, 3vw, 32px);
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 4px;
}

.winner-name {
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(255,215,0,0.3);
  text-align: center;
  max-width: 80%;
  word-break: break-word;
  animation: winner-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes winner-pop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.winner-emoji { font-size: 60px; }

/* Eliminated banner */
#elim-banner {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,68,102,0.15);
  border: 1px solid rgba(255,68,102,0.4);
  border-radius: 14px;
  padding: 10px 24px;
  font-size: 16px;
  font-weight: 700;
  color: var(--danger);
  z-index: 65;
  display: none;
  white-space: nowrap;
  backdrop-filter: blur(8px);
  animation: banner-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
#elim-banner.show { display: block; }

@keyframes banner-pop {
  from { transform: translateX(-50%) scale(0.8); opacity: 0; }
  to   { transform: translateX(-50%) scale(1); opacity: 1; }
}

/* Player count badge */
#player-count-badge {
  position: absolute;
  top: 16px;
  left: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--text-dim);
  z-index: 40;
  backdrop-filter: blur(8px);
  transition: all 0.3s;
}

/* Round indicator */
#round-badge {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--text-dim);
  z-index: 40;
  backdrop-filter: blur(8px);
  display: none;
}
#round-badge.show { display: block; }

/* Heat meter */
#heat-meter {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  z-index: 40;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
#heat-meter.show { display: flex; }
.heat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.heat-track {
  width: 100%;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.heat-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #ff8c00, #ff3300);
  transition: width 0.3s ease;
  width: 0%;
}
</style>
</head>
<body>
<div id="app">

  <!-- GAME AREA -->
  <div id="game-area">
    <div id="ring-container">

      <!-- Idle overlay -->
      <div id="idle-overlay">
        <div class="idle-emoji">🥔</div>
        <div class="idle-title">Hot Potato</div>
        <div class="idle-hint">Add players, then press Start (or Spacebar)</div>
      </div>

      <!-- Winner overlay -->
      <div id="winner-overlay">
        <div class="winner-emoji">🏆</div>
        <div class="winner-title">Winner!</div>
        <div class="winner-name" id="winner-name-display"></div>
      </div>

      <!-- Potato emoji -->
      <div id="potato" class="hidden">🥔</div>

      <!-- Elimination banner -->
      <div id="elim-banner"></div>

      <!-- Player count -->
      <div id="player-count-badge">0 players</div>

      <!-- Round badge -->
      <div id="round-badge">Round 1</div>

      <!-- Heat meter -->
      <div id="heat-meter">
        <div class="heat-label">🔥 Heat</div>
        <div class="heat-track"><div class="heat-fill" id="heat-fill"></div></div>
      </div>

    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel">
    <div class="panel-header">
      <h2>🥔 Hot Potato</h2>
      <p>Pass the potato — don't get caught!</p>
    </div>

    <div class="panel-scroll">
      <!-- Players section -->
      <div class="panel-section">
        <h3>Players (<span id="player-count">0</span>)</h3>
        <div class="input-group">
          <input type="text" id="name-input" placeholder="Add player name…" maxlength="32">
          <button class="btn btn-sm" id="add-btn">Add</button>
        </div>
        <div class="name-list" id="name-list"></div>
      </div>

      <!-- Bulk add -->
      <div class="panel-section">
        <h3>Bulk Add</h3>
        <textarea id="bulk-input" placeholder="One name per line…"></textarea>
        <div class="btn-group" style="margin-top:8px">
          <button class="btn btn-sm btn-block" id="bulk-btn">Add All</button>
          <button class="btn btn-sm btn-danger" id="clear-btn">Clear All</button>
        </div>
      </div>

      <!-- Speed -->
      <div class="panel-section">
        <h3>Starting Speed</h3>
        <div class="speed-group">
          <button class="speed-btn" data-speed="slow">🐢 Slow</button>
          <button class="speed-btn active" data-speed="normal">⚡ Normal</button>
          <button class="speed-btn" data-speed="fast">🔥 Fast</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="panel-section">
        <h3>Controls</h3>
        <div class="toggle-row">
          <span class="toggle-label">Sound</span>
          <button class="toggle-switch on" id="sound-toggle" title="Toggle sound"></button>
        </div>
        <button class="btn btn-block btn-primary" id="start-btn" style="margin-top:8px">
          🥔 Start Game (Space)
        </button>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <div id="status-dot" class="idle"></div>
      <span id="status-text">Waiting for players</span>
    </div>
  </div>

</div>

<!-- Gear toggle -->
<button id="admin-toggle" title="Toggle admin panel">⚙</button>

<script>
(function() {
'use strict';

/* ═══════════════════════════════════════════════
   CONSTANTS & CONFIG
   ═══════════════════════════════════════════════ */
const SPEED_CONFIG = {
  slow:   { startInterval: 1100, minInterval: 220, accelRate: 0.93 },
  normal: { startInterval: 800,  minInterval: 140, accelRate: 0.91 },
  fast:   { startInterval: 500,  minInterval: 100, accelRate: 0.88 }
};

const AVATARS = ['😀','😎','🤩','🥳','😏','🤠','🧐','😜','🤑','🥸','👽','🤖',
                 '🦊','🐼','🐸','🐱','🦁','🐯','🦄','🐺'];

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const state = {
  players: [],           // { name, avatar, el, alive }
  activePlayers: [],     // refs to alive players
  currentHolder: null,   // index into activePlayers
  gameRunning: false,
  passInterval: null,
  bombTimeout: null,
  currentInterval: 800,
  round: 1,
  selectedSpeed: 'normal',
  soundEnabled: true,
  adminVisible: true,
  theme: 'dark',
  heatLevel: 0           // 0–1, drives heat meter + visual
};

/* ═══════════════════════════════════════════════
   AUDIO ENGINE
   ═══════════════════════════════════════════════ */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function resumeAudio() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}

function playTick(speed) {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    // Higher freq ticking as it speeds up
    const freq = 200 + speed * 600;
    osc.frequency.setValueAtTime(Math.min(freq, 800), now);
    osc.type = 'square';
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    osc.start(now);
    osc.stop(now + 0.06);
  } catch(e) {}
}

function playSizzle() {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const bufLen = ctx.sampleRate * 0.3;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.setValueAtTime(4000, now);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start(now);
  } catch(e) {}
}

function playExplosion() {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    // Low boom
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(20, now + 0.6);
    gain.gain.setValueAtTime(0.6, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.6);
    // Noise burst
    const bufLen = ctx.sampleRate * 0.4;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / bufLen);
    const noiseSrc = ctx.createBufferSource();
    noiseSrc.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.5, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    noiseSrc.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noiseSrc.start(now);
  } catch(e) {}
}

function playWinner() {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047]; // C E G C
    notes.forEach((freq, i) => {
      const now = ctx.currentTime + i * 0.15;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.4);
    });
  } catch(e) {}
}

/* ═══════════════════════════════════════════════
   URL PARAMS & THEME
   ═══════════════════════════════════════════════ */
const params = new URLSearchParams(location.search);

function applyUrlParams() {
  // Theme
  const theme = params.get('theme') || 'dark';
  if (['dark','light','neon'].includes(theme)) {
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? '' : theme);
    if (theme !== 'dark') document.documentElement.setAttribute('data-theme', theme);
    state.theme = theme;
  }
  // Transparent background
  if (params.get('bg') === 'transparent') document.body.classList.add('transparent-bg');
  // Admin visibility
  if (params.get('admin') === 'false') hideAdmin();
  // Pre-load names
  const namesParam = params.get('names');
  if (namesParam) {
    namesParam.split(',').map(n => n.trim()).filter(Boolean).forEach(addPlayer);
  }
}

/* ═══════════════════════════════════════════════
   PLAYER MANAGEMENT
   ═══════════════════════════════════════════════ */
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function addPlayer(name) {
  name = name.trim().slice(0, 32);
  if (!name) return;
  if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) return;
  const avatar = AVATARS[state.players.length % AVATARS.length];
  const player = { name, avatar, el: null, alive: true };
  state.players.push(player);
  renderNameList();
  if (!state.gameRunning) layoutRing();
  updateCountBadge();
  updateStatus();
}

function removePlayer(name) {
  state.players = state.players.filter(p => p.name !== name);
  renderNameList();
  if (!state.gameRunning) layoutRing();
  updateCountBadge();
  updateStatus();
}

function clearPlayers() {
  if (state.gameRunning) return;
  state.players = [];
  renderNameList();
  layoutRing();
  updateCountBadge();
  updateStatus();
}

function renderNameList() {
  const list = document.getElementById('name-list');
  list.innerHTML = '';
  state.players.forEach(p => {
    const item = document.createElement('div');
    item.className = 'name-item';
    item.innerHTML = `<span class="player-avatar" style="font-size:14px">${p.avatar}</span>
      <span class="name-text">${escapeHtml(p.name)}</span>
      <button class="remove-btn" data-name="${escapeHtml(p.name)}" title="Remove">×</button>`;
    item.querySelector('.remove-btn').addEventListener('click', () => removePlayer(p.name));
    list.appendChild(item);
  });
  document.getElementById('player-count').textContent = state.players.length;
}

/* ═══════════════════════════════════════════════
   RING LAYOUT
   ═══════════════════════════════════════════════ */
function layoutRing() {
  const container = document.getElementById('ring-container');
  // Remove old player cards
  container.querySelectorAll('.player-card').forEach(el => el.remove());

  const W = container.clientWidth || window.innerWidth - (state.adminVisible ? 360 : 0);
  const H = container.clientHeight || window.innerHeight;
  const cx = W / 2;
  const cy = H / 2;
  const cardW = 120;
  const cardH = 60;
  const minRadius = 120;
  const maxRadius = Math.min(W, H) * 0.38;
  const n = state.players.length;
  const radius = n <= 1 ? 0 : Math.max(minRadius, Math.min(maxRadius, 80 + n * 24));

  state.players.forEach((p, i) => {
    const angle = n <= 1 ? -Math.PI / 2 : (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = n <= 1 ? cx : cx + radius * Math.cos(angle);
    const y = n <= 1 ? cy : cy + radius * Math.sin(angle);

    const card = document.createElement('div');
    card.className = 'player-card';
    card.dataset.name = p.name;
    card.innerHTML = `<div class="crown-badge">👑</div>
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${escapeHtml(p.name)}</div>
      <div class="elim-x">✕</div>`;

    card.style.left = x + 'px';
    card.style.top  = y + 'px';
    container.appendChild(card);
    p.el = card;
    p._x = x;
    p._y = y;

    if (!p.alive) {
      card.classList.add('eliminated');
    }
  });
}

function relayoutAlive() {
  // Re-position alive players in a new ring after elimination
  const container = document.getElementById('ring-container');
  const W = container.clientWidth || window.innerWidth - (state.adminVisible ? 360 : 0);
  const H = container.clientHeight || window.innerHeight;
  const cx = W / 2;
  const cy = H / 2;
  const alive = state.players.filter(p => p.alive);
  const n = alive.length;
  const maxRadius = Math.min(W, H) * 0.38;
  const radius = n <= 1 ? 0 : Math.max(120, Math.min(maxRadius, 80 + n * 28));

  alive.forEach((p, i) => {
    const angle = n <= 1 ? -Math.PI / 2 : (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = n <= 1 ? cx : cx + radius * Math.cos(angle);
    const y = n <= 1 ? cy : cy + radius * Math.sin(angle);
    p._x = x;
    p._y = y;
    p.el.style.transition = 'left 0.6s cubic-bezier(0.34,1.56,0.64,1), top 0.6s cubic-bezier(0.34,1.56,0.64,1), transform 0.3s, border-color 0.25s, box-shadow 0.25s, opacity 0.5s, filter 0.5s';
    p.el.style.left = x + 'px';
    p.el.style.top  = y + 'px';
  });

  // Reset transition after reposition
  setTimeout(() => {
    state.players.forEach(p => {
      if (p.el) p.el.style.transition = '';
    });
  }, 700);
}

/* ═══════════════════════════════════════════════
   POTATO POSITIONING
   ═══════════════════════════════════════════════ */
function movePotato(player) {
  const potato = document.getElementById('potato');
  potato.style.left = player._x + 'px';
  potato.style.top  = player._y + 'px';
}

/* ═══════════════════════════════════════════════
   GAME LOGIC
   ═══════════════════════════════════════════════ */
function startGame() {
  if (state.players.length < 2) {
    setStatus('Need at least 2 players!', 'idle');
    return;
  }
  resumeAudio();

  // Reset state
  state.players.forEach(p => {
    p.alive = true;
    if (p.el) {
      p.el.classList.remove('eliminated','winner-card','holding','very-hot');
    }
  });

  state.activePlayers = [...state.players];
  state.round = 1;
  state.gameRunning = true;
  state.heatLevel = 0;

  // Layout ring
  layoutRing();

  // Hide overlays
  document.getElementById('idle-overlay').style.display = 'none';
  document.getElementById('winner-overlay').classList.remove('show');
  hideElimBanner();

  // Show potato
  const potato = document.getElementById('potato');
  potato.classList.remove('hidden', 'very-hot');

  // Show heat + round badges
  document.getElementById('heat-meter').classList.add('show');
  document.getElementById('round-badge').classList.add('show');
  updateRoundBadge();

  // Pick random start holder
  state.currentHolder = Math.floor(Math.random() * state.activePlayers.length);
  setHolding(state.currentHolder);
  movePotato(state.activePlayers[state.currentHolder]);

  document.getElementById('status-dot').className = 'running';
  setStatus('Game in progress…');
  document.getElementById('start-btn').disabled = true;

  startRound();
}

function startRound() {
  const cfg = SPEED_CONFIG[state.selectedSpeed];
  state.currentInterval = cfg.startInterval;
  state.heatLevel = 0;
  updateHeat();
  clearTimers();
  scheduleBomb();
  schedulePass();
}

function scheduleBomb() {
  // Hidden random bomb timer: 5-20 seconds based on player count
  const alive = state.activePlayers.length;
  const minT = Math.max(4000, 3000 + alive * 600);
  const maxT = Math.max(12000, 6000 + alive * 1200);
  const bombTime = minT + Math.random() * (maxT - minT);
  state.bombTimeout = setTimeout(explodeOnHolder, bombTime);
}

function schedulePass() {
  const cfg = SPEED_CONFIG[state.selectedSpeed];
  state.passInterval = setInterval(() => {
    // Accelerate
    state.currentInterval = Math.max(cfg.minInterval, state.currentInterval * cfg.accelRate);
    // Update heat
    const range = cfg.startInterval - cfg.minInterval;
    state.heatLevel = Math.min(1, 1 - (state.currentInterval - cfg.minInterval) / range);
    updateHeat();
    // Sizzle when very hot
    if (state.heatLevel > 0.75) playSizzle();
    // Pass
    passToNext();
  }, Math.max(80, state.currentInterval));
}

function passToNext() {
  if (state.activePlayers.length < 2) return;
  // Remove holding class from current
  const prev = state.activePlayers[state.currentHolder];
  if (prev && prev.el) {
    prev.el.classList.remove('holding', 'very-hot');
  }
  // Pick random (not same)
  let next;
  do {
    next = Math.floor(Math.random() * state.activePlayers.length);
  } while (next === state.currentHolder && state.activePlayers.length > 1);

  state.currentHolder = next;
  setHolding(next);
  movePotato(state.activePlayers[next]);
  // Tick
  const speed = state.heatLevel;
  playTick(speed);
}

function setHolding(idx) {
  const player = state.activePlayers[idx];
  if (!player || !player.el) return;
  player.el.classList.add('holding');
  if (state.heatLevel > 0.75) {
    player.el.classList.add('very-hot');
    document.getElementById('potato').classList.add('very-hot');
  } else {
    player.el.classList.remove('very-hot');
    document.getElementById('potato').classList.remove('very-hot');
  }
}

function explodeOnHolder() {
  clearTimers();
  const holder = state.activePlayers[state.currentHolder];
  if (!holder) return;

  playExplosion();
  triggerExplosion(holder._x, holder._y);

  // Eliminate
  setTimeout(() => {
    eliminatePlayer(holder);
  }, 300);
}

function eliminatePlayer(player) {
  player.alive = false;
  if (player.el) {
    player.el.classList.remove('holding', 'very-hot');
    player.el.classList.add('eliminated');
  }
  // Remove from active
  state.activePlayers = state.activePlayers.filter(p => p !== player);

  // Announce elimination
  showElimBanner('💥 ' + escapeHtml(player.name) + ' is out!');
  postOut({ type: 'potato:eliminated', name: player.name });

  // Hide potato briefly
  document.getElementById('potato').classList.add('hidden');
  document.getElementById('potato').classList.remove('very-hot');

  state.round++;

  if (state.activePlayers.length <= 1) {
    // Winner!
    setTimeout(declareWinner, 800);
  } else {
    // Re-layout remaining players, then start next round
    setTimeout(() => {
      relayoutAlive();
      updateRoundBadge();
      setTimeout(() => {
        // Reset potato position
        state.currentHolder = Math.floor(Math.random() * state.activePlayers.length);
        const nextHolder = state.activePlayers[state.currentHolder];
        movePotato(nextHolder);
        document.getElementById('potato').classList.remove('hidden');
        setHolding(state.currentHolder);
        state.heatLevel = 0;
        updateHeat();
        hideElimBanner();
        setStatus('Round ' + state.round + ' — ' + state.activePlayers.length + ' players left');
        scheduleBomb();
        schedulePass();
      }, 700);
    }, 1200);
  }
}

function declareWinner() {
  const winner = state.activePlayers[0];
  state.gameRunning = false;
  clearTimers();

  document.getElementById('potato').classList.add('hidden');
  document.getElementById('heat-meter').classList.remove('show');
  hideElimBanner();

  if (winner) {
    if (winner.el) winner.el.classList.add('winner-card');
    document.getElementById('winner-name-display').textContent = winner.name;
    document.getElementById('winner-overlay').classList.add('show');
    spawnFireworks();
    playWinner();
    setStatus('🏆 Winner: ' + winner.name, 'winner');
    postOut({ type: 'potato:winner', winner: winner.name });
  }

  document.getElementById('start-btn').disabled = false;
  document.getElementById('status-dot').className = 'winner';
}

function resetGame() {
  clearTimers();
  state.gameRunning = false;
  state.players.forEach(p => { p.alive = true; });
  state.activePlayers = [];
  state.currentHolder = null;
  state.heatLevel = 0;

  document.getElementById('potato').classList.add('hidden');
  document.getElementById('potato').classList.remove('very-hot');
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('idle-overlay').style.display = '';
  document.getElementById('heat-meter').classList.remove('show');
  document.getElementById('round-badge').classList.remove('show');
  hideElimBanner();
  updateHeat();

  layoutRing();
  updateCountBadge();
  setStatus('Waiting for players', 'idle');
  document.getElementById('status-dot').className = 'idle';
  document.getElementById('start-btn').disabled = false;
}

function clearTimers() {
  if (state.passInterval) { clearInterval(state.passInterval); state.passInterval = null; }
  if (state.bombTimeout)  { clearTimeout(state.bombTimeout);  state.bombTimeout  = null; }
}

/* ═══════════════════════════════════════════════
   EXPLOSION & FIREWORKS
   ═══════════════════════════════════════════════ */
function triggerExplosion(x, y) {
  const container = document.getElementById('ring-container');
  const particles = ['💥','🔥','💫','✨','⚡','🌟'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'explosion-particle';
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.textContent = particles[i % particles.length];
    container.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
  // Ring
  const ring = document.createElement('div');
  ring.className = 'explosion-ring';
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  ring.style.width = '60px';
  ring.style.height = '60px';
  container.appendChild(ring);
  setTimeout(() => ring.remove(), 700);
}

function spawnFireworks() {
  const container = document.getElementById('ring-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const colors = ['#ffd700','#ff4466','#44ff88','#7c5cfc','#00ffcc','#ff8c00'];

  for (let burst = 0; burst < 6; burst++) {
    setTimeout(() => {
      const bx = 0.2 * W + Math.random() * 0.6 * W;
      const by = 0.2 * H + Math.random() * 0.5 * H;
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'firework';
        p.style.left = bx + 'px';
        p.style.top  = by + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        const angle = (i / 20) * Math.PI * 2;
        const dist = 60 + Math.random() * 100;
        p.style.setProperty('--fx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--fy', Math.sin(angle) * dist + 'px');
        container.appendChild(p);
        setTimeout(() => p.remove(), 1300);
      }
    }, burst * 250);
  }
}

/* ═══════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════ */
function updateCountBadge() {
  const n = state.players.length;
  document.getElementById('player-count-badge').textContent = n + ' player' + (n !== 1 ? 's' : '');
}

function updateRoundBadge() {
  const alive = state.activePlayers.length;
  document.getElementById('round-badge').textContent = 'Round ' + state.round + ' · ' + alive + ' left';
}

function updateHeat() {
  const pct = Math.round(state.heatLevel * 100);
  document.getElementById('heat-fill').style.width = pct + '%';
}

function setStatus(text, type) {
  document.getElementById('status-text').textContent = text;
  if (type) document.getElementById('status-dot').className = type;
}

function updateStatus() {
  const n = state.players.length;
  if (n === 0) setStatus('Waiting for players', 'idle');
  else if (n === 1) setStatus('Need at least 1 more player', 'idle');
  else if (!state.gameRunning) setStatus(n + ' players ready', 'idle');
}

function showElimBanner(html) {
  const b = document.getElementById('elim-banner');
  b.innerHTML = html;
  b.classList.add('show');
}

function hideElimBanner() {
  const b = document.getElementById('elim-banner');
  b.classList.remove('show');
}

function hideAdmin() {
  state.adminVisible = false;
  document.getElementById('admin-panel').classList.add('hidden');
}

function showAdmin() {
  state.adminVisible = true;
  document.getElementById('admin-panel').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════
   POSTMESSAGE
   ═══════════════════════════════════════════════ */
function postOut(msg) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(msg, '*');
  }
}

window.addEventListener('message', e => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  switch (d.type) {
    case 'potato:join':
      if (d.name) addPlayer(d.name);
      break;
    case 'potato:start':
      if (!state.gameRunning) startGame();
      break;
    case 'potato:eliminated':
      // External elimination (bot command)
      if (d.name) {
        const p = state.activePlayers.find(x => x.name === d.name);
        if (p && state.gameRunning) {
          clearTimers();
          triggerExplosion(p._x, p._y);
          setTimeout(() => eliminatePlayer(p), 300);
        }
      }
      break;
    case 'potato:winner':
      if (state.gameRunning) {
        clearTimers();
        declareWinner();
      }
      break;
    case 'potato:clear':
      resetGame();
      clearPlayers();
      break;
    case 'potato:names':
      postOut({ type: 'potato:names', names: state.players.map(p => p.name) });
      break;
  }
});

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════ */
document.getElementById('add-btn').addEventListener('click', () => {
  const input = document.getElementById('name-input');
  if (input.value.trim()) {
    addPlayer(input.value);
    input.value = '';
    input.focus();
  }
});

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('add-btn').click();
});

document.getElementById('bulk-btn').addEventListener('click', () => {
  const ta = document.getElementById('bulk-input');
  ta.value.split('\n').map(n => n.trim()).filter(Boolean).forEach(addPlayer);
  ta.value = '';
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (state.gameRunning) return;
  clearPlayers();
});

document.getElementById('start-btn').addEventListener('click', () => {
  resumeAudio();
  if (state.gameRunning) { resetGame(); } else { startGame(); }
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.gameRunning) return;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.selectedSpeed = btn.dataset.speed;
  });
});

document.getElementById('sound-toggle').addEventListener('click', function() {
  state.soundEnabled = !state.soundEnabled;
  this.classList.toggle('on', state.soundEnabled);
});

document.getElementById('admin-toggle').addEventListener('click', () => {
  if (state.adminVisible) hideAdmin(); else showAdmin();
  // Relayout after transition
  setTimeout(() => layoutRing(), 400);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    resumeAudio();
    if (state.gameRunning) { resetGame(); } else { startGame(); }
  }
});

// Resize handler
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!state.gameRunning) layoutRing();
    else relayoutAlive();
  }, 150);
});

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
applyUrlParams();
renderNameList();
updateCountBadge();
updateStatus();
layoutRing();

})();
</script>
</body>
</html>
