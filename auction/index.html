<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction Wars — Streamer Games</title>
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg2: #14141f;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.5);
  --danger: #ff4466;
  --success: #44ff88;
  --panel-width: 360px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --bg2: #e8e8f0;
  --surface: #fff;
  --surface2: #f5f5fa;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-dim: #666680;
}

[data-theme="neon"] {
  --bg: #0a0a0a;
  --bg2: #111;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #333;
  --text: #fff;
  --text-dim: #888;
  --accent: #00ffcc;
  --accent-glow: rgba(0,255,204,0.4);
  --gold: #ff00ff;
  --gold-glow: rgba(255,0,255,0.5);
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body.transparent-bg { background: transparent !important; }

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
}

#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 20px;
  gap: 16px;
}

/* ═══════════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════════ */
#admin-panel {
  width: var(--panel-width);
  height: 100%;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  z-index: 100;
  flex-shrink: 0;
}

#admin-panel.hidden {
  transform: translateX(100%);
  opacity: 0;
  position: absolute;
  right: 0; top: 0;
  pointer-events: none;
}

#admin-toggle {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 200;
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
}
#admin-toggle:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.panel-header h2 {
  font-size: 16px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 4px;
}
.panel-header p { font-size: 12px; color: var(--text-dim); }

.panel-section {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-section h3 {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dim); margin-bottom: 10px;
}

.panel-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Form Elements */
.input-group { display: flex; gap: 8px; margin-bottom: 8px; }

input[type="text"], input[type="number"] {
  width: 100%;
  padding: 9px 13px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.btn {
  padding: 9px 16px;
  min-height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { filter: brightness(1.15); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-2px); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #ffaa00);
  border-color: var(--gold); color: #1a1000;
  box-shadow: 0 4px 16px var(--gold-glow);
  font-size: 15px; font-weight: 800; letter-spacing: 0.5px;
}
.btn-gold:hover { filter: brightness(1.1); box-shadow: 0 6px 24px var(--gold-glow); transform: translateY(-2px); }

.btn-danger { color: var(--danger); border-color: rgba(255,68,102,0.3); }
.btn-danger:hover { background: rgba(255,68,102,0.1); border-color: var(--danger); }

.btn-sm { padding: 6px 11px; min-height: 36px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-group { display: flex; gap: 8px; }

/* ═══════════════════════════════════════════════
   BIDDER LIST IN ADMIN
   ═══════════════════════════════════════════════ */
#bidder-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 200px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.bidder-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: all 0.2s;
  font-size: 13px;
}
.bidder-row .bidder-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bidder-row .bidder-bal { color: var(--gold); font-weight: 700; font-size: 12px; }
.bidder-row.cannot-afford { opacity: 0.5; }
.bidder-row.leader { border-color: var(--gold); background: rgba(255,215,0,0.06); }

/* Timer buttons */
.timer-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.timer-btn {
  padding: 8px 12px; min-height: 40px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; justify-content: center;
}
.timer-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.timer-btn:hover { border-color: var(--accent); color: var(--text); }

/* ═══════════════════════════════════════════════
   MAIN DISPLAY — IDLE STATE
   ═══════════════════════════════════════════════ */
#idle-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; flex: 1; width: 100%; text-align: center;
}

.idle-gavel {
  font-size: 80px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 30px var(--gold-glow));
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-12px) rotate(5deg); }
}

.idle-title {
  font-size: 32px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.idle-sub { font-size: 14px; color: var(--text-dim); }

/* ═══════════════════════════════════════════════
   MAIN DISPLAY — AUCTION STATE
   ═══════════════════════════════════════════════ */
#auction-state {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%; height: 100%;
  gap: 12px;
  padding: 20px 20px 16px;
  overflow: hidden;
}
#auction-state.active { display: flex; }

/* Item Pedestal */
#item-pedestal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
  min-width: 300px;
  max-width: 480px;
  width: 100%;
  flex-shrink: 0;
  box-shadow: 0 0 60px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.3);
}
#item-pedestal::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
  pointer-events: none;
}

.spotlight {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,215,0,0.07) 0%, transparent 65%);
  pointer-events: none;
  border-radius: 24px;
}

#item-emoji {
  font-size: 64px;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 16px var(--gold-glow));
  animation: itemFloat 4s ease-in-out infinite;
}
@keyframes itemFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

#item-name {
  font-size: 22px; font-weight: 800; letter-spacing: 1px;
  color: var(--text); margin-bottom: 6px;
}
#item-starting {
  font-size: 13px; color: var(--text-dim);
}

/* Bid Display — HERO */
#bid-display {
  text-align: center;
  position: relative;
  flex-shrink: 0;
}

#bid-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; color: var(--text-dim); margin-bottom: 4px;
}

#current-bid-wrap {
  position: relative;
  display: inline-block;
}

#current-bid {
  font-size: 72px; font-weight: 900; line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(255,215,0,0.2);
  font-variant-numeric: tabular-nums;
  transition: color 0.15s;
  position: relative;
}

/* Animated coins flying up */
#bid-particles {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}

#current-bid.flash {
  animation: bidFlash 0.4s ease;
}
@keyframes bidFlash {
  0%   { color: var(--accent); text-shadow: 0 0 60px var(--accent-glow), 0 0 120px var(--accent-glow); transform: scale(1.08); }
  60%  { color: var(--gold); text-shadow: 0 0 50px var(--gold-glow); transform: scale(1.03); }
  100% { color: var(--gold); text-shadow: 0 0 40px var(--gold-glow); transform: scale(1); }
}

#bid-coins {
  font-size: 16px; color: var(--gold); letter-spacing: 4px;
  margin-top: 2px;
}

#current-leader {
  font-size: 18px; font-weight: 700;
  color: var(--text);
  margin-top: 4px;
  min-height: 28px;
}
#current-leader .leader-crown { color: var(--gold); margin-right: 6px; }
#current-leader .leader-name {
  background: linear-gradient(135deg, var(--gold), #ffaa00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* Going once/twice text */
#going-text {
  font-size: 20px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 2px; color: var(--danger);
  min-height: 30px; text-align: center;
  opacity: 0; transition: opacity 0.3s;
  text-shadow: 0 0 20px rgba(255,68,102,0.5);
}
#going-text.show { opacity: 1; animation: goingPulse 0.6s ease; }
@keyframes goingPulse {
  0% { transform: scale(0.9); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Timer */
#timer-wrap {
  position: relative;
  width: 88px; height: 88px;
  flex-shrink: 0;
}
#timer-svg {
  width: 88px; height: 88px;
  transform: rotate(-90deg);
}
#timer-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
#timer-arc {
  fill: none; stroke: var(--success);
  stroke-width: 6; stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
}
#timer-num {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px; font-weight: 900; font-variant-numeric: tabular-nums;
  color: var(--text);
}

/* Bid History */
#bid-history-wrap {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  flex: 1;
  min-height: 0;
  display: flex; flex-direction: column;
}
#bid-history-wrap h4 {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-dim);
  padding: 10px 16px 8px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#bid-history {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  padding: 6px 0;
}

.bid-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 16px;
  font-size: 13px;
  border-bottom: 1px solid rgba(42,42,74,0.4);
  animation: slideInBid 0.3s cubic-bezier(0.2, 0.8, 0.4, 1) both;
  position: relative;
  overflow: hidden;
}
.bid-entry::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent);
  opacity: 0; transition: opacity 0.3s;
}
.bid-entry.new-bid::before { opacity: 1; }
@keyframes slideInBid {
  from { opacity: 0; transform: translateY(-100%) scaleY(0.7); max-height: 0; }
  to   { opacity: 1; transform: translateY(0) scaleY(1); max-height: 60px; }
}
.bid-entry .be-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bid-entry .be-amount { font-weight: 800; color: var(--gold); font-size: 14px; }
.bid-entry .be-coin { font-size: 14px; }
.bid-entry.top-bid .be-name { color: var(--gold); }

/* ═══════════════════════════════════════════════
   GAVEL OVERLAY
   ═══════════════════════════════════════════════ */
#gavel-overlay {
  position: fixed; inset: 0;
  z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  pointer-events: none;
  opacity: 0;
}
#gavel-overlay.show { animation: gavelShow 2.5s ease forwards; }
@keyframes gavelShow {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

#gavel-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,215,0,0.18) 0%, rgba(0,0,0,0.7) 70%);
}

#gavel-emoji {
  font-size: 100px;
  position: relative; z-index: 1;
  filter: drop-shadow(0 0 40px var(--gold-glow));
  transform-origin: top right;
}
#gavel-overlay.show #gavel-emoji { animation: gavelSlam 0.5s cubic-bezier(0.2, 0, 0.8, 1.2) 0.1s both; }
@keyframes gavelSlam {
  0%  { transform: rotate(-70deg) scale(1.4); }
  70% { transform: rotate(10deg) scale(1.0); }
  85% { transform: rotate(-5deg) scale(1.0); }
  100%{ transform: rotate(0deg) scale(1.0); }
}

#sold-banner {
  position: relative; z-index: 1;
  font-size: 56px; font-weight: 900; letter-spacing: 8px; text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold), #ffaa00, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 4px 20px var(--gold-glow));
  opacity: 0;
}
#gavel-overlay.show #sold-banner { animation: soldBanner 2.5s ease 0.35s both; }
@keyframes soldBanner {
  0%   { opacity: 0; transform: scale(0.4) rotateX(40deg); }
  20%  { opacity: 1; transform: scale(1.08) rotateX(0); }
  80%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

#sold-detail {
  position: relative; z-index: 1;
  text-align: center; color: var(--text);
  font-size: 18px; font-weight: 600;
  opacity: 0;
}
#gavel-overlay.show #sold-detail { animation: soldDetail 2.5s ease 0.5s both; }
@keyframes soldDetail {
  0%   { opacity: 0; transform: translateY(10px); }
  20%  { opacity: 1; transform: translateY(0); }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* Screen flash */
#screen-flash {
  position: fixed; inset: 0; z-index: 499;
  background: rgba(255,215,0,0.3);
  opacity: 0; pointer-events: none;
}
#screen-flash.flash { animation: screenFlash 0.3s ease; }
@keyframes screenFlash {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* ═══════════════════════════════════════════════
   BIDDER BALANCES SIDEBAR (left strip)
   ═══════════════════════════════════════════════ */
#balances-sidebar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 180px;
  background: rgba(20,20,31,0.85);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(8px);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 50;
}
#balances-sidebar.open { transform: translateX(0); }
#balances-sidebar h4 {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-dim);
  padding: 12px 12px 8px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#balances-list {
  flex: 1; overflow-y: auto; padding: 6px 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.bal-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; font-size: 12px;
  transition: opacity 0.2s;
}
.bal-row .bal-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.bal-row .bal-amt { color: var(--gold); font-weight: 700; }
.bal-row.cannot-afford { opacity: 0.4; }
.bal-row.leader { color: var(--gold); }

/* ═══════════════════════════════════════════════
   ROUND TRACKER
   ═══════════════════════════════════════════════ */
#round-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 700;
  color: var(--text-dim); z-index: 10;
  transition: all 0.3s;
}

/* ═══════════════════════════════════════════════
   COIN PARTICLE ANIMATION
   ═══════════════════════════════════════════════ */
.coin-particle {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  z-index: 400;
  animation: coinFly 0.8s ease-out forwards;
}
@keyframes coinFly {
  0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(360deg); opacity: 0; }
}

/* ═══════════════════════════════════════════════
   THEME SWITCH (bottom-left of panel)
   ═══════════════════════════════════════════════ */
.theme-row { display: flex; gap: 6px; }
.theme-btn {
  flex: 1; padding: 10px 0; min-height: 40px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center;
  display: inline-flex; align-items: center; justify-content: center;
}
.theme-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.theme-btn:hover { border-color: var(--accent); }

/* ═══════════════════════════════════════════════
   STATUS BAR
   ═══════════════════════════════════════════════ */
#status-bar {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border);
  padding: 5px 14px; border-radius: 20px;
  opacity: 0; transition: opacity 0.3s;
  z-index: 10; white-space: nowrap;
}
#status-bar.show { opacity: 1; }
</style>
</head>
<body>

<!-- Screen Flash -->
<div id="screen-flash"></div>

<!-- Gavel Overlay -->
<div id="gavel-overlay">
  <div id="gavel-bg"></div>
  <div id="gavel-emoji">🔨</div>
  <div id="sold-banner">SOLD!</div>
  <div id="sold-detail"></div>
</div>

<!-- Admin Toggle -->
<button id="admin-toggle" title="Admin Panel (⚙)">⚙</button>

<div id="app">

  <!-- ── MAIN AREA ── -->
  <div id="main-area">

    <div id="round-badge">Round 1</div>

    <!-- Balances Sidebar -->
    <div id="balances-sidebar">
      <h4>💰 Balances</h4>
      <div id="balances-list"></div>
    </div>

    <!-- IDLE -->
    <div id="idle-state">
      <div class="idle-gavel">🔨</div>
      <div class="idle-title">Auction Wars</div>
      <div class="idle-sub">List an item in the admin panel to begin</div>
    </div>

    <!-- AUCTION -->
    <div id="auction-state">

      <!-- Item Pedestal -->
      <div id="item-pedestal">
        <div class="spotlight"></div>
        <span id="item-emoji">💎</span>
        <div id="item-name">Diamond Ring</div>
        <div id="item-starting">Starting bid: 100 coins</div>
      </div>

      <!-- Bid Hero -->
      <div id="bid-display">
        <div id="bid-label">Current Bid</div>
        <div id="current-bid-wrap">
          <div id="current-bid">0</div>
          <canvas id="bid-particles" width="300" height="100" style="position:absolute;top:-40px;left:-75px;pointer-events:none;"></canvas>
        </div>
        <div id="bid-coins">🪙🪙🪙</div>
        <div id="current-leader"><span class="leader-crown">👑</span><span class="leader-name" id="leader-name-text">—</span></div>
        <div id="going-text"></div>
      </div>

      <!-- Timer -->
      <div id="timer-wrap">
        <svg id="timer-svg" viewBox="0 0 88 88">
          <circle id="timer-bg" cx="44" cy="44" r="38"/>
          <circle id="timer-arc" cx="44" cy="44" r="38"/>
        </svg>
        <div id="timer-num">—</div>
      </div>

      <!-- Bid History -->
      <div id="bid-history-wrap">
        <h4>📋 Bid History</h4>
        <div id="bid-history"></div>
      </div>

    </div><!-- /auction-state -->

    <div id="status-bar"></div>

  </div><!-- /main-area -->

  <!-- ── ADMIN PANEL ── -->
  <div id="admin-panel">
    <div class="panel-header">
      <h2>🔨 Auction Wars</h2>
      <p>Host controls — add bidders, list items, run auction</p>
    </div>

    <div class="panel-scroll">

      <!-- Bidders -->
      <div class="panel-section">
        <h3>Bidders</h3>
        <div class="input-group">
          <input type="text" id="add-name-input" placeholder="Bidder name" style="flex:1">
          <input type="number" id="add-bal-input" placeholder="1000" style="width:80px" min="0">
          <button class="btn btn-primary btn-sm" id="add-bidder-btn">Add</button>
        </div>
        <div id="bidder-list"></div>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn btn-sm btn-block" id="reset-bal-btn">↺ Reset Balances</button>
          <button class="btn btn-sm btn-danger" id="clear-bidders-btn">✕ Clear All</button>
        </div>
      </div>

      <!-- Item Setup -->
      <div class="panel-section">
        <h3>Current Item</h3>
        <div class="input-group">
          <input type="text" id="item-name-input" placeholder="Item name" style="flex:1">
          <input type="text" id="item-emoji-input" placeholder="💎" style="width:56px;text-align:center;font-size:18px">
        </div>
        <div class="input-group">
          <input type="number" id="item-start-input" placeholder="Starting bid (100)" style="flex:1" min="0">
          <input type="number" id="item-min-inc-input" placeholder="Min +10" style="width:80px" min="1">
        </div>
        <button class="btn btn-primary btn-block" id="list-item-btn" style="margin-top:4px">
          🏷️ List Item
        </button>
      </div>

      <!-- Timer -->
      <div class="panel-section">
        <h3>Timer</h3>
        <div class="timer-btns">
          <button class="timer-btn" data-t="30">30s</button>
          <button class="timer-btn active" data-t="60">60s</button>
          <button class="timer-btn" data-t="90">90s</button>
          <button class="timer-btn" data-t="0">∞</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="panel-section">
        <h3>Actions</h3>
        <button class="btn btn-gold btn-block" id="sold-btn" style="margin-bottom:8px" disabled>
          🔨 SOLD! (Spacebar)
        </button>
        <div class="btn-group">
          <button class="btn btn-sm btn-block" id="pause-btn" disabled>⏸ Pause</button>
          <button class="btn btn-sm btn-danger btn-block" id="cancel-btn" disabled>✕ Cancel</button>
        </div>
      </div>

      <!-- Sound -->
      <div class="panel-section">
        <h3>Options</h3>
        <div class="btn-group" style="margin-bottom:10px">
          <button class="btn btn-sm" id="sound-btn" style="flex:1">🔊 Sound On</button>
          <button class="btn btn-sm" id="sidebar-btn" style="flex:1">👁 Balances</button>
        </div>
        <div class="theme-row">
          <button class="theme-btn active" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="neon">Neon</button>
        </div>
      </div>

      <!-- Outbound log -->
      <div class="panel-section">
        <h3>postMessage Log</h3>
        <div id="msg-log" style="font-size:11px;color:var(--text-dim);max-height:100px;overflow-y:auto;font-family:monospace;line-height:1.7;scrollbar-width:thin;scrollbar-color:var(--border) transparent;"></div>
      </div>

    </div><!-- /panel-scroll -->
  </div><!-- /admin-panel -->

</div><!-- /app -->

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════
  const S = {
    bidders: [],       // {name, balance, startBalance}
    auction: null,     // null | {item, emoji, startBid, minInc, currentBid, leader, startTime}
    timerSec: 60,      // 0 = no timer
    timerRemain: 0,
    timerInterval: null,
    timerPaused: false,
    round: 1,
    soundOn: true,
    sidebarOpen: false,
    bidHistory: [],    // [{name, amount}]
    goingState: 0,     // 0=none, 1=once, 2=twice
  };

  // ═══════════════════════════════════════════════
  //  URL PARAMS
  // ═══════════════════════════════════════════════
  (function initParams() {
    const p = new URLSearchParams(location.search);

    const theme = p.get('theme') || 'dark';
    document.documentElement.dataset.theme = theme;
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === theme);
    });

    if (p.get('bg') === 'transparent') document.body.classList.add('transparent-bg');

    if (p.get('admin') === 'false') {
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('admin-toggle').style.display = 'none';
    }

    const names = p.get('names');
    const startBal = parseInt(p.get('balance') || '1000', 10);
    if (names) {
      names.split(',').forEach(n => {
        const name = esc(n.trim());
        if (name) addBidder(name, startBal);
      });
    }
  })();

  // ═══════════════════════════════════════════════
  //  DOM REFS
  // ═══════════════════════════════════════════════
  const $ = id => document.getElementById(id);
  const DOM = {
    adminPanel:      $('admin-panel'),
    adminToggle:     $('admin-toggle'),
    idleState:       $('idle-state'),
    auctionState:    $('auction-state'),
    itemEmoji:       $('item-emoji'),
    itemName:        $('item-name'),
    itemStarting:    $('item-starting'),
    currentBid:      $('current-bid'),
    leaderName:      $('leader-name-text'),
    goingText:       $('going-text'),
    timerWrap:       $('timer-wrap'),
    timerArc:        $('timer-arc'),
    timerNum:        $('timer-num'),
    bidHistory:      $('bid-history'),
    bidderList:      $('bidder-list'),
    balancesList:    $('balances-list'),
    balancesSidebar: $('balances-sidebar'),
    roundBadge:      $('round-badge'),
    gavelOverlay:    $('gavel-overlay'),
    soldDetail:      $('sold-detail'),
    screenFlash:     $('screen-flash'),
    statusBar:       $('status-bar'),
    msgLog:          $('msg-log'),
    soldBtn:         $('sold-btn'),
    pauseBtn:        $('pause-btn'),
    cancelBtn:       $('cancel-btn'),
    soundBtn:        $('sound-btn'),
    sidebarBtn:      $('sidebar-btn'),
    addNameInput:    $('add-name-input'),
    addBalInput:     $('add-bal-input'),
    itemNameInput:   $('item-name-input'),
    itemEmojiInput:  $('item-emoji-input'),
    itemStartInput:  $('item-start-input'),
    itemMinIncInput: $('item-min-inc-input'),
  };

  // Timer arc circumference
  const CIRC = 2 * Math.PI * 38;
  DOM.timerArc.style.strokeDasharray = CIRC;
  DOM.timerArc.style.strokeDashoffset = 0;

  // ═══════════════════════════════════════════════
  //  UTILS
  // ═══════════════════════════════════════════════
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmt(n) {
    return Number(n).toLocaleString();
  }

  function statusMsg(msg, dur = 2500) {
    DOM.statusBar.textContent = msg;
    DOM.statusBar.classList.add('show');
    clearTimeout(statusMsg._t);
    statusMsg._t = setTimeout(() => DOM.statusBar.classList.remove('show'), dur);
  }

  function logMsg(dir, type, data) {
    const line = document.createElement('div');
    line.style.color = dir === 'IN' ? 'var(--success)' : 'var(--accent)';
    line.textContent = `[${dir}] ${type}: ${JSON.stringify(data)}`;
    DOM.msgLog.prepend(line);
    if (DOM.msgLog.children.length > 30) DOM.msgLog.lastChild.remove();
  }

  // ═══════════════════════════════════════════════
  //  BIDDER MANAGEMENT
  // ═══════════════════════════════════════════════
  function addBidder(name, balance) {
    const safeName = esc(name);
    if (!safeName) return;
    if (S.bidders.find(b => b.name === safeName)) {
      statusMsg(`${safeName} is already in the list`);
      return;
    }
    const bal = Math.max(0, isNaN(balance) ? 1000 : Number(balance));
    S.bidders.push({ name: safeName, balance: bal, startBalance: bal });
    renderBidderList();
    renderBalancesSidebar();
    saveState();
  }

  function removeBidder(name) {
    S.bidders = S.bidders.filter(b => b.name !== name);
    renderBidderList();
    renderBalancesSidebar();
    saveState();
  }

  function resetBalances() {
    S.bidders.forEach(b => b.balance = b.startBalance);
    renderBidderList();
    renderBalancesSidebar();
    statusMsg('Balances reset');
  }

  function renderBidderList() {
    DOM.bidderList.innerHTML = '';
    const curBid = S.auction ? S.auction.currentBid : 0;
    S.bidders.forEach(b => {
      const row = document.createElement('div');
      row.className = 'bidder-row';
      const canAfford = b.balance > curBid;
      const isLeader = S.auction && S.auction.leader === b.name;
      if (!canAfford) row.classList.add('cannot-afford');
      if (isLeader) row.classList.add('leader');
      row.innerHTML = `
        <span class="bidder-name">${b.name}</span>
        <span class="bidder-bal">🪙${fmt(b.balance)}</span>
        <button class="btn btn-sm btn-danger" data-remove="${b.name}" title="Remove">✕</button>
      `;
      DOM.bidderList.appendChild(row);
    });
    DOM.bidderList.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        removeBidder(btn.dataset.remove);
      });
    });
  }

  function renderBalancesSidebar() {
    DOM.balancesList.innerHTML = '';
    const curBid = S.auction ? S.auction.currentBid : 0;
    S.bidders.forEach(b => {
      const row = document.createElement('div');
      row.className = 'bal-row';
      if (b.balance <= curBid) row.classList.add('cannot-afford');
      if (S.auction && S.auction.leader === b.name) row.classList.add('leader');
      row.innerHTML = `
        <span class="bal-name">${b.name}</span>
        <span class="bal-amt">${fmt(b.balance)}</span>
      `;
      DOM.balancesList.appendChild(row);
    });
  }

  // ═══════════════════════════════════════════════
  //  AUCTION CORE
  // ═══════════════════════════════════════════════
  function listItem(itemName, emoji, startBid, minInc) {
    if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
    S.bidHistory = [];
    DOM.bidHistory.innerHTML = '';
    S.goingState = 0;
    DOM.goingText.className = '';
    DOM.goingText.textContent = '';

    const start = Math.max(0, isNaN(startBid) ? 100 : Number(startBid));
    const inc   = Math.max(1, isNaN(minInc) ? 10 : Number(minInc));

    S.auction = {
      item: esc(itemName || 'Mystery Item'),
      emoji: emoji || '💎',
      startBid: start,
      minInc: inc,
      currentBid: start,
      leader: null,
      startTime: Date.now(),
    };

    // Update DOM
    DOM.itemEmoji.textContent = S.auction.emoji;
    DOM.itemName.textContent = S.auction.item;
    DOM.itemStarting.textContent = `Starting bid: ${fmt(start)} coins · Min increment: ${fmt(inc)}`;
    setDisplayBid(start, null, false);

    DOM.idleState.style.display = 'none';
    DOM.auctionState.classList.add('active');

    DOM.soldBtn.disabled = false;
    DOM.pauseBtn.disabled = false;
    DOM.cancelBtn.disabled = false;

    // Timer
    if (S.timerSec > 0) {
      S.timerRemain = S.timerSec;
      S.timerPaused = false;
      updateTimerDisplay();
      S.timerInterval = setInterval(tickTimer, 1000);
    } else {
      DOM.timerNum.textContent = '∞';
      DOM.timerArc.style.strokeDashoffset = 0;
      DOM.timerArc.style.stroke = 'var(--success)';
    }

    renderBidderList();
    renderBalancesSidebar();
    statusMsg(`"${S.auction.item}" is now up for auction!`);
  }

  function setDisplayBid(amount, leader, animate) {
    // Roll-up animation
    if (animate) {
      animateBidNumber(amount);
      spawnCoinParticles();
    } else {
      DOM.currentBid.textContent = fmt(amount);
    }

    if (leader) {
      DOM.leaderName.textContent = leader;
      DOM.currentBid.parentElement.previousElementSibling.textContent = 'Current Bid';
    } else {
      DOM.leaderName.textContent = '—';
    }

    renderBidderList();
    renderBalancesSidebar();
  }

  // ── Number Roll-Up Animation ──
  function animateBidNumber(target) {
    const startVal = parseInt(DOM.currentBid.textContent.replace(/,/g,''), 10) || 0;
    const diff = target - startVal;
    const dur = Math.min(600, Math.max(200, Math.abs(diff) * 0.5));
    const start = performance.now();

    DOM.currentBid.classList.remove('flash');
    void DOM.currentBid.offsetWidth; // reflow
    DOM.currentBid.classList.add('flash');

    function step(now) {
      const t = Math.min(1, (now - start) / dur);
      const ease = 1 - Math.pow(1 - t, 3); // ease-out-cubic
      const cur = Math.round(startVal + diff * ease);
      DOM.currentBid.textContent = fmt(cur);
      if (t < 1) requestAnimationFrame(step);
      else DOM.currentBid.textContent = fmt(target);
    }
    requestAnimationFrame(step);
  }

  // ── Coin Particles ──
  function spawnCoinParticles() {
    const wrap = DOM.currentBid.getBoundingClientRect();
    const cx = wrap.left + wrap.width / 2;
    const cy = wrap.top + wrap.height / 2;
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('div');
      el.className = 'coin-particle';
      el.textContent = '🪙';
      const angle = (i / 6) * 2 * Math.PI - Math.PI / 2 + (Math.random() - 0.5);
      const dist = 50 + Math.random() * 60;
      el.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      el.style.setProperty('--dy', `${Math.sin(angle) * dist - 30}px`);
      el.style.left = cx + 'px';
      el.style.top  = cy + 'px';
      el.style.animationDelay = (i * 40) + 'ms';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }
  }

  function placeBid(name, amount) {
    if (!S.auction) return { ok: false, reason: 'No auction active' };
    const safeName = esc(name);
    const bidder = S.bidders.find(b => b.name === safeName);
    if (!bidder) return { ok: false, reason: 'Bidder not found' };

    const minBid = S.auction.currentBid + (S.auction.leader ? S.auction.minInc : 0);
    if (amount < minBid) return { ok: false, reason: `Bid too low (min: ${minBid})` };
    if (amount > bidder.balance) return { ok: false, reason: 'Insufficient balance' };

    S.auction.currentBid = amount;
    S.auction.leader = safeName;
    S.goingState = 0;
    DOM.goingText.className = '';
    DOM.goingText.textContent = '';

    // Reset timer on new bid
    if (S.timerSec > 0 && !S.timerPaused) {
      S.timerRemain = S.timerSec;
    }

    setDisplayBid(amount, safeName, true);

    // Bid history
    S.bidHistory.unshift({ name: safeName, amount });
    addBidHistoryEntry(safeName, amount, true);

    // Audio
    playSound('bid');

    // Outbound
    const msg = { type: 'auction:bid', name: safeName, amount, newLeader: safeName };
    emitMessage(msg);
    logMsg('OUT', 'auction:bid', msg);

    statusMsg(`${safeName} bids ${fmt(amount)} coins!`);
    return { ok: true };
  }

  function addBidHistoryEntry(name, amount, isTop) {
    const el = document.createElement('div');
    el.className = 'bid-entry new-bid' + (isTop ? ' top-bid' : '');
    el.innerHTML = `
      <span class="be-coin">🪙</span>
      <span class="be-name">${name}</span>
      <span class="be-amount">${fmt(amount)}</span>
    `;
    DOM.bidHistory.prepend(el);
    // Keep max 50 entries
    while (DOM.bidHistory.children.length > 50) DOM.bidHistory.lastChild.remove();
    // Remove "new-bid" after animation
    setTimeout(() => el.classList.remove('new-bid'), 500);
  }

  // ── Timer ──
  function tickTimer() {
    if (S.timerPaused) return;
    S.timerRemain--;
    updateTimerDisplay();

    // Going once/twice logic
    if (S.timerRemain === Math.floor(S.timerSec * 0.25) && S.auction.leader) {
      setGoingState(1);
    }
    if (S.timerRemain === Math.floor(S.timerSec * 0.12) && S.auction.leader) {
      setGoingState(2);
    }

    if (S.timerRemain <= 0) {
      clearInterval(S.timerInterval);
      S.timerInterval = null;
      if (S.auction) triggerSold();
    }
  }

  function updateTimerDisplay() {
    const total = S.timerSec;
    const remain = S.timerRemain;
    const pct = total > 0 ? remain / total : 1;

    DOM.timerNum.textContent = remain;
    DOM.timerArc.style.strokeDashoffset = CIRC * (1 - pct);

    // Color: green → yellow → red
    if (pct > 0.5) {
      DOM.timerArc.style.stroke = 'var(--success)';
    } else if (pct > 0.25) {
      DOM.timerArc.style.stroke = 'var(--gold)';
    } else {
      DOM.timerArc.style.stroke = 'var(--danger)';
    }
  }

  function setGoingState(n) {
    if (S.goingState >= n) return;
    S.goingState = n;
    const texts = ['', 'Going once...', 'Going twice...'];
    DOM.goingText.textContent = texts[n];
    DOM.goingText.className = 'show';
    playSound('going');
  }

  function togglePause() {
    if (!S.auction) return;
    S.timerPaused = !S.timerPaused;
    DOM.pauseBtn.textContent = S.timerPaused ? '▶ Resume' : '⏸ Pause';
    statusMsg(S.timerPaused ? 'Timer paused' : 'Timer resumed');
  }

  function cancelAuction() {
    if (!S.auction) return;
    clearInterval(S.timerInterval); S.timerInterval = null;
    S.auction = null;
    endAuctionUI();
    statusMsg('Auction cancelled');
  }

  function triggerSold() {
    if (!S.auction) return;
    clearInterval(S.timerInterval); S.timerInterval = null;

    const { item, emoji, currentBid, leader } = S.auction;

    if (leader) {
      // Deduct balance
      const bidder = S.bidders.find(b => b.name === leader);
      if (bidder) bidder.balance -= currentBid;
    }

    // Show gavel overlay
    DOM.soldDetail.innerHTML = leader
      ? `${emoji} <strong>${item}</strong> sold to <strong>${leader}</strong> for <strong>${fmt(currentBid)} coins</strong>`
      : `${emoji} <strong>${item}</strong> — No bids received`;

    DOM.gavelOverlay.classList.remove('show');
    void DOM.gavelOverlay.offsetWidth;
    DOM.gavelOverlay.classList.add('show');

    // Screen flash
    DOM.screenFlash.classList.remove('flash');
    void DOM.screenFlash.offsetWidth;
    DOM.screenFlash.classList.add('flash');

    // Audio
    playSound('sold');

    // Outbound
    if (leader) {
      const msg = { type: 'auction:winner', winner: leader, item, amount: currentBid };
      emitMessage(msg);
      logMsg('OUT', 'auction:winner', msg);
    }

    // Emit balances
    emitBalances();

    S.round++;
    S.auction = null;
    setTimeout(endAuctionUI, 2500);
  }

  function endAuctionUI() {
    DOM.auctionState.classList.remove('active');
    DOM.idleState.style.display = '';
    DOM.soldBtn.disabled = true;
    DOM.pauseBtn.disabled = true;
    DOM.cancelBtn.disabled = true;
    DOM.pauseBtn.textContent = '⏸ Pause';
    DOM.roundBadge.textContent = `Round ${S.round}`;
    renderBidderList();
    renderBalancesSidebar();
  }

  function emitBalances() {
    const msg = {
      type: 'auction:balances',
      balances: S.bidders.map(b => ({ name: b.name, balance: b.balance }))
    };
    emitMessage(msg);
    logMsg('OUT', 'auction:balances', msg);
  }

  // ═══════════════════════════════════════════════
  //  postMessage I/O
  // ═══════════════════════════════════════════════
  window.addEventListener('message', function(e) {
    const d = e.data;
    if (!d || !d.type || !d.type.startsWith('auction:')) return;
    logMsg('IN', d.type, d);

    if (d.type === 'auction:bid') {
      if (d.name && d.amount !== undefined) placeBid(d.name, Number(d.amount));
    }
    else if (d.type === 'auction:item') {
      listItem(d.name, d.emoji, d.startBid, d.minInc);
    }
    else if (d.type === 'auction:sold') {
      triggerSold();
    }
    else if (d.type === 'auction:join') {
      addBidder(d.name, d.balance !== undefined ? d.balance : 1000);
    }
    else if (d.type === 'auction:balances') {
      // Request: emit current balances
      emitBalances();
    }
  });

  function emitMessage(msg) {
    if (window.parent !== window) window.parent.postMessage(msg, '*');
  }

  // ═══════════════════════════════════════════════
  //  WEB AUDIO
  // ═══════════════════════════════════════════════
  let _ctx = null;
  function getCtx() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  function playSound(type) {
    if (!S.soundOn) return;
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      if (type === 'bid') {
        // Bright ding
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
      }
      else if (type === 'sold') {
        // Gavel slam — low thud + decay + fanfare
        // Thud
        const noise = ctx.createOscillator();
        const nGain = ctx.createGain();
        noise.connect(nGain); nGain.connect(ctx.destination);
        noise.type = 'sawtooth';
        noise.frequency.setValueAtTime(80, now);
        noise.frequency.exponentialRampToValueAtTime(30, now + 0.15);
        nGain.gain.setValueAtTime(0.6, now);
        nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        noise.start(now); noise.stop(now + 0.25);
        // Fanfare notes
        [[0, 523], [0.12, 659], [0.24, 784], [0.36, 1047]].forEach(([t, f]) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'triangle';
          o.frequency.value = f;
          g.gain.setValueAtTime(0.2, now + t);
          g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.35);
          o.start(now + t); o.stop(now + t + 0.4);
        });
      }
      else if (type === 'going') {
        // Soft warning tone
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      }
    } catch(e) { /* audio unavailable */ }
  }

  // ═══════════════════════════════════════════════
  //  EVENT LISTENERS
  // ═══════════════════════════════════════════════

  // Admin toggle
  DOM.adminToggle.addEventListener('click', () => {
    DOM.adminPanel.classList.toggle('hidden');
  });

  // Add bidder
  DOM.addNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBidderFromInputs(); });
  $('add-bidder-btn').addEventListener('click', addBidderFromInputs);
  function addBidderFromInputs() {
    const name = DOM.addNameInput.value.trim();
    const bal  = parseInt(DOM.addBalInput.value || '1000', 10);
    if (!name) return;
    addBidder(name, isNaN(bal) ? 1000 : bal);
    DOM.addNameInput.value = '';
    DOM.addBalInput.value = '';
  }

  // Reset / clear bidders
  $('reset-bal-btn').addEventListener('click', resetBalances);
  $('clear-bidders-btn').addEventListener('click', () => {
    S.bidders = [];
    renderBidderList();
    renderBalancesSidebar();
    saveState();
  });

  // List item
  $('list-item-btn').addEventListener('click', () => {
    const name  = DOM.itemNameInput.value.trim() || 'Mystery Item';
    const emoji = DOM.itemEmojiInput.value.trim() || '💎';
    const start = parseInt(DOM.itemStartInput.value || '100', 10);
    const inc   = parseInt(DOM.itemMinIncInput.value || '10', 10);
    listItem(name, emoji, start, inc);
    getCtx(); // unlock audio context on user interaction
  });

  // Sold
  DOM.soldBtn.addEventListener('click', () => { if (S.auction) triggerSold(); });

  // Pause
  DOM.pauseBtn.addEventListener('click', togglePause);

  // Cancel
  DOM.cancelBtn.addEventListener('click', cancelAuction);

  // Timer buttons
  document.querySelectorAll('.timer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      S.timerSec = parseInt(btn.dataset.t, 10);
    });
  });

  // Sound toggle
  DOM.soundBtn.addEventListener('click', () => {
    S.soundOn = !S.soundOn;
    DOM.soundBtn.textContent = S.soundOn ? '🔊 Sound On' : '🔇 Sound Off';
    if (S.soundOn) getCtx();
  });

  // Balances sidebar
  DOM.sidebarBtn.addEventListener('click', () => {
    S.sidebarOpen = !S.sidebarOpen;
    DOM.balancesSidebar.classList.toggle('open', S.sidebarOpen);
    DOM.sidebarBtn.textContent = S.sidebarOpen ? '👁 Hide Balances' : '👁 Balances';
  });

  // Theme
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.documentElement.dataset.theme = btn.dataset.theme;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Spacebar = SOLD
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body && S.auction) {
      e.preventDefault();
      triggerSold();
    }
  });

  // ═══════════════════════════════════════════════
  //  LOCALSTORAGE PERSISTENCE
  // ═══════════════════════════════════════════════
  function saveState() {
    try {
      localStorage.setItem('auction_bidders', JSON.stringify(
        S.bidders.map(b => ({ name: b.name, balance: b.balance, startBalance: b.startBalance }))
      ));
    } catch(e) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem('auction_bidders');
      if (raw) {
        const arr = JSON.parse(raw);
        arr.forEach(b => {
          if (b.name) S.bidders.push({ name: b.name, balance: b.balance || 1000, startBalance: b.startBalance || b.balance || 1000 });
        });
      }
    } catch(e) {}
  }

  // ═══════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════
  loadState();
  renderBidderList();
  renderBalancesSidebar();
  DOM.roundBadge.textContent = `Round ${S.round}`;
  // Auto-focus bidder name input for fast entry
  setTimeout(() => { const inp = document.getElementById('add-name-input'); if (inp) inp.focus(); }, 100);

})();
</script>
</body>
</html>
