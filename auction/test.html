<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction Wars — Test Harness</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0d0d14; color: #e8e8f0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
#layout {
  display: flex; flex: 1; overflow: hidden; gap: 0;
}
#game-frame {
  flex: 1; border: none; display: block;
  border-right: 1px solid #2a2a4a;
}
#sidebar {
  width: 380px; display: flex; flex-direction: column;
  background: #14141f; overflow: hidden;
}
#sidebar-header {
  padding: 14px 16px; background: #1a1a2e;
  border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
}
#sidebar-header h2 { font-size: 14px; font-weight: 700; color: #7c5cfc; letter-spacing: 0.5px; }
#sidebar-header p  { font-size: 11px; color: #8888aa; margin-top: 3px; }

.section { padding: 12px 16px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
.section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #8888aa; margin-bottom: 8px; }

.btn-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.tbtn {
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid #2a2a4a; background: #1a1a2e;
  color: #e8e8f0; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.tbtn:hover { border-color: #7c5cfc; background: #22223a; }
.tbtn:active { transform: scale(0.96); }
.tbtn.primary { background: #7c5cfc; border-color: #7c5cfc; color: #fff; }
.tbtn.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); border-color: #ffd700; color: #1a1000; }
.tbtn.danger { color: #ff4466; border-color: rgba(255,68,102,0.3); }
.tbtn.danger:hover { background: rgba(255,68,102,0.1); }

#log-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#log-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 8px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
#log-header h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #8888aa; }
#clear-log { font-size: 11px; color: #8888aa; background: none; border: 1px solid #2a2a4a; border-radius: 6px; padding: 3px 8px; cursor: pointer; color: #8888aa; }
#clear-log:hover { border-color: #7c5cfc; color: #e8e8f0; }

#log {
  flex: 1; overflow-y: auto; padding: 8px 0;
  font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px;
  scrollbar-width: thin; scrollbar-color: #2a2a4a transparent;
}
.log-entry {
  padding: 3px 16px; line-height: 1.6; border-left: 2px solid transparent;
  transition: background 0.1s;
}
.log-entry:hover { background: rgba(255,255,255,0.03); }
.log-entry.in    { border-left-color: #44ff88; color: #44ff88; }
.log-entry.out   { border-left-color: #7c5cfc; color: #7c5cfc; }
.log-entry.info  { border-left-color: #ffd700; color: #ffd700; }
.log-entry.pass  { border-left-color: #44ff88; color: #44ff88; font-weight: 700; }
.log-entry.fail  { border-left-color: #ff4466; color: #ff4466; font-weight: 700; }
.log-entry.sep   { border-left-color: #2a2a4a; color: #8888aa; font-style: italic; }
.log-entry.dim   { color: #8888aa; }

/* Test results bar */
#test-bar {
  padding: 8px 16px; background: #1a1a2e; border-top: 1px solid #2a2a4a;
  font-size: 12px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#test-results { flex: 1; color: #8888aa; }
#test-results .pass-count { color: #44ff88; font-weight: 700; }
#test-results .fail-count { color: #ff4466; font-weight: 700; }
.tbtn.run-tests { background: #44ff88; border-color: #44ff88; color: #0d0d14; font-weight: 800; }
.tbtn.run-tests:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<div id="layout">
  <iframe id="game-frame" src="index.html?admin=true&theme=dark" title="Auction Wars Game"></iframe>

  <div id="sidebar">
    <div id="sidebar-header">
      <h2>🧪 Auction Wars — Test Harness</h2>
      <p>postMessage API test suite · Click buttons or run auto tests</p>
    </div>

    <!-- Setup -->
    <div class="section">
      <h3>Setup — Add Bidders</h3>
      <div class="btn-grid">
        <button class="tbtn primary" onclick="add4Bidders()">+ 4 Bidders</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:join',name:'StreamerFan99',balance:1500})">+ 1 Bidder</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:join',name:'PoorGuy',balance:50})">+ PoorGuy (50)</button>
      </div>
    </div>

    <!-- Item -->
    <div class="section">
      <h3>Item Control</h3>
      <div class="btn-grid">
        <button class="tbtn primary" onclick="listSword()">🗡️ List Sword</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:item',name:'Dragon Shield',emoji:'🛡️',startBid:200,minInc:25})">🛡️ List Shield</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:item',name:'Magic Crystal',emoji:'🔮',startBid:500,minInc:50})">🔮 List Crystal</button>
        <button class="tbtn gold" onclick="sendMsg({type:'auction:sold'})">🔨 SOLD!</button>
      </div>
    </div>

    <!-- Bidding -->
    <div class="section">
      <h3>Place Bids (Alice)</h3>
      <div class="btn-grid">
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Alice',amount:100})">Bid 100</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Alice',amount:250})">Bid 250</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Alice',amount:500})">Bid 500</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Alice',amount:750})">Bid 750</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Bob',amount:300})">Bob 300</button>
        <button class="tbtn" onclick="sendMsg({type:'auction:bid',name:'Bob',amount:600})">Bob 600</button>
        <button class="tbtn danger" onclick="sendMsg({type:'auction:bid',name:'PoorGuy',amount:9999})">PoorGuy overbid</button>
      </div>
    </div>

    <!-- Query -->
    <div class="section">
      <h3>Query</h3>
      <div class="btn-grid">
        <button class="tbtn" onclick="sendMsg({type:'auction:balances'})">Request Balances</button>
        <button class="tbtn" onclick="changeTheme('neon')">Theme: Neon</button>
        <button class="tbtn" onclick="changeTheme('light')">Theme: Light</button>
        <button class="tbtn" onclick="changeTheme('dark')">Theme: Dark</button>
        <button class="tbtn" onclick="reloadFrame('?bg=transparent')">OBS Mode</button>
        <button class="tbtn" onclick="reloadFrame('?admin=false&names=Alice,Bob,Charlie&balance=2000')">URL Params</button>
        <button class="tbtn" onclick="reloadFrame('?admin=true')">Reset Frame</button>
      </div>
    </div>

    <!-- Log -->
    <div id="log-wrap">
      <div id="log-header">
        <h3>Message Log</h3>
        <button id="clear-log" onclick="clearLog()">Clear</button>
      </div>
      <div id="log"></div>
    </div>

    <!-- Test Bar -->
    <div id="test-bar">
      <div id="test-results">Press "Run Tests" to execute suite</div>
      <button class="tbtn run-tests" onclick="runTests()">▶ Run Tests</button>
    </div>

  </div>
</div>

<script>
'use strict';

const frame = document.getElementById('game-frame');
const logEl  = document.getElementById('log');
let passCount = 0, failCount = 0;
const received = [];

// ── postMessage helpers ──
function sendMsg(data) {
  frame.contentWindow.postMessage(data, '*');
  addLog('out', `→ ${data.type}: ${JSON.stringify(Object.fromEntries(Object.entries(data).filter(([k])=>k!=='type')))}`);
}

window.addEventListener('message', e => {
  if (!e.data || !e.data.type) return;
  received.push({ ...e.data, _ts: Date.now() });
  addLog('in', `← ${e.data.type}: ${JSON.stringify(Object.fromEntries(Object.entries(e.data).filter(([k])=>k!=='type')))}`);
});

function addLog(cls, text) {
  const el = document.createElement('div');
  el.className = `log-entry ${cls}`;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  logEl.prepend(el);
  while (logEl.children.length > 200) logEl.lastChild.remove();
}

function clearLog() {
  logEl.innerHTML = '';
  received.length = 0;
  passCount = 0; failCount = 0;
  document.getElementById('test-results').innerHTML = 'Log cleared';
}

function reloadFrame(qs) {
  frame.src = 'index.html' + qs;
  addLog('info', `Frame reloaded: index.html${qs}`);
}

function changeTheme(t) {
  reloadFrame(`?theme=${t}&admin=true`);
}

// ── Setup helpers ──
function add4Bidders() {
  ['Alice', 'Bob', 'Charlie', 'Diana'].forEach((n, i) => {
    setTimeout(() => sendMsg({ type: 'auction:join', name: n, balance: 1000 + i * 200 }), i * 80);
  });
}

function listSword() {
  sendMsg({ type: 'auction:item', name: 'Legendary Sword', emoji: '⚔️', startBid: 100, minInc: 10 });
}

// ── Test Suite ──
async function runTests() {
  passCount = 0; failCount = 0;
  addLog('sep', '─── Auto Test Suite Starting ───────────────────');

  // Reload fresh frame
  reloadFrame('?admin=true&theme=dark');
  await sleep(600);

  await test_01_join();
  await test_02_list_item();
  await test_03_bid_valid();
  await test_04_bid_overbid();
  await test_05_bid_underbid();
  await test_06_bid_war();
  await test_07_sold();
  await test_08_balances_emitted();
  await test_09_url_params();
  await test_10_theme();
  await test_11_no_bidder_sold();
  await test_12_bid_after_sold();

  addLog('sep', '─── Test Suite Complete ─────────────────────────');
  const total = passCount + failCount;
  document.getElementById('test-results').innerHTML =
    `<span class="pass-count">${passCount} passed</span> / ` +
    `<span class="fail-count">${failCount} failed</span> of ${total}`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function assert(cond, label) {
  if (cond) {
    addLog('pass', `✓ PASS: ${label}`);
    passCount++;
  } else {
    addLog('fail', `✗ FAIL: ${label}`);
    failCount++;
  }
}

function waitForMsg(type, timeout = 800) {
  return new Promise(resolve => {
    const start = Date.now();
    const poll = setInterval(() => {
      const found = received.find(m => m.type === type && m._ts >= start - 50);
      if (found) { clearInterval(poll); resolve(found); return; }
      if (Date.now() - start > timeout) { clearInterval(poll); resolve(null); }
    }, 30);
  });
}

// ─── Individual Tests ───

async function test_01_join() {
  addLog('info', 'T01: auction:join — adds bidders');
  const before = received.length;
  sendMsg({ type: 'auction:join', name: 'Alice', balance: 1000 });
  sendMsg({ type: 'auction:join', name: 'Bob',   balance: 800  });
  await sleep(200);
  // No outbound expected for join — just verify no crash
  assert(true, 'T01: join messages sent without error');
}

async function test_02_list_item() {
  addLog('info', 'T02: auction:item — lists an item');
  sendMsg({ type: 'auction:item', name: 'Magic Sword', emoji: '⚔️', startBid: 100, minInc: 10 });
  await sleep(200);
  assert(true, 'T02: list-item message sent');
}

async function test_03_bid_valid() {
  addLog('info', 'T03: valid bid emits auction:bid outbound');
  received.length = 0; // flush
  sendMsg({ type: 'auction:bid', name: 'Alice', amount: 100 });
  const msg = await waitForMsg('auction:bid');
  assert(msg !== null, 'T03: auction:bid emitted');
  assert(msg && msg.name === 'Alice', 'T03: correct bidder name');
  assert(msg && msg.amount === 100, 'T03: correct bid amount');
  assert(msg && msg.newLeader === 'Alice', 'T03: newLeader set');
}

async function test_04_bid_overbid() {
  addLog('info', 'T04: bid exceeding balance is ignored');
  received.length = 0;
  sendMsg({ type: 'auction:bid', name: 'Bob', amount: 99999 });
  const msg = await waitForMsg('auction:bid', 400);
  assert(msg === null, 'T04: no bid emitted for overbid');
}

async function test_05_bid_underbid() {
  addLog('info', 'T05: bid below current leader is ignored');
  received.length = 0;
  sendMsg({ type: 'auction:bid', name: 'Bob', amount: 50 }); // below current 100
  const msg = await waitForMsg('auction:bid', 400);
  assert(msg === null, 'T05: no bid emitted for underbid');
}

async function test_06_bid_war() {
  addLog('info', 'T06: multiple bids — leader updates correctly');
  received.length = 0;
  sendMsg({ type: 'auction:bid', name: 'Bob',   amount: 200 });
  await sleep(100);
  sendMsg({ type: 'auction:bid', name: 'Alice', amount: 350 });
  await sleep(100);
  sendMsg({ type: 'auction:bid', name: 'Bob',   amount: 400 });
  await sleep(400);
  const bids = received.filter(m => m.type === 'auction:bid');
  assert(bids.length === 3, `T06: 3 bid events emitted (got ${bids.length})`);
  assert(bids[bids.length - 1].newLeader === 'Bob', 'T06: final leader is Bob');
}

async function test_07_sold() {
  addLog('info', 'T07: auction:sold emits auction:winner');
  received.length = 0;
  sendMsg({ type: 'auction:sold' });
  const msg = await waitForMsg('auction:winner', 1000);
  assert(msg !== null, 'T07: auction:winner emitted');
  assert(msg && msg.winner === 'Bob', 'T07: winner is last leader (Bob)');
  assert(msg && msg.item === 'Magic Sword', 'T07: item name correct');
  assert(msg && msg.amount === 400, 'T07: winning amount correct');
}

async function test_08_balances_emitted() {
  addLog('info', 'T08: balances emitted after sold');
  const bal = received.find(m => m.type === 'auction:balances');
  assert(bal !== null && bal !== undefined, 'T08: auction:balances emitted after SOLD');
  if (bal) {
    const bob = bal.balances.find(b => b.name === 'Bob');
    assert(bob !== undefined, 'T08: Bob in balances');
    assert(bob && bob.balance === 400, `T08: Bob balance deducted (800 - 400 = 400, got ${bob && bob.balance})`);
  }
}

async function test_09_url_params() {
  addLog('info', 'T09: URL params — names + balance pre-load');
  reloadFrame('?names=TestA,TestB&balance=500&admin=true');
  await sleep(600);
  assert(true, 'T09: frame reloaded with URL params (visual check)');
}

async function test_10_theme() {
  addLog('info', 'T10: theme switching via URL param');
  reloadFrame('?theme=neon&admin=true');
  await sleep(400);
  assert(true, 'T10: neon theme loaded (visual check)');
  reloadFrame('?theme=dark&admin=true');
  await sleep(400);
  assert(true, 'T10: dark theme restored');
}

async function test_11_no_bidder_sold() {
  addLog('info', 'T11: SOLD with no bids — no winner emitted');
  reloadFrame('?admin=true');
  await sleep(500);
  sendMsg({ type: 'auction:join', name: 'LoneWolf', balance: 500 });
  sendMsg({ type: 'auction:item', name: 'Rare Gem', emoji: '💎', startBid: 100, minInc: 10 });
  await sleep(200);
  received.length = 0;
  sendMsg({ type: 'auction:sold' }); // no bids placed
  const winner = await waitForMsg('auction:winner', 500);
  assert(winner === null, 'T11: no winner emitted when nobody bid');
}

async function test_12_bid_after_sold() {
  addLog('info', 'T12: bid after auction ends is ignored');
  await sleep(300);
  received.length = 0;
  sendMsg({ type: 'auction:bid', name: 'LoneWolf', amount: 200 });
  const msg = await waitForMsg('auction:bid', 400);
  assert(msg === null, 'T12: bid after sold ignored');
}
</script>
</body>
</html>
