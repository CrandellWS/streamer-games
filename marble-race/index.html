<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Race — Streamer Games</title>
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg2: #14141f;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.5);
  --danger: #ff4466;
  --success: #44ff88;
  --panel-width: 360px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --bg2: #e8e8f0;
  --surface: #ffffff;
  --surface2: #f5f5fa;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-dim: #666680;
}

[data-theme="neon"] {
  --bg: #0a0a0a;
  --bg2: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #333333;
  --text: #ffffff;
  --text-dim: #888888;
  --accent: #00ffcc;
  --accent-glow: rgba(0,255,204,0.4);
  --gold: #ff00ff;
  --gold-glow: rgba(255,0,255,0.5);
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body.transparent-bg { background: transparent !important; }

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
}

#race-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-width: 0;
}

#canvas-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

#race-canvas {
  display: block;
  border-radius: 12px;
  box-shadow: 0 0 60px rgba(124,92,252,0.2), 0 8px 32px rgba(0,0,0,0.5);
}

body.transparent-bg #race-canvas { box-shadow: none; border-radius: 0; }

/* Countdown overlay */
#countdown-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 120px;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 60px var(--accent), 0 0 120px var(--accent-glow);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 10;
}

/* ═══════════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════════ */
#admin-panel {
  width: var(--panel-width);
  height: 100%;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  z-index: 100;
  flex-shrink: 0;
}

#admin-panel.hidden {
  transform: translateX(100%);
  opacity: 0;
  position: absolute;
  right: 0;
  top: 0;
  pointer-events: none;
}

#admin-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 200;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#admin-toggle:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.panel-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.panel-header p { font-size: 12px; color: var(--text-dim); }

.panel-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.panel-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Form Elements */
.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

input[type="text"], textarea, input[type="range"] {
  font-family: var(--font);
}

input[type="text"], textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

textarea {
  resize: vertical;
  min-height: 72px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}

/* Buttons */
.btn {
  padding: 10px 18px;
  min-height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { filter: brightness(1.15); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-2px); }

.btn-danger { color: var(--danger); border-color: rgba(255,68,102,0.3); }
.btn-danger:hover { background: rgba(255,68,102,0.1); border-color: var(--danger); }

.btn-success { color: var(--success); border-color: rgba(68,255,136,0.3); }
.btn-success:hover { background: rgba(68,255,136,0.1); border-color: var(--success); }

.btn-sm { padding: 6px 12px; min-height: 36px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-group { display: flex; gap: 8px; }

#start-btn {
  padding: 14px 24px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #9b7cfc);
  border: none;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 30px var(--accent-glow);
  width: 100%;
  position: relative;
  overflow: hidden;
}
#start-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
#start-btn:hover::before { left: 100%; }
#start-btn:hover { filter: brightness(1.15); box-shadow: 0 8px 40px var(--accent-glow); }
#start-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

/* Player List */
#player-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 4px 0;
}

.player-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: all 0.2s;
  animation: slideIn 0.25s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

.player-item:hover { border-color: var(--accent); }

.marble-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: inset -3px -2px 4px rgba(0,0,0,0.4), inset 2px 2px 4px rgba(255,255,255,0.3);
}

.player-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.player-rank {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.player-remove {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  flex-shrink: 0;
  padding: 0;
}
.player-remove:hover { background: rgba(255,68,102,0.2); color: var(--danger); }

/* Speed Control */
.speed-btns { display: flex; gap: 6px; }
.speed-btn {
  flex: 1;
  padding: 8px;
  min-height: 40px;
  font-size: 12px;
  font-weight: 700;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.speed-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Theme Select */
.theme-btns { display: flex; gap: 6px; }
.theme-btn {
  flex: 1;
  padding: 8px;
  min-height: 36px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.theme-btn.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

/* Sound toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.toggle-label { font-size: 13px; color: var(--text-dim); }
.toggle {
  position: relative;
  width: 44px; height: 24px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border);
  border-radius: 24px;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Status bar */
#status-bar {
  padding: 12px 20px;
  font-size: 12px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  background: var(--surface);
  text-align: center;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

/* Podium overlay */
#podium-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.5s;
}
#podium-overlay.visible { opacity: 1; pointer-events: auto; }

#podium-card {
  background: rgba(13,13,20,0.95);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 40px;
  text-align: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 20px 80px rgba(0,0,0,0.8), 0 0 80px var(--accent-glow);
  min-width: 280px;
  max-width: 400px;
}

[data-theme="light"] #podium-card {
  background: rgba(240,240,245,0.97);
  box-shadow: 0 20px 80px rgba(0,0,0,0.2), 0 0 60px var(--accent-glow);
}

.podium-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.podium-places { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

.podium-place {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.podium-place.p1 { border-color: var(--gold); box-shadow: 0 0 20px var(--gold-glow); }
.podium-place.p2 { border-color: rgba(192,192,192,0.5); }
.podium-place.p3 { border-color: rgba(205,127,50,0.5); }

.podium-medal { font-size: 24px; flex-shrink: 0; }
.podium-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: inset -3px -2px 5px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.3);
}
.podium-name {
  font-size: 15px;
  font-weight: 700;
  flex: 1;
  text-align: left;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.podium-time { font-size: 11px; color: var(--text-dim); }

.podium-dismiss {
  font-size: 13px;
  padding: 10px 28px;
  min-height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}
.podium-dismiss:hover { border-color: var(--accent); background: var(--surface2); }

/* Empty state */
#empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  opacity: 0.6;
}
#empty-state .icon { font-size: 64px; margin-bottom: 12px; }
#empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
#empty-state p { font-size: 13px; color: var(--text-dim); }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════════════════════════════════════════
   PREMIUM VISUAL POLISH — Overshoot easing, glows, animations
   ═══════════════════════════════════════════════ */

/* Scanline overlay for OBS aesthetic */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Winner pulse — gold glow for winner elements */
@keyframes winnerPulse {
  0%,100% { filter: drop-shadow(0 0 18px rgba(255,215,0,0.9)) drop-shadow(0 0 50px rgba(255,215,0,0.4)); }
  50%     { filter: drop-shadow(0 0 32px rgba(255,215,0,1)) drop-shadow(0 0 80px rgba(255,215,0,0.7)); }
}
.winner-pulse {
  animation: winnerPulse 2s ease-in-out infinite;
}

/* Card flip entrance for list items */
@keyframes cardFlipIn {
  0%   { opacity: 0; transform: translateY(20px) scale(0.9); }
  60%  { transform: translateY(-4px) scale(1.02); opacity: 1; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

/* Ambient idle breathing */
@keyframes idleBreathe {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.03); }
}

/* Title shimmer */
@keyframes titleShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Tension shake for near-miss moments */
@keyframes tensionShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-3px) rotate(-0.5deg); }
  40% { transform: translateX(3px) rotate(0.5deg); }
  60% { transform: translateX(-2px); }
  80% { transform: translateX(2px); }
}
.tension-shake {
  animation: tensionShake 0.5s cubic-bezier(0.55, 0, 0.75, 0.06);
}

/* Overshoot button transitions */
button, .btn {
  transition: all 0.3s cubic-bezier(0.22, 1.2, 0.36, 1) !important;
}
button:hover, .btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 25px rgba(124,92,252,0.4);
}
button:active, .btn:active {
  transform: translateY(0) scale(0.98) !important;
  transition-duration: 0.1s !important;
}

/* Triple-layer text shadow for headings */
h1, .game-title, .winner-text, .title {
  text-shadow:
    0 0 10px rgba(124,92,252,0.8),
    0 0 30px rgba(124,92,252,0.4),
    0 0 60px rgba(124,92,252,0.2);
}

/* Multi-layer accent glow */
.accent-glow {
  box-shadow: 0 0 8px rgba(124,92,252,0.6), 0 0 20px rgba(124,92,252,0.3), 0 0 40px rgba(124,92,252,0.1);
}

/* Gold glow for winners/highlights */
.gold-glow {
  box-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.1);
}

/* Danger glow */
.danger-glow {
  box-shadow: 0 0 8px rgba(255,68,68,0.6), 0 0 20px rgba(255,68,68,0.3);
}

/* State-driven desaturation */
.eliminated, .inactive, .used {
  filter: saturate(0.4) brightness(0.6) !important;
  opacity: 0.7 !important;
  transition: all 0.5s cubic-bezier(0.55, 0, 0.75, 0.06) !important;
}

/* Light theme adjustments */
[data-theme="light"] button:hover,
[data-theme="light"] .btn:hover {
  box-shadow: 0 8px 25px rgba(124,92,252,0.2);
}
[data-theme="light"] h1,
[data-theme="light"] .game-title,
[data-theme="light"] .winner-text,
[data-theme="light"] .title {
  text-shadow:
    0 0 10px rgba(124,92,252,0.4),
    0 0 20px rgba(124,92,252,0.2);
}


/* Idle breathing on game canvas area */
#wheel-area, #game-area, #arena, #stage, #canvas-wrap, #game-canvas,
#marble-track, #bingo-area, #question-area, #battle-area, #auction-area,
#slot-area, .game-main, .game-content, .game-field, .play-area,
#potato-area, #scramble-area, #dig-area, #card-area, #flip-area,
#guess-area, #dice-area {
  animation: idleBreathe 4s ease-in-out infinite;
}

/* Title shimmer effect */
h1, .game-title, .panel-title, .app-title {
  background: linear-gradient(
    90deg,
    var(--text) 0%,
    var(--accent) 40%,
    var(--gold) 60%,
    var(--text) 100%
  );
  background-size: 300% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  animation: titleShimmer 5s linear infinite;
}
/* Reset text-fill for light theme */
[data-theme="light"] h1,
[data-theme="light"] .game-title,
[data-theme="light"] .panel-title {
  background: linear-gradient(
    90deg,
    var(--text) 0%,
    var(--accent) 45%,
    #a080ff 55%,
    var(--text) 100%
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

</style>
</head>
<body>
<div id="app">
  <!-- Race Canvas Area -->
  <div id="race-area">
    <div id="canvas-wrapper">
      <canvas id="race-canvas"></canvas>
      <div id="empty-state">
        <div class="icon">🔮</div>
        <h3>Marble Race</h3>
        <p>Add players and hit Start Race!</p>
      </div>
      <div id="countdown-overlay"></div>
    </div>
    <div id="podium-overlay">
      <div id="podium-card">
        <div class="podium-title">🏆 Race Results</div>
        <div class="podium-places" id="podium-places"></div>
        <button class="podium-dismiss" id="podium-dismiss">Continue</button>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel">
    <div class="panel-header">
      <h2>🔮 Marble Race</h2>
      <p>Physics-based marble drop race</p>
    </div>

    <div class="panel-scroll">
      <!-- Start Race -->
      <div class="panel-section">
        <button id="start-btn" disabled>🚀 Start Race</button>
        <p style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;">or press <kbd style="background:var(--surface2);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:10px;">Space</kbd></p>
      </div>

      <!-- Track -->
      <div class="panel-section">
        <h3>Track</h3>
        <div class="btn-group">
          <button class="btn btn-block" id="gen-track-btn">🎲 Generate New Track</button>
        </div>
      </div>

      <!-- Speed -->
      <div class="panel-section">

<!-- Admin toggle button -->
<button id="admin-toggle" title="Toggle admin panel">⚙</button>

<script>
'use strict';
(function() {

/* ═══════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════ */
const MARBLE_COLORS = [
  '#ff4444','#ff8800','#ffdd00','#44ff44','#00ffcc',
  '#4488ff','#aa44ff','#ff44aa','#ffffff','#ff6644',
  '#44ffff','#ffaa44','#88ff44','#4444ff','#ff44ff',
  '#ffff44','#44ff88','#ff8844','#88ffff','#cc44ff'
];

const GRAVITY = 650; // px/s²
const RESTITUTION_PEG = 0.62;
const RESTITUTION_WALL = 0.55;
const RESTITUTION_MARBLE = 0.45;
const FRICTION = 0.985;
const MARBLE_RADIUS = 12;
const PEG_RADIUS = 7;

/* ═══════════════════════════════════════════════
   URL PARAMS
   ═══════════════════════════════════════════════ */
const params = new URLSearchParams(location.search);
const isAdmin = params.get('admin') !== 'false';
const isBgTransparent = params.get('bg') === 'transparent';
const initTheme = params.get('theme') || 'dark';
const initNames = params.get('names') ? params.get('names').split(',').map(n => n.trim()).filter(Boolean) : [];

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let players = [];         // {name, color, colorIndex}
let marbles = [];         // Marble instances
let pegs = [];            // {x,y,r}
let ramps = [];           // {x1,y1,x2,y2}
let finishY = 0;
let raceRunning = false;
let raceFinished = false;
let raceStart = 0;
let finishOrder = [];     // [{name, color, time}]
let speedMult = 1;
let soundEnabled = true;
let animId = null;
let lastTime = 0;
let trackGenSeed = Math.random();

/* ═══════════════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════════════ */
const canvas = document.getElementById('race-canvas');
const ctx = canvas.getContext('2d');
const adminPanel = document.getElementById('admin-panel');
const adminToggle = document.getElementById('admin-toggle');
const startBtn = document.getElementById('start-btn');
const genTrackBtn = document.getElementById('gen-track-btn');
const addBtn = document.getElementById('add-btn');
const bulkAddBtn = document.getElementById('bulk-add-btn');
const nameInput = document.getElementById('name-input');
const bulkInput = document.getElementById('bulk-input');
const playerList = document.getElementById('player-list');
const playerCount = document.getElementById('player-count');
const noPlayers = document.getElementById('no-players');
const clearBtn = document.getElementById('clear-btn');
const soundToggle = document.getElementById('sound-toggle');
const statusBar = document.getElementById('status-bar');
const countdownOverlay = document.getElementById('countdown-overlay');
const podiumOverlay = document.getElementById('podium-overlay');
const podiumPlaces = document.getElementById('podium-places');
const podiumDismiss = document.getElementById('podium-dismiss');
const emptyState = document.getElementById('empty-state');

/* ═══════════════════════════════════════════════
   AUDIO ENGINE
   ═══════════════════════════════════════════════ */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, gain, startDelay = 0) {
  if (!soundEnabled) return;
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gainNode = ac.createGain();
    osc.connect(gainNode);
    gainNode.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + startDelay);
    gainNode.gain.setValueAtTime(0, ac.currentTime + startDelay);
    gainNode.gain.linearRampToValueAtTime(gain, ac.currentTime + startDelay + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startDelay + duration);
    osc.start(ac.currentTime + startDelay);
    osc.stop(ac.currentTime + startDelay + duration + 0.01);
  } catch(e) {}
}

function playClink(pitch) {
  // Metallic click — short high sine + noise burst
  if (!soundEnabled) return;
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.015));
    }
    const source = ac.createBufferSource();
    source.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = pitch;
    filter.Q.value = 8;
    const gainNode = ac.createGain();
    gainNode.gain.setValueAtTime(0.15, ac.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(ac.destination);
    source.start();
  } catch(e) {}
}

function playCrowdMurmur() {
  if (!soundEnabled) return;
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * 1.5, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.05;
    }
    const source = ac.createBufferSource();
    source.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    const gainNode = ac.createGain();
    gainNode.gain.setValueAtTime(0, ac.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.25, ac.currentTime + 0.3);
    gainNode.gain.linearRampToValueAtTime(0.0, ac.currentTime + 1.5);
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(ac.destination);
    source.start();
  } catch(e) {}
}

function playFinishBell() {
  if (!soundEnabled) return;
  const freqs = [523.25, 659.25, 783.99, 1046.5];
  freqs.forEach((f, i) => playTone(f, 'sine', 0.6, 0.18, i * 0.08));
}

function playFanfare() {
  if (!soundEnabled) return;
  const notes = [
    [523, 0], [659, 0.12], [784, 0.24], [1047, 0.38],
    [784, 0.52], [1047, 0.62], [1047, 0.72], [1047, 0.85]
  ];
  notes.forEach(([f, t]) => playTone(f, 'triangle', 0.25, 0.2, t));
}

function playCountdownBeep(n) {
  if (!soundEnabled) return;
  playTone(n > 0 ? 440 : 880, 'sine', 0.15, 0.3);
}

/* ═══════════════════════════════════════════════
   SEEDED RANDOM (for track regeneration)
   ═══════════════════════════════════════════════ */
function seededRand(seed) {
  // Simple xorshift32
  let s = (seed * 2654435761) >>> 0;
  return function() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

/* ═══════════════════════════════════════════════
   TRACK GENERATION
   ═══════════════════════════════════════════════ */
function generateTrack() {
  pegs = [];
  ramps = [];
  const rng = seededRand(trackGenSeed * 1e9 | 0);
  const W = canvas.width;
  const H = canvas.height;
  finishY = H - 40;

  // Staggered peg grid — 8 rows x 5 cols + jitter
  const rows = 8;
  const cols = 5;
  const topY = 90;
  const botY = finishY - 100;
  const rowH = (botY - topY) / rows;

  for (let row = 0; row < rows; row++) {
    const offset = (row % 2 === 0) ? 0 : W / (cols * 2 + 2);
    for (let col = 0; col < cols; col++) {
      const bx = (W / (cols + 1)) * (col + 1) + offset;
      const by = topY + row * rowH;
      const jx = (rng() - 0.5) * 28;
      const jy = (rng() - 0.5) * 16;
      const r = 5 + rng() * 4;
      const px = Math.max(r + 8, Math.min(W - r - 8, bx + jx));
      const py = Math.max(topY, Math.min(botY, by + jy));
      pegs.push({ x: px, y: py, r });
    }
  }

  // Diagonal ramps — 3 per track
  const rampCount = 3;
  for (let i = 0; i < rampCount; i++) {
    const yBase = 120 + i * ((finishY - 200) / rampCount);
    const cy = yBase + (rng() - 0.5) * 60;
    const cx = W * 0.15 + rng() * W * 0.7;
    const len = 90 + rng() * 80;
    const angle = (rng() - 0.5) * 0.9;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    ramps.push({
      x1: cx - cos * len / 2,
      y1: cy - sin * len / 2,
      x2: cx + cos * len / 2,
      y2: cy + sin * len / 2
    });
  }
}

/* ═══════════════════════════════════════════════
   MARBLE CLASS
   ═══════════════════════════════════════════════ */
class Marble {
  constructor(x, y, color, name) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 60;
    this.vy = 0;
    this.radius = MARBLE_RADIUS;
    this.color = color;
    this.name = name;
    this.finished = false;
    this.finishTime = 0;
    this.trail = [];
    this.lastClink = 0;
  }

  update(dt) {
    if (this.finished) return;
    this.vy += GRAVITY * dt;
    this.vx *= FRICTION;
    // store trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 6) this.trail.shift();
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
}

/* ═══════════════════════════════════════════════
   COLLISION DETECTION
   ═══════════════════════════════════════════════ */
function resolveMarblePeg(m, peg) {
  const dx = m.x - peg.x;
  const dy = m.y - peg.y;
  const distSq = dx * dx + dy * dy;
  const minDist = m.radius + peg.r;
  if (distSq < minDist * minDist && distSq > 0.0001) {
    const dist = Math.sqrt(distSq);
    const nx = dx / dist, ny = dy / dist;
    // Separate
    const overlap = minDist - dist;
    m.x += nx * overlap;
    m.y += ny * overlap;
    // Reflect velocity
    const dot = m.vx * nx + m.vy * ny;
    if (dot < 0) { // approaching
      m.vx -= (1 + RESTITUTION_PEG) * dot * nx;
      m.vy -= (1 + RESTITUTION_PEG) * dot * ny;
    }
    return true;
  }
  return false;
}

function resolveMarbleRamp(m, ramp) {
  // Project marble center onto line segment
  const ax = ramp.x2 - ramp.x1, ay = ramp.y2 - ramp.y1;
  const len2 = ax * ax + ay * ay;
  if (len2 < 0.0001) return false;
  const bx = m.x - ramp.x1, by = m.y - ramp.y1;
  const t = Math.max(0, Math.min(1, (bx * ax + by * ay) / len2));
  const cx = ramp.x1 + t * ax, cy = ramp.y1 + t * ay;
  const dx = m.x - cx, dy = m.y - cy;
  const distSq = dx * dx + dy * dy;
  const minDist = m.radius + 4; // 4px ramp half-thickness
  if (distSq < minDist * minDist && distSq > 0.0001) {
    const dist = Math.sqrt(distSq);
    const nx = dx / dist, ny = dy / dist;
    const overlap = minDist - dist;
    m.x += nx * overlap;
    m.y += ny * overlap;
    const dot = m.vx * nx + m.vy * ny;
    if (dot < 0) {
      m.vx -= (1 + RESTITUTION_PEG) * dot * nx;
      m.vy -= (1 + RESTITUTION_PEG) * dot * ny;
    }
    return true;
  }
  return false;
}

function resolveMarbleWalls(m) {
  const W = canvas.width;
  let hit = false;
  if (m.x - m.radius < 0) {
    m.x = m.radius;
    if (m.vx < 0) m.vx = -m.vx * RESTITUTION_WALL;
    hit = true;
  } else if (m.x + m.radius > W) {
    m.x = W - m.radius;
    if (m.vx > 0) m.vx = -m.vx * RESTITUTION_WALL;
    hit = true;
  }
  return hit;
}

function resolveMarbleMarble(a, b) {
  if (a.finished && b.finished) return;
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const distSq = dx * dx + dy * dy;
  const minDist = a.radius + b.radius;
  if (distSq < minDist * minDist && distSq > 0.0001) {
    const dist = Math.sqrt(distSq);
    const nx = dx / dist, ny = dy / dist;
    // Separate both (or just the unfinished one)
    const overlap = (minDist - dist) * 0.5;
    if (!a.finished) { a.x += nx * overlap; a.y += ny * overlap; }
    if (!b.finished) { b.x -= nx * overlap; b.y -= ny * overlap; }
    // Exchange velocity component along normal
    const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
    const dot = dvx * nx + dvy * ny;
    if (dot < 0) {
      const imp = (1 + RESTITUTION_MARBLE) * dot * 0.5;
      if (!a.finished) { a.vx -= imp * nx; a.vy -= imp * ny; }
      if (!b.finished) { b.vx += imp * nx; b.vy += imp * ny; }
    }
  }
}

/* ═══════════════════════════════════════════════
   PHYSICS UPDATE
   ═══════════════════════════════════════════════ */
const MAX_DT = 0.016; // 16ms max physics step

function physicsStep(dt) {
  // Sub-step for stability
  const steps = Math.ceil(dt / MAX_DT);
  const subDt = dt / steps;
  for (let s = 0; s < steps; s++) {
    for (const m of marbles) m.update(subDt);
    for (const m of marbles) {
      let collided = false;
      // Peg collisions
      for (const peg of pegs) {
        if (resolveMarblePeg(m, peg)) collided = true;
      }
      // Ramp collisions
      for (const ramp of ramps) {
        if (resolveMarbleRamp(m, ramp)) collided = true;
      }
      // Wall
      resolveMarbleWalls(m);
      // Sound on collision (throttled)
      if (collided && soundEnabled) {
        const now = performance.now();
        if (now - m.lastClink > 80) {
          m.lastClink = now;
          const speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
          const pitch = 400 + (speed / 8) * 600 + Math.random() * 200;
          playClink(Math.min(2400, pitch));
        }
      }
    }
    // Marble-marble
    for (let i = 0; i < marbles.length; i++) {
      for (let j = i + 1; j < marbles.length; j++) {
        resolveMarbleMarble(marbles[i], marbles[j]);
      }
    }
    // Check finish
    for (const m of marbles) {
      if (!m.finished && m.y + m.radius >= finishY) {
        m.finished = true;
        m.y = finishY - m.radius;
        m.vy = 0;
        m.vx *= 0.2;
        m.finishTime = (performance.now() - raceStart) / 1000;
        finishOrder.push({ name: m.name, color: m.color, time: m.finishTime });
        playFinishBell();
        postMessage({ type: 'marble:winner', winner: m.name, color: m.color, time: m.finishTime });
        setStatus(`🏆 ${sanitize(m.name)} finished in ${m.finishTime.toFixed(2)}s!`);
        updatePlayerList();
      }
    }
    // Clamp falling off bottom
    for (const m of marbles) {
      if (m.y > canvas.height + 100) {
        m.y = canvas.height + 100;
        m.vy = 0;
        m.finished = true;
      }
    }
  }
}

/* ═══════════════════════════════════════════════
   RENDERING
   ═══════════════════════════════════════════════ */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function darken(hex, factor) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${r*factor|0},${g*factor|0},${b*factor|0})`;
}

function getThemeCanvasBg() {
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  if (isBgTransparent) return null;
  if (t === 'light') return '#f0f0f5';
  if (t === 'neon') return '#0a0a0a';
  return '#0d0d14';
}

function getThemeColor(cssVar) {
  return getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim();
}

function render() {
  const W = canvas.width, H = canvas.height;

  // Background
  const bg = getThemeCanvasBg();
  if (bg) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }

  if (!raceRunning && !raceFinished && marbles.length === 0) return;

  // Track backdrop
  const trackBg = isBgTransparent ? 'rgba(0,0,0,0.35)' :
    (document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)');
  ctx.fillStyle = trackBg;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(10, 10, W - 20, H - 20, 8) : ctx.rect(10, 10, W - 20, H - 20);
  ctx.fill();

  // Side walls (visual guides)
  ctx.strokeStyle = getThemeColor('--border');
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(10, 10); ctx.lineTo(10, H - 10);
  ctx.moveTo(W - 10, 10); ctx.lineTo(W - 10, H - 10);
  ctx.stroke();

  // Pegs
  for (const peg of pegs) {
    const gradient = ctx.createRadialGradient(
      peg.x - peg.r * 0.3, peg.y - peg.r * 0.3, 1,
      peg.x, peg.y, peg.r
    );
    gradient.addColorStop(0, '#aaaacc');
    gradient.addColorStop(0.5, '#666688');
    gradient.addColorStop(1, '#333344');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.strokeStyle = 'rgba(200,200,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Ramps
  for (const ramp of ramps) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineWidth = 8;
    ctx.strokeStyle = getThemeColor('--surface2');
    ctx.beginPath();
    ctx.moveTo(ramp.x1, ramp.y1);
    ctx.lineTo(ramp.x2, ramp.y2);
    ctx.stroke();
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(150,140,200,0.6)';
    ctx.stroke();
    ctx.restore();
  }

  // Finish line
  const accentColor = getThemeColor('--accent');
  ctx.save();
  // Checkered pattern
  const segW = 20;
  const segCount = Math.floor((W - 20) / segW);
  for (let i = 0; i < segCount; i++) {
    ctx.fillStyle = (i % 2 === 0) ? '#fff' : '#222';
    ctx.fillRect(10 + i * segW, finishY - 6, segW, 12);
  }
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(10, finishY);
  ctx.lineTo(W - 10, finishY);
  ctx.stroke();
  // FINISH label
  ctx.fillStyle = accentColor;
  ctx.font = 'bold 11px ' + getComputedStyle(document.documentElement).getPropertyValue('--font');
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', W / 2, finishY - 10);
  ctx.restore();

  // Marble trails
  for (const m of marbles) {
    if (m.trail.length < 2) continue;
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = m.color;
    ctx.lineWidth = m.radius * 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(m.trail[0].x, m.trail[0].y);
    for (let i = 1; i < m.trail.length; i++) {
      ctx.lineTo(m.trail[i].x, m.trail[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Marbles
  for (const m of marbles) {
    ctx.save();
    // Shadow
    ctx.shadowColor = m.color;
    ctx.shadowBlur = 12;
    // Gradient sphere
    const grad = ctx.createRadialGradient(
      m.x - m.radius * 0.35, m.y - m.radius * 0.35, 1,
      m.x, m.y, m.radius
    );
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.25, m.color);
    grad.addColorStop(1, darken(m.color, 0.35));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
    ctx.fill();
    // Specular highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(m.x - m.radius * 0.3, m.y - m.radius * 0.3, m.radius * 0.3, m.radius * 0.2, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Name label
    ctx.save();
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const nameStr = m.name.slice(0, 10);
    const tw = ctx.measureText(nameStr).width;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(m.x - tw/2 - 2, m.y + m.radius + 2, tw + 4, 12);
    ctx.fillStyle = 'white';
    ctx.fillText(nameStr, m.x, m.y + m.radius + 3);
    ctx.restore();

    // Rank badge if finished
    if (m.finished && finishOrder.length > 0) {
      const rank = finishOrder.findIndex(f => f.name === m.name && f.color === m.color) + 1;
      if (rank > 0 && rank <= 3) {
        const medals = ['🥇','🥈','🥉'];
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(medals[rank - 1], m.x, m.y - m.radius - 4);
      }
    }
  }

  // Finish labels
  for (let i = 0; i < finishOrder.length; i++) {
    const f = finishOrder[i];
    ctx.save();
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const medals = ['🥇 ','🥈 ','🥉 '];
    const label = (medals[i] || `${i+1}. `) + f.name + ' ' + f.time.toFixed(2) + 's';
    const x = 18, y = finishY + 18 + i * 16;
    if (y < canvas.height - 5) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x - 2, y - 11, ctx.measureText(label).width + 8, 14);
      ctx.fillStyle = '#fff';
      ctx.fillText(label, x, y);
    }
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════════
   GAME LOOP
   ═══════════════════════════════════════════════ */
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const rawDt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 0.05) * speedMult;

  if (raceRunning) {
    physicsStep(dt);
    // Check if all finished
    if (marbles.length > 0 && marbles.every(m => m.finished)) {
      raceRunning = false;
      raceFinished = true;
      render();
      setTimeout(showPodium, 800);
      playFanfare();
      return;
    }
  }

  render();
  animId = requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════════════════════
   RACE CONTROL
   ═══════════════════════════════════════════════ */
function startCountdown() {
  if (players.length === 0) return;
  startBtn.disabled = true;
  genTrackBtn.disabled = true;
  playCrowdMurmur();

  spawnMarbles();
  render();

  let count = 3;
  countdownOverlay.style.opacity = '1';
  countdownOverlay.textContent = count;
  playCountdownBeep(count);

  const tick = setInterval(() => {
    count--;
    if (count > 0) {
      countdownOverlay.textContent = count;
      playCountdownBeep(count);
    } else if (count === 0) {
      countdownOverlay.textContent = 'GO!';
      countdownOverlay.style.color = 'var(--success)';
      playCountdownBeep(0);
    } else {
      clearInterval(tick);
      countdownOverlay.style.opacity = '0';
      countdownOverlay.style.color = 'white';
      raceRunning = true;
      raceStart = performance.now();
      lastTime = 0;
      animId = requestAnimationFrame(gameLoop);
      setStatus('Race in progress…');
    }
  }, 800);
}

function spawnMarbles() {
  marbles = [];
  finishOrder = [];
  const W = canvas.width;
  const spacing = Math.min(60, (W - 40) / players.length);
  const startX = (W - spacing * (players.length - 1)) / 2;
  players.forEach((p, i) => {
    const x = startX + i * spacing;
    marbles.push(new Marble(x, 30, p.color, p.name));
  });
}

function showPodium() {
  podiumPlaces.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  const classes = ['p1','p2','p3'];
  const top = finishOrder.slice(0, 3);
  top.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'podium-place ' + (classes[i] || '') + (i === 0 ? ' winner-pulse' : '');
    div.innerHTML = `
      <span class="podium-medal">${medals[i] || ''}</span>
      <span class="podium-dot" style="background:${f.color}"></span>
      <span class="podium-name">${sanitize(f.name)}</span>
      <span class="podium-time">${f.time.toFixed(2)}s</span>
    `;
    div.style.animation = 'cardFlipIn 0.5s cubic-bezier(0.22, 1.2, 0.36, 1) both';
    div.style.animationDelay = (i * 0.15) + 's';
    podiumPlaces.appendChild(div);
  });
  podiumOverlay.classList.add('visible');
  document.querySelector('.podium-entry')?.classList.add('winner-pulse');
  setStatus(`🏆 Winner: ${sanitize(finishOrder[0]?.name || '?')} — Race complete!`);
}

function resetRace() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  raceRunning = false;
  raceFinished = false;
  marbles = [];
  finishOrder = [];
  lastTime = 0;
  startBtn.disabled = players.length === 0;
  genTrackBtn.disabled = false;
  podiumOverlay.classList.remove('visible');
  render();
  setStatus(players.length > 0 ? `${players.length} player(s) ready` : 'Waiting for players…');
  updatePlayerList();
}

/* ═══════════════════════════════════════════════
   PLAYER MANAGEMENT
   ═══════════════════════════════════════════════ */
function sanitize(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function addPlayer(name) {
  name = String(name).trim().slice(0, 32);
  if (!name) return false;
  if (players.some(p => p.name === name)) return false;
  const colorIndex = players.length % MARBLE_COLORS.length;
  players.push({ name, color: MARBLE_COLORS[colorIndex], colorIndex });
  updatePlayerList();
  startBtn.disabled = raceRunning || raceFinished;
  setStatus(`${players.length} player(s) ready`);
  return true;
}

function removePlayer(name) {
  players = players.filter(p => p.name !== name);
  // Re-assign colors by position
  players.forEach((p, i) => { p.color = MARBLE_COLORS[i % MARBLE_COLORS.length]; p.colorIndex = i; });
  updatePlayerList();
  if (players.length === 0) {
    startBtn.disabled = true;
    setStatus('Waiting for players…');
  } else {
    setStatus(`${players.length} player(s) ready`);
  }
}

function updatePlayerList() {
  playerCount.textContent = players.length;
  noPlayers.style.display = players.length === 0 ? 'block' : 'none';
  playerList.innerHTML = '';

  players.forEach((p, i) => {
    const rank = finishOrder.findIndex(f => f.name === p.name && f.color === p.color);
    const medals = ['🥇','🥈','🥉'];
    const rankStr = rank >= 0 ? medals[rank] || `#${rank+1}` : '';

    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `
      <span class="marble-dot" style="background:${p.color}"></span>
      <span class="player-name">${sanitize(p.name)}</span>
      <span class="player-rank">${rankStr}</span>
      <button class="player-remove" data-name="${sanitize(p.name)}" title="Remove" aria-label="Remove ${sanitize(p.name)}">✕</button>
    `;
    playerList.appendChild(div);
  });

  emptyState.style.display = (players.length === 0 && !raceRunning) ? 'block' : 'none';
}

/* ═══════════════════════════════════════════════
   CANVAS SIZING
   ═══════════════════════════════════════════════ */
function resizeCanvas() {
  const area = document.getElementById('race-area');
  const W = area.clientWidth;
  const H = area.clientHeight;
  canvas.width = W;
  canvas.height = H;
  generateTrack();
  if (!raceRunning) render();
}

/* ═══════════════════════════════════════════════
   STATUS BAR
   ═══════════════════════════════════════════════ */
function setStatus(msg) {
  statusBar.textContent = msg;
}

/* ═══════════════════════════════════════════════
   POSTMESSAGE API
   ═══════════════════════════════════════════════ */
window.addEventListener('message', (e) => {
  const data = e.data;
  if (!data || typeof data.type !== 'string') return;

  switch (data.type) {
    case 'marble:join':
      if (data.name) addPlayer(data.name);
      break;
    case 'marble:start':
      if (!raceRunning && !raceFinished && players.length > 0) startCountdown();
      break;
    case 'marble:winner':
      if (data.winner) {
        // External winner override (ignored if race already determined internally)
        break;
      }
      break;
    case 'marble:clear':
      players = [];
      resetRace();
      break;
    case 'marble:names':
      if (e.source) e.source.postMessage({ type: 'marble:names', names: players.map(p => p.name) }, '*');
      break;
  }
});

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════ */
startBtn.addEventListener('click', () => {
  if (raceFinished) { resetRace(); return; }
  if (!raceRunning && players.length > 0) startCountdown();
});

genTrackBtn.addEventListener('click', () => {
  trackGenSeed = Math.random();
  generateTrack();
  if (!raceRunning) render();
});

addBtn.addEventListener('click', () => {
  if (addPlayer(nameInput.value)) nameInput.value = '';
  nameInput.focus();
});

nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (addPlayer(nameInput.value)) nameInput.value = '';
  }
});

bulkAddBtn.addEventListener('click', () => {
  const lines = bulkInput.value.split('\n').map(l => l.trim()).filter(Boolean);
  lines.forEach(addPlayer);
  bulkInput.value = '';
});

clearBtn.addEventListener('click', () => {
  players = [];
  resetRace();
});

playerList.addEventListener('click', (e) => {
  const btn = e.target.closest('.player-remove');
  if (btn) {
    const name = btn.dataset.name;
    // Decode HTML entities back for matching
    const decoded = name.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    removePlayer(decoded);
    if (!raceRunning) render();
  }
});

soundToggle.addEventListener('change', () => { soundEnabled = soundToggle.checked; });

podiumDismiss.addEventListener('click', () => {
  podiumOverlay.classList.remove('visible');
  resetRace();
});

adminToggle.addEventListener('click', () => {
  adminPanel.classList.toggle('hidden');
});

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speedMult = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Theme buttons
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.documentElement.setAttribute('data-theme', btn.dataset.theme);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (!raceRunning) render();
  });
});

// Spacebar to start
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    if (raceFinished) { resetRace(); return; }
    if (!raceRunning && players.length > 0) startCountdown();
  }
});

// Resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeCanvas, 120);
});

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
function init() {
  // Apply URL params
  if (isBgTransparent) document.body.classList.add('transparent-bg');
  document.documentElement.setAttribute('data-theme', initTheme);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === initTheme);
  });

  if (!isAdmin) {
    adminPanel.classList.add('hidden');
    adminToggle.style.display = 'none';
  }

  // Size canvas before generate
  resizeCanvas();

  // Pre-load names from URL
  initNames.forEach(addPlayer);

  // Initial render
  render();
  // Auto-focus name input for fast entry
  if (isAdmin) setTimeout(() => nameInput.focus(), 100);
}

init();

})(); // end IIFE
</script>
</body>
</html>
