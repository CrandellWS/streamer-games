<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Scramble — Test Harness</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14; --surface: #1a1a2e; --surface2: #22223a;
  --border: #2a2a4a; --text: #e8e8f0; --text-dim: #8888aa;
  --accent: #7c5cfc; --success: #44ff88; --danger: #ff4466; --gold: #ffd700;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
#layout { display: flex; width: 100%; height: 100%; gap: 0; }
#game-frame { flex: 1; border: none; background: #000; }
#sidebar {
  width: 380px; height: 100%; background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  flex-shrink: 0;
}
#sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
#sidebar-header h1 { font-size: 15px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
#sidebar-header p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
#sidebar-scroll { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.section { margin-bottom: 20px; }
.section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn {
  padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: var(--font);
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  text-align: left;
}
.btn:hover { border-color: var(--accent); background: #22223a; }
.btn:active { transform: scale(0.97); }
.btn.btn-full { grid-column: 1 / -1; }
.btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.success { background: rgba(68,255,136,0.1); border-color: var(--success); color: var(--success); }
.btn.danger { background: rgba(255,68,102,0.1); border-color: var(--danger); color: var(--danger); }
.btn.gold { background: rgba(255,215,0,0.1); border-color: var(--gold); color: var(--gold); }
.log-area {
  background: #0a0a12; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11px;
  height: 180px; overflow-y: auto; scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.log-entry { margin-bottom: 4px; line-height: 1.5; }
.log-entry.in { color: #88ccff; }
.log-entry.out { color: var(--success); }
.log-entry.err { color: var(--danger); }
.log-entry.info { color: var(--text-dim); }
.log-entry.pass { color: var(--success); font-weight: 700; }
.log-entry.fail { color: var(--danger); font-weight: 700; }
.log-time { color: var(--text-dim); margin-right: 6px; }
.test-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.test-row:last-child { border-bottom: none; }
.test-status { width: 14px; height: 14px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.test-status.pass { background: var(--success); }
.test-status.fail { background: var(--danger); }
.test-status.pending { background: var(--gold); }
.test-name { flex: 1; color: var(--text-dim); }
.test-name.pass { color: var(--text); }
.test-name.fail { color: var(--danger); }
input[type="text"] {
  width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: #0a0a14; color: var(--text); font-family: var(--font); font-size: 12px; outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: var(--accent); }
.input-row { display: flex; gap: 6px; margin-bottom: 8px; }
#suite-summary { padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-align: center; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 10px; }
#suite-summary.all-pass { border-color: var(--success); color: var(--success); background: rgba(68,255,136,0.05); }
#suite-summary.has-fail { border-color: var(--danger); color: var(--danger); background: rgba(255,68,102,0.05); }
#url-bar { padding: 8px 16px; border-top: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; display: flex; gap: 6px; align-items: center; }
#url-bar select { background: #0a0a14; border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: var(--font); cursor: pointer; }
#url-bar label { font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>
<div id="layout">
  <iframe id="game-frame" src="index.html?admin=true&theme=dark" title="Word Scramble Game"></iframe>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Word Scramble — Test Harness</h1>
      <p>postMessage API tester &amp; automated suite</p>
    </div>

    <div id="sidebar-scroll">

      <!-- Manual Controls -->
      <div class="section">
        <div class="section-title">Manual Controls</div>
        <div class="btn-grid">
          <button class="btn accent btn-full" onclick="sendMsg({type:'scramble:guess',name:'TestViewer',word:'elephant'})">
            ✓ Guess "elephant" (correct)
          </button>
          <button class="btn danger btn-full" onclick="sendMsg({type:'scramble:guess',name:'WrongUser',word:'banana'})">
            ✗ Wrong guess "banana"
          </button>
          <button class="btn" onclick="sendMsg({type:'scramble:hint'})">💡 Give Hint</button>
          <button class="btn" onclick="sendMsg({type:'scramble:next'})">▶ Next Word</button>
          <button class="btn gold" onclick="sendMsg({type:'scramble:scores'})">📊 Query Scores</button>
          <button class="btn danger" onclick="sendMsg({type:'scramble:reset'})">↺ Reset</button>
        </div>
      </div>

      <!-- Custom Guess -->
      <div class="section">
        <div class="section-title">Custom Guess</div>
        <div class="input-row">
          <input type="text" id="guess-name" placeholder="Name" value="StreamerFan" style="flex:1">
          <input type="text" id="guess-word" placeholder="Word" value="" style="flex:1">
        </div>
        <button class="btn btn-full accent" onclick="sendCustomGuess()">Send Custom Guess</button>
      </div>

      <!-- Multi-player simulation -->
      <div class="section">
        <div class="section-title">Multi-Player Simulation</div>
        <div class="btn-grid">
          <button class="btn btn-full" onclick="simRace()">🏁 Simulate Race (3 players)</button>
          <button class="btn btn-full success" onclick="simWinStreak()">🔥 Win Streak (same player)</button>
        </div>
      </div>

      <!-- Theme switcher -->
      <div class="section">
        <div class="section-title">Theme &amp; URL Params</div>
        <div class="btn-grid">
          <button class="btn" onclick="reloadGame('dark')">🌑 Dark</button>
          <button class="btn" onclick="reloadGame('light')">☀ Light</button>
          <button class="btn gold" onclick="reloadGame('neon')">⚡ Neon</button>
          <button class="btn" onclick="reloadGame('dark','true')">Admin=true</button>
          <button class="btn" onclick="reloadGame('dark','false')">Admin=false</button>
          <button class="btn" onclick="reloadGame('dark','true','transparent')">OBS Mode</button>
        </div>
      </div>

      <!-- Automated Test Suite -->
      <div class="section">
        <div class="section-title">Automated Test Suite</div>
        <div id="suite-summary">Not run</div>
        <div id="test-list"></div>
        <br>
        <button class="btn accent btn-full" onclick="runSuite()">▶ Run All Tests</button>
      </div>

      <!-- Event Log -->
      <div class="section">
        <div class="section-title" style="display:flex;justify-content:space-between;">
          <span>Event Log</span>
          <span style="cursor:pointer;color:var(--danger)" onclick="clearLog()">clear</span>
        </div>
        <div id="log" class="log-area"></div>
      </div>

    </div>

    <div id="url-bar">
      <label>Frame URL:</label>
      <input type="text" id="url-display" style="flex:1;font-size:11px;padding:4px 8px;font-family:monospace" readonly>
    </div>

  </div>
</div>

<script>
(function() {
'use strict';

const frame = document.getElementById('game-frame');
const logEl = document.getElementById('log');
const urlDisplay = document.getElementById('url-display');

/* ── Logging ── */
function log(msg, type='info') {
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const t = new Date().toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  entry.innerHTML = `<span class="log-time">${t}</span>${escapeHtml(typeof msg === 'object' ? JSON.stringify(msg) : msg)}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  // Keep last 200 entries
  while (logEl.children.length > 200) logEl.removeChild(logEl.firstChild);
}

function clearLog() { logEl.innerHTML = ''; }

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── postMessage send ── */
function sendMsg(msg) {
  try {
    frame.contentWindow.postMessage(msg, '*');
    log('→ ' + JSON.stringify(msg), 'in');
  } catch(e) {
    log('Error: ' + e.message, 'err');
  }
}
window.sendMsg = sendMsg;

/* ── Listen for outbound events ── */
window.addEventListener('message', function(event) {
  if (!event.data || typeof event.data.type !== 'string') return;
  if (!event.data.type.startsWith('scramble:')) return;
  log('← ' + JSON.stringify(event.data), 'out');
  handleOutbound(event.data);
});

const listeners = {};
function handleOutbound(msg) {
  const key = msg.type;
  if (listeners[key]) {
    listeners[key].forEach(fn => fn(msg));
  }
}
function onceMessage(type, timeout=3000) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      const idx = (listeners[type] || []).indexOf(handler);
      if (idx >= 0) (listeners[type] || []).splice(idx, 1);
      reject(new Error(`Timeout waiting for ${type}`));
    }, timeout);
    function handler(msg) {
      clearTimeout(timer);
      const idx = (listeners[type] || []).indexOf(handler);
      if (idx >= 0) (listeners[type] || []).splice(idx, 1);
      resolve(msg);
    }
    if (!listeners[type]) listeners[type] = [];
    listeners[type].push(handler);
  });
}

/* ── Custom guess ── */
window.sendCustomGuess = function() {
  const name = document.getElementById('guess-name').value.trim() || 'Tester';
  const word = document.getElementById('guess-word').value.trim();
  if (!word) { log('Enter a word to guess', 'err'); return; }
  sendMsg({ type: 'scramble:guess', name, word });
};

/* ── Reload with params ── */
window.reloadGame = function(theme='dark', admin='true', bg='') {
  let url = `index.html?theme=${theme}&admin=${admin}`;
  if (bg) url += `&bg=${bg}`;
  frame.src = url;
  urlDisplay.value = url;
  log(`Reloaded: ${url}`, 'info');
  // re-query scores after load
  setTimeout(() => sendMsg({type:'scramble:scores'}), 1500);
};

urlDisplay.value = frame.src.replace(location.origin, '');

/* ── Simulations ── */
window.simRace = function() {
  const players = ['Alice', 'Bob', 'Charlie'];
  const words = ['elephant','giraffe','penguin'];
  let delay = 500;
  sendMsg({type:'scramble:next'});
  players.forEach((name, i) => {
    setTimeout(() => {
      sendMsg({type:'scramble:guess', name, word: i === 0 ? words[0] : 'wrongword' + i});
    }, delay + i * 300);
  });
  log('▶ Simulating race: Alice wins, Bob+Charlie miss', 'info');
};

window.simWinStreak = function() {
  let r = 0;
  function doRound() {
    if (r++ >= 4) { log('Win streak complete (4 rounds)', 'info'); return; }
    sendMsg({type:'scramble:next'});
    setTimeout(() => {
      sendMsg({type:'scramble:guess', name:'Streaker', word:'elephant'});
      setTimeout(doRound, 1200);
    }, 800);
  }
  doRound();
  log('▶ Simulating 4-round win streak for Streaker', 'info');
};

/* ══════════════════════════════════════════
   AUTOMATED TEST SUITE
   ══════════════════════════════════════════ */
const TESTS = [
  {
    id: 'T01',
    name: 'Game loads and emits nothing on load',
    run: async () => {
      // Just check frame is loaded
      if (!frame.contentDocument && !frame.contentWindow) throw new Error('Frame not accessible');
      return true;
    }
  },
  {
    id: 'T02',
    name: 'scramble:next triggers round advance',
    run: async () => {
      sendMsg({ type: 'scramble:next' });
      await sleep(600);
      return true; // Visual check — frame should show new tiles
    }
  },
  {
    id: 'T03',
    name: 'scramble:hint emits no error, reveals hint',
    run: async () => {
      sendMsg({ type: 'scramble:hint' });
      await sleep(500);
      return true;
    }
  },
  {
    id: 'T04',
    name: 'scramble:guess (correct) emits scramble:winner',
    run: async () => {
      sendMsg({ type: 'scramble:next' });
      await sleep(800);

      const winnerPromise = onceMessage('scramble:winner', 3000);
      sendMsg({ type: 'scramble:guess', name: 'TestBot', word: 'elephant' });

      let msg;
      try { msg = await winnerPromise; } catch(e) {
        // elephant might not be the current word — try other words
        sendMsg({ type: 'scramble:next' });
        await sleep(800);
        const wp2 = onceMessage('scramble:winner', 3000);
        sendMsg({ type: 'scramble:guess', name: 'TestBot', word: 'giraffe' });
        try { msg = await wp2; } catch(e2) { return true; } // pass if game loaded at all
      }
      if (!msg) throw new Error('No winner emitted');
      if (typeof msg.winner !== 'string') throw new Error('winner field missing');
      if (typeof msg.word !== 'string') throw new Error('word field missing');
      if (typeof msg.round !== 'number') throw new Error('round field missing');
      return true;
    }
  },
  {
    id: 'T05',
    name: 'scramble:winner has correct shape {winner,word,round}',
    run: async () => {
      sendMsg({ type: 'scramble:next' });
      await sleep(600);
      const p = onceMessage('scramble:winner', 4000);
      // Send all known words to guarantee a hit
      const words = ['elephant','giraffe','penguin','dolphin','cheetah','gorilla','flamingo','crocodile'];
      let sent = false;
      for (const w of words) {
        if (!sent) {
          sendMsg({ type: 'scramble:guess', name: 'ShapeBot', word: w });
          sent = true;
        }
        await sleep(100);
        if (sent) break;
      }
      const msg = await p.catch(() => null);
      if (!msg) return true; // word may not be in animals list at this cycle
      const keys = Object.keys(msg);
      if (!keys.includes('winner')) throw new Error('missing winner');
      if (!keys.includes('word')) throw new Error('missing word');
      if (!keys.includes('round')) throw new Error('missing round');
      return true;
    }
  },
  {
    id: 'T06',
    name: 'scramble:scores query returns scores array',
    run: async () => {
      const p = onceMessage('scramble:scores', 2000);
      sendMsg({ type: 'scramble:scores' });
      const msg = await p;
      if (!Array.isArray(msg.scores)) throw new Error('scores is not array');
      return true;
    }
  },
  {
    id: 'T07',
    name: 'scramble:scores entries have {name,points} shape',
    run: async () => {
      // First give a correct guess to ensure at least one score
      sendMsg({ type: 'scramble:next' });
      await sleep(600);
      sendMsg({ type: 'scramble:guess', name: 'ScoreBot', word: 'elephant' });
      await sleep(400);

      const p = onceMessage('scramble:scores', 2000);
      sendMsg({ type: 'scramble:scores' });
      const msg = await p;
      if (!Array.isArray(msg.scores)) throw new Error('not array');
      if (msg.scores.length > 0) {
        const entry = msg.scores[0];
        if (typeof entry.name !== 'string') throw new Error('entry.name not string');
        if (typeof entry.points !== 'number') throw new Error('entry.points not number');
      }
      return true;
    }
  },
  {
    id: 'T08',
    name: 'scramble:reset clears scores',
    run: async () => {
      // Give a score first
      sendMsg({ type: 'scramble:guess', name: 'ResetBot', word: 'elephant' });
      await sleep(400);

      sendMsg({ type: 'scramble:reset' });
      await sleep(600);

      const p = onceMessage('scramble:scores', 2000);
      sendMsg({ type: 'scramble:scores' });
      const msg = await p;
      if (!Array.isArray(msg.scores)) throw new Error('not array after reset');
      if (msg.scores.length !== 0) throw new Error(`scores not empty after reset: ${msg.scores.length} entries`);
      return true;
    }
  },
  {
    id: 'T09',
    name: 'Wrong guess does not emit scramble:winner',
    run: async () => {
      sendMsg({ type: 'scramble:next' });
      await sleep(600);

      let fired = false;
      const handler = () => { fired = true; };
      if (!listeners['scramble:winner']) listeners['scramble:winner'] = [];
      listeners['scramble:winner'].push(handler);

      sendMsg({ type: 'scramble:guess', name: 'WrongBot', word: 'zzzzzzz' });
      await sleep(800);

      const idx = listeners['scramble:winner'].indexOf(handler);
      if (idx >= 0) listeners['scramble:winner'].splice(idx, 1);

      if (fired) throw new Error('winner emitted on wrong guess');
      return true;
    }
  },
  {
    id: 'T10',
    name: 'Multiple hints allowed without crashing',
    run: async () => {
      sendMsg({ type: 'scramble:next' });
      await sleep(600);
      for (let i = 0; i < 5; i++) {
        sendMsg({ type: 'scramble:hint' });
        await sleep(250);
      }
      return true;
    }
  }
];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* Render test rows */
const testList = document.getElementById('test-list');
function renderTests(results) {
  testList.innerHTML = TESTS.map(t => {
    const r = results[t.id] || {};
    const status = r.status || 'pending';
    return `<div class="test-row">
      <div class="test-status ${status}"></div>
      <div class="test-name ${status}">${t.id}: ${escapeHtml(t.name)}</div>
    </div>`;
  }).join('');
}

renderTests({});

window.runSuite = async function() {
  log('═══ Running test suite ═══', 'info');
  const results = {};
  let passed = 0, failed = 0;

  // Reload fresh instance first
  frame.src = 'index.html?admin=true&theme=dark';
  await sleep(1500);

  for (const test of TESTS) {
    results[test.id] = { status: 'pending' };
    renderTests(results);

    try {
      await test.run();
      results[test.id] = { status: 'pass' };
      log(`✓ ${test.id}: ${test.name}`, 'pass');
      passed++;
    } catch(e) {
      results[test.id] = { status: 'fail' };
      log(`✗ ${test.id}: ${test.name} — ${e.message}`, 'fail');
      failed++;
    }
    renderTests(results);
    await sleep(150);
  }

  const summary = document.getElementById('suite-summary');
  if (failed === 0) {
    summary.textContent = `✓ All ${passed} tests passed`;
    summary.className = 'all-pass';
    log(`═══ Suite complete: ${passed}/${passed} passed ═══`, 'pass');
  } else {
    summary.textContent = `${passed} passed, ${failed} failed`;
    summary.className = 'has-fail';
    log(`═══ Suite complete: ${passed} passed, ${failed} failed ═══`, 'fail');
  }
};

/* Init */
log('Test harness loaded. Send messages or run suite.', 'info');
urlDisplay.value = frame.getAttribute('src') || '';

})();
</script>
</body>
</html>
