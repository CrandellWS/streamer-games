    var div = document.createElement('div');
    div.className = 'result-item';

    var ballSpan = document.createElement('span');
    ballSpan.className = 'result-ball';
    div.appendChild(ballSpan);

    var nameSpan = document.createElement('span');
    nameSpan.className = 'result-name';
    if (state.results[i].prize) {
      nameSpan.textContent = state.results[i].name + ' \u2192 ' + state.results[i].prize;
    } else {
      nameSpan.textContent = state.results[i].name;
    }
    div.appendChild(nameSpan);

    area.appendChild(div);
  }
}

/* =====================================================================
   PERSISTENCE
   ===================================================================== */
function save(key, val) {
  try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); } catch(e) {}
}

function load(key, fallback) {
  try {
    var v = localStorage.getItem(key);
    if (v === null) return fallback;
    return v;
  } catch(e) { return fallback; }
}

function loadState() {
  state.drama = parseInt(load('pinko_drama', '50'));
  state.mode = load('pinko_mode', 'random');
  state.numDrops = parseInt(load('pinko_numDrops', '1'));
  state.boardSize = load('pinko_boardSize', 'medium');
  state.chaos = load('pinko_chaos', 'off');
  state.winnerMode = load('pinko_winnerMode', 'escalating');
  state.soundOn = load('pinko_soundOn', 'true') === 'true';
  state.theme = load('pinko_theme', 'dark');
  state.boardSeed = parseFloat(load('pinko_boardSeed', String(Math.random())));
  state.gameType = load('pinko_gameType', 'winner');
  try {
    state.players = JSON.parse(load('pinko_players', '[]'));
    if (!Array.isArray(state.players)) state.players = [];
  } catch(e) {
    state.players = [];
  }
  try {
    state.prizes = JSON.parse(load('pinko_prizes', '[]'));
    if (!Array.isArray(state.prizes)) state.prizes = [];
  } catch(e) {
    state.prizes = [];
  }
}

/* =====================================================================
   THEME
   ===================================================================== */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

/* =====================================================================
   URL PARAMETERS
   ===================================================================== */
function parseUrlParams() {
  var params = new URLSearchParams(window.location.search);

  if (params.get('admin') === 'false') {
    state.adminVisible = false;
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('admin-toggle').style.display = 'none';
  }

  if (params.get('bg') === 'transparent') {
    document.body.classList.add('transparent-bg');
  }

  if (params.has('theme')) {
    state.theme = params.get('theme');
  }

  if (params.has('names')) {
    var names = params.get('names').split(',');
    for (var i = 0; i < names.length; i++) {
      var n = names[i].trim();
      if (n) addPlayer(n);
    }
  }
}

/* =====================================================================
   postMessage API — namespace pinko:
   ===================================================================== */
window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || typeof d.type !== 'string' || d.type.indexOf('pinko:') !== 0) return;

  var action = d.type.slice(6);

  if (action === 'add') {
    if (d.names && Array.isArray(d.names)) {
      for (var i = 0; i < d.names.length; i++) addPlayer(d.names[i]);
    } else if (d.name) {
      addPlayer(d.name);
    }
  } else if (action === 'remove') {
    if (d.name) {
      for (var j = 0; j < state.players.length; j++) {
        if (state.players[j] === d.name) { removePlayer(j); break; }
      }
    }
  } else if (action === 'clear') {
    state.players = [];
    state.results = [];
    balls = [];
    state.dropping = false;
    renderPlayerList();
    renderResults();
    save('pinko_players', '[]');
    buildBoard();
  } else if (action === 'start') {
    doDrop();
  } else if (action === 'names') {
    try {
      window.parent.postMessage({ type: 'pinko:names', names: state.players.slice() }, '*');
    } catch(err) {}
  }
});

/* =====================================================================
   INIT
   ===================================================================== */
function init() {
  loadState();
  applyTheme(state.theme);
  resizeCanvas();
  initAdminPanel();
  renderPlayerList();
  renderResults();
  parseUrlParams();
  if (state.players.length > 0 || (state.gameType === 'prize' && state.prizes.length > 0)) buildBoard();
  startLoop();
}

window.addEventListener('resize', function() { resizeCanvas(); });

init();

})();
</script>
