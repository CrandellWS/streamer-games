<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Machine — Streamer Games</title>
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg2: #14141f;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.5);
  --danger: #ff4466;
  --success: #44ff88;
  --panel-width: 360px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --chrome: linear-gradient(135deg, #c8c8d8 0%, #e8e8f0 30%, #a0a0b8 50%, #d0d0e0 70%, #f0f0f8 100%);
  --chrome-border: #8888aa;
  --reel-bg: #0a0a16;
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --bg2: #e8e8f0;
  --surface: #fff;
  --surface2: #f5f5fa;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-dim: #666680;
  --chrome: linear-gradient(135deg, #d8d8e8 0%, #f0f0f8 30%, #b0b0c8 50%, #e0e0f0 70%, #f8f8ff 100%);
  --chrome-border: #9090b0;
  --reel-bg: #1a1a2e;
}

[data-theme="neon"] {
  --bg: #0a0a0a;
  --bg2: #111;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #333;
  --text: #fff;
  --text-dim: #888;
  --accent: #00ffcc;
  --accent-glow: rgba(0,255,204,0.4);
  --gold: #ff00ff;
  --gold-glow: rgba(255,0,255,0.5);
  --chrome: linear-gradient(135deg, #1a2a2a 0%, #00ffcc22 30%, #0a1a1a 50%, #003322 70%, #00ffcc11 100%);
  --chrome-border: #00ffcc;
  --reel-bg: #050510;
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body.transparent-bg { background: transparent !important; }

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
}

#game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════════ */
#admin-panel {
  width: var(--panel-width);
  height: 100%;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  z-index: 100;
  flex-shrink: 0;
}

#admin-panel.hidden {
  transform: translateX(100%);
  opacity: 0;
  position: absolute;
  right: 0; top: 0;
  pointer-events: none;
}

#admin-toggle {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 200;
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
}
#admin-toggle:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.panel-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.panel-header p { font-size: 12px; color: var(--text-dim); }

.panel-section {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.panel-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.input-group { display: flex; gap: 8px; margin-bottom: 8px; }

input[type="text"], textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea {
  resize: vertical;
  min-height: 80px;
  font-size: 12px;
  line-height: 1.6;
}

input[type="number"] {
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  text-align: center;
  width: 80px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="number"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.btn {
  padding: 10px 18px;
  min-height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { filter: brightness(1.15); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-2px); }
.btn-danger { color: var(--danger); border-color: rgba(255,68,102,0.3); }
.btn-danger:hover { background: rgba(255,68,102,0.1); border-color: var(--danger); }
.btn-gold {
  background: linear-gradient(135deg, #b8860b, var(--gold));
  border-color: var(--gold);
  color: #111;
  font-weight: 700;
  box-shadow: 0 4px 16px var(--gold-glow);
}
.btn-gold:hover { filter: brightness(1.1); box-shadow: 0 6px 24px var(--gold-glow); transform: translateY(-2px); }
.btn-sm { padding: 6px 12px; min-height: 32px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-group { display: flex; gap: 8px; }

/* Names list */
.name-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.name-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  transition: all 0.15s;
}
.name-item:hover { border-color: var(--accent); }
.name-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.name-remove {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.name-remove:hover { color: var(--danger); background: rgba(255,68,102,0.1); }

.count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 0 6px;
}

/* Status bar */
#status-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 44px;
}
#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: background 0.3s;
}
#status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
#status-dot.win { background: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
#status-text { flex: 1; }

/* ═══════════════════════════════════════════════
   MODE / SPEED BUTTONS
   ═══════════════════════════════════════════════ */
.mode-btn, .speed-btn {
  flex: 1;
  padding: 8px 6px;
  min-height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.mode-btn:hover, .speed-btn:hover { border-color: var(--accent); color: var(--text); }
.mode-btn.active, .speed-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

/* ═══════════════════════════════════════════════
   WIN FLOOR SLIDER
   ═══════════════════════════════════════════════ */
.slider-wrap { display: flex; flex-direction: column; gap: 6px; }
input[type="range"] {
  width: 100%;
  height: 6px;
  appearance: none;
  -webkit-appearance: none;
  background: var(--surface2);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  border: none;
}
input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  cursor: pointer;
  border: none;
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ═══════════════════════════════════════════════
   TOGGLE / CHECKBOX
   ═══════════════════════════════════════════════ */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: color 0.15s;
}
.toggle-row:hover { color: var(--text); }
.toggle-row input[type="checkbox"] { display: none; }
.toggle-box {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  position: relative;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.toggle-box::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: left 0.2s, background 0.2s;
}
.toggle-row input:checked + .toggle-box {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle-row input:checked + .toggle-box::after {
  left: 19px;
  background: #fff;
}

/* ═══════════════════════════════════════════════
   CREDIT BUTTONS
   ═══════════════════════════════════════════════ */
.credit-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.btn-credit {
  padding: 5px 12px;
  min-height: 32px;
  border-radius: 8px;
  border: 1px solid var(--gold);
  background: rgba(255,215,0,0.08);
  color: var(--gold);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-credit:hover { background: rgba(255,215,0,0.2); }
.btn-credit:active { transform: scale(0.95); }
.credits-balance {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.credits-balance .bal-val {
  color: var(--gold);
  font-size: 20px;
  font-weight: 900;
  text-shadow: 0 0 8px var(--gold-glow);
  font-family: 'Georgia', monospace;
}

/* ═══════════════════════════════════════════════
   PULL LEVER BUTTON
   ═══════════════════════════════════════════════ */
#pull-btn {
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 12px;
  background: linear-gradient(135deg, #cc2200, #ff4422, #cc2200);
  border: 2px solid #ff6644;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,68,34,0.5);
  width: 100%;
  position: relative;
  overflow: hidden;
  min-height: 44px;
}
#pull-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
#pull-btn:hover::before { left: 100%; }
#pull-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
#pull-btn:active { transform: scale(0.98) translateY(0); }
#pull-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ═══════════════════════════════════════════════
   SOUND TOGGLE
   ═══════════════════════════════════════════════ */
#sound-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px 12px;
  min-height: 40px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 13px;
  transition: all 0.2s;
  width: 100%;
}
#sound-toggle:hover { border-color: var(--accent); color: var(--text); }
#sound-icon { font-size: 16px; }

/* ═══════════════════════════════════════════════
   THEME SELECTOR
   ═══════════════════════════════════════════════ */
.theme-buttons { display: flex; gap: 6px; }
.theme-btn {
  flex: 1;
  padding: 8px;
  min-height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.theme-btn:hover { border-color: var(--accent); color: var(--text); }
.theme-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════════
   SLOT MACHINE CABINET
   ═══════════════════════════════════════════════ */
#slot-machine {
  position: relative;
  width: min(680px, 95vw);
  display: flex;
  flex-direction: column;
  align-items: center;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
  transition: transform 0.1s;
}

#cabinet {
  width: 100%;
  background: var(--chrome);
  border-radius: 32px 32px 24px 24px;
  padding: 20px 24px 28px;
  position: relative;
  border: 3px solid var(--chrome-border);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.4),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    0 8px 32px rgba(0,0,0,0.5);
}

#cabinet::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 60px;
  right: 60px;
  height: 20px;
  background: var(--chrome);
  border-radius: 0 0 16px 16px;
  border: 3px solid var(--chrome-border);
  border-top: none;
  box-shadow: 0 8px 16px rgba(0,0,0,0.4);
}

/* ═══════════════════════════════════════════════
   TOP DISPLAY PANEL
   ═══════════════════════════════════════════════ */
#display-panel {
  width: 100%;
  background: #0a0a1a;
  border-radius: 16px;
  padding: 14px 20px;
  margin-bottom: 18px;
  border: 3px solid #222244;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 8px rgba(0,0,0,0.8),
    0 0 20px rgba(124,92,252,0.2);
}

#display-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
}

#display-title {
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(180deg, #fff8c0, var(--gold), #c8980a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
  font-family: 'Georgia', serif;
  position: relative;
  z-index: 1;
}

#led-strip {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  position: relative;
  z-index: 1;
}

.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #330033;
  transition: background 0.15s, box-shadow 0.15s;
}
.led.on-1 { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow), 0 0 16px var(--gold-glow); }
.led.on-2 { background: #ff6600; box-shadow: 0 0 8px rgba(255,102,0,0.8); }
.led.on-3 { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

#win-display {
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  margin-top: 6px;
  min-height: 20px;
  position: relative;
  z-index: 1;
  text-shadow: 0 0 12px var(--gold-glow);
  opacity: 0;
  transition: opacity 0.3s;
}
#win-display.visible { opacity: 1; }

/* ═══════════════════════════════════════════════
   REEL SECTION
   ═══════════════════════════════════════════════ */
#reel-section {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  position: relative;
}

#reels-container {
  flex: 1;
  display: flex;
  gap: 10px;
  background: #050510;
  border-radius: 16px;
  padding: 12px;
  border: 4px solid #1a1a3a;
  box-shadow:
    inset 0 4px 12px rgba(0,0,0,0.9),
    inset 0 -2px 6px rgba(0,0,0,0.5);
  position: relative;
}

#reels-container::after {
  content: '';
  position: absolute;
  left: 8px; right: 8px;
  top: 50%;
  transform: translateY(-50%);
  height: 64px;
  border-top: 2px solid rgba(255,215,0,0.8);
  border-bottom: 2px solid rgba(255,215,0,0.8);
  pointer-events: none;
  z-index: 10;
  box-shadow:
    0 -1px 8px var(--gold-glow),
    0 1px 8px var(--gold-glow);
}

#payline-left, #payline-right {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 11;
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
}
#payline-left {
  left: 2px;
  border-right: 14px solid var(--gold);
  filter: drop-shadow(0 0 4px var(--gold-glow));
}
#payline-right {
  right: 2px;
  border-left: 14px solid var(--gold);
  filter: drop-shadow(0 0 4px var(--gold-glow));
}

.reel-window {
  flex: 1;
  height: 240px;
  background: var(--reel-bg);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  border: 2px solid #0a0a20;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.8),
    inset 0 2px 4px rgba(0,0,0,0.9);
}

.reel-window::before, .reel-window::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  z-index: 5;
  pointer-events: none;
}
.reel-window::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(5,5,16,0.95), transparent);
}
.reel-window::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(5,5,16,0.95), transparent);
}

.reel-strip {
  position: absolute;
  width: 100%;
  top: 0;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.reel-item {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 6px;
  flex-shrink: 0;
}

.reel-badge {
  width: 100%;
  padding: 6px 8px;
  border-radius: 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.3px;
  transition: none;
}

.reel-window.spinning .reel-strip { filter: blur(3px); }
.reel-window.slowing .reel-strip  { filter: blur(1px); }
.reel-window.stopped .reel-strip  { filter: none; }

.reel-window.win-highlight {
  border-color: var(--gold);
  box-shadow:
    0 0 20px var(--gold-glow),
    0 0 40px var(--gold-glow),
    inset 0 0 20px rgba(255,215,0,0.1);
}

/* ═══════════════════════════════════════════════
   LEVER
   ═══════════════════════════════════════════════ */
#lever-assembly {
  width: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-left: 10px;
  position: relative;
  height: 200px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}

#lever-assembly:active { cursor: grabbing; }

#lever-shaft {
  width: 14px;
  background: linear-gradient(90deg, #666, #ccc, #888, #ddd, #666);
  border-radius: 7px;
  position: absolute;
  top: 20px;
  height: 160px;
  transition: height 0.1s ease;
  box-shadow: 2px 0 8px rgba(0,0,0,0.5);
  z-index: 2;
}

#lever-ball {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6644, #cc2200, #880000);
  border: 2px solid #ff4422;
  box-shadow:
    0 4px 12px rgba(200,0,0,0.6),
    inset 0 -2px 4px rgba(0,0,0,0.4),
    inset 0 2px 4px rgba(255,100,68,0.6);
  position: absolute;
  top: 0;
  transition: top 0.1s ease;
  z-index: 3;
  touch-action: none;
}

#lever-base {
  width: 28px;
  height: 20px;
  background: linear-gradient(90deg, #555, #aaa, #777);
  border-radius: 6px 6px 0 0;
  position: absolute;
  bottom: 0;
  z-index: 1;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* Auto-pull CSS animation for auto/turbo mode */
@keyframes autoPullBall {
  0%   { top: 0px; }
  35%  { top: 130px; }
  65%  { top: 140px; }
  100% { top: 0px; }
}
@keyframes autoPullShaft {
  0%   { height: 160px; top: 20px; }
  35%  { height: 20px; top: 150px; }
  65%  { height: 15px; top: 155px; }
  100% { height: 160px; top: 20px; }
}
#lever-assembly.auto-pulling #lever-ball {
  animation: autoPullBall 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
  transition: none !important;
}
#lever-assembly.auto-pulling #lever-shaft {
  animation: autoPullShaft 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
  transition: none !important;
}

/* ═══════════════════════════════════════════════
   BOTTOM PANEL (credits, stats)
   ═══════════════════════════════════════════════ */
#bottom-panel {
  width: calc(100% - 50px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
  padding: 14px 20px;
  background: #0a0a1a;
  border-radius: 12px;
  border: 2px solid #1a1a3a;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
}

.credits-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.credits-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.credits-value {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 10px var(--gold-glow);
  font-family: 'Georgia', monospace;
  letter-spacing: 2px;
  min-width: 56px;
  text-align: center;
}

/* ═══════════════════════════════════════════════
   JACKPOT OVERLAY
   ═══════════════════════════════════════════════ */
#jackpot-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.4s;
}
#jackpot-overlay.visible { opacity: 1; }

#jackpot-text {
  font-size: 56px;
  font-weight: 900;
  font-family: 'Georgia', serif;
  text-transform: uppercase;
  letter-spacing: 8px;
  background: linear-gradient(180deg, #fff8a0, var(--gold), #c87000);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 20px rgba(255,215,0,0.9));
  animation: jackpotBounce 0.5s ease infinite alternate;
  text-align: center;
}

#winner-name-display {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-top: 8px;
  text-shadow: 0 0 20px var(--gold);
  letter-spacing: 2px;
}

@keyframes jackpotBounce {
  from { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 4px 20px rgba(255,215,0,0.9)); }
  to   { transform: scale(1.06) rotate(1deg); filter: drop-shadow(0 4px 40px rgba(255,215,0,1)); }
}

/* ═══════════════════════════════════════════════
   GAME OVER OVERLAY
   ═══════════════════════════════════════════════ */
#gameover-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.88);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
  border-radius: 32px 32px 24px 24px;
}
#gameover-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
#gameover-box {
  text-align: center;
  padding: 24px 32px;
  max-width: 380px;
  width: 100%;
}
#gameover-title {
  font-size: 42px;
  font-weight: 900;
  font-family: 'Georgia', serif;
  letter-spacing: 5px;
  text-transform: uppercase;
  background: linear-gradient(180deg, #ff9999, #ff4466, #cc0044);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 20px rgba(255,68,102,0.8));
  animation: gameoverPulse 1.2s ease infinite alternate;
  margin-bottom: 6px;
}
@keyframes gameoverPulse {
  from { filter: drop-shadow(0 4px 20px rgba(255,68,102,0.5)); }
  to   { filter: drop-shadow(0 4px 40px rgba(255,68,102,1)); }
}
#gameover-stats {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}
#gameover-podium {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.podium-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  animation: podiumSlideIn 0.4s ease both;
  text-align: left;
}
@keyframes podiumSlideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.podium-rank {
  font-size: 18px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.podium-name {
  flex: 1;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.podium-spin {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
#gameover-no-winners {
  font-size: 14px;
  color: var(--text-dim);
  padding: 12px;
}

/* ═══════════════════════════════════════════════
   COIN PARTICLE CANVAS
   ═══════════════════════════════════════════════ */
#coin-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 40;
}

/* ═══════════════════════════════════════════════
   LED FLASH ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes ledFlash1 {
  0%,100% { background:#ffd700; box-shadow:0 0 8px var(--gold-glow),0 0 16px var(--gold-glow); }
  50%      { background:#330033; box-shadow:none; }
}
@keyframes ledFlash2 {
  0%,100% { background:#ff6600; box-shadow:0 0 8px rgba(255,102,0,0.8); }
  50%      { background:#220000; box-shadow:none; }
}
@keyframes ledFlash3 {
  0%,100% { background:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
  50%      { background:#110022; box-shadow:none; }
}
.led.flashing-1 { animation: ledFlash1 0.25s infinite; }
.led.flashing-2 { animation: ledFlash2 0.25s 0.08s infinite; }
.led.flashing-3 { animation: ledFlash3 0.25s 0.16s infinite; }

/* ═══════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════ */
#empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  pointer-events: none;

}
#empty-state.visible { opacity: 1; }
#empty-state .icon { font-size: 32px; }
#empty-state p { font-size: 13px; color: var(--text-dim); }

/* ═══════════════════════════════════════════════

  :root { --panel-width: 280px; }
  #display-title { font-size: 18px; letter-spacing: 3px; }
  #jackpot-text { font-size: 40px; }
}

<script>
'use strict';
(function() {

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const STATE = {
  names: [],
  spinning: false,
  soundEnabled: true,
  totalSpins: 0,
  totalWins: 0,
  adminVisible: true,
  audioCtx: null,
  coinAnimId: null,
  coins: [],
  spinTimeouts: [],
  // Game mode
  mode: 'spintillx',       // 'spintillx' | 'creditstack'
  winnersNeeded: 1,
  credits: 0,
  removeWinners: true,
  winFloor: 50,             // 0-100 slider value
  pullsSinceLastWin: 0,
  sessionWinners: [],       // [{name, spin}]
  speed: 'manual',         // 'manual' | 'auto' | 'turbo'
  autoInterval: null,
  gameOver: false,
  autoWinPause: false,
};

const REEL_COUNT = 3;
const ITEM_HEIGHT = 64;
const REEL_WINDOW_HEIGHT = 200;
const PAYLINE_CENTER = REEL_WINDOW_HEIGHT / 2;

/* ═══════════════════════════════════════════════
   COLOR PALETTES
   ═══════════════════════════════════════════════ */
const BADGE_COLORS = [
  { bg: 'rgba(124,92,252,0.25)', border: 'rgba(124,92,252,0.6)', text: '#c8b0ff' },
  { bg: 'rgba(255,100,50,0.25)', border: 'rgba(255,100,50,0.6)', text: '#ffb090' },
  { bg: 'rgba(68,255,136,0.25)', border: 'rgba(68,255,136,0.6)', text: '#80ffa8' },
  { bg: 'rgba(255,215,0,0.25)',  border: 'rgba(255,215,0,0.6)',  text: '#ffe566' },
  { bg: 'rgba(0,200,255,0.25)',  border: 'rgba(0,200,255,0.6)',  text: '#80e8ff' },
  { bg: 'rgba(255,80,160,0.25)', border: 'rgba(255,80,160,0.6)', text: '#ffb0d8' },
  { bg: 'rgba(160,255,80,0.25)', border: 'rgba(160,255,80,0.6)', text: '#c8ffb0' },
  { bg: 'rgba(255,180,0,0.25)',  border: 'rgba(255,180,0,0.6)',  text: '#ffdf80' },
];
const nameColorMap = new Map();
let colorIdx = 0;
function getNameColor(name) {
  if (!nameColorMap.has(name)) {
    nameColorMap.set(name, BADGE_COLORS[colorIdx % BADGE_COLORS.length]);
    colorIdx++;
  }
  return nameColorMap.get(name);
}

/* ═══════════════════════════════════════════════
   AUDIO (Web Audio API)
   ═══════════════════════════════════════════════ */
function getAudioCtx() {
  if (!STATE.audioCtx) {
    STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return STATE.audioCtx;
}

function playSound(type) {
  if (!STATE.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    if (type === 'lever') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.35, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        const creak = Math.sin(2 * Math.PI * (80 + t * 40) * t) * 0.5;
        const noise = (Math.random() * 2 - 1) * 0.15 * (1 - t * 2.5);
        data[i] = (creak + noise) * Math.max(0, 1 - t * 3);
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      src.connect(g); g.connect(ctx.destination);
      src.start(now);
    }

    if (type === 'spin') {
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(160, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.8);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.8);
    }

    if (type === 'click') {
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.3, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.1);
    }

    if (type === 'jackpot') {
      const notes = [523, 659, 784, 1047, 1319];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        const t = now + i * 0.12;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.4);
      });
      const siren = ctx.createOscillator();
      siren.type = 'sawtooth';
      siren.frequency.setValueAtTime(400, now + 0.7);
      siren.frequency.linearRampToValueAtTime(800, now + 1.2);
      siren.frequency.linearRampToValueAtTime(400, now + 1.7);
      siren.frequency.linearRampToValueAtTime(800, now + 2.2);
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0.15, now + 0.7);
      sg.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
      siren.connect(sg); sg.connect(ctx.destination);
      siren.start(now + 0.7); siren.stop(now + 2.5);
    }

    if (type === 'coin') {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200 + Math.random() * 400, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.2);
    }

    if (type === 'gameover') {
      // Descending arpeggio — sad trombone vibes
      const notes = [392, 349, 330, 261];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        const t = now + i * 0.25;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.5);
      });
    }
  } catch(e) { /* audio errors are non-fatal */ }
}

/* ═══════════════════════════════════════════════
   REEL CONSTRUCTION
   ═══════════════════════════════════════════════ */
function buildStrip(names) {
  const strip = [];
  const repeats = Math.max(25, Math.ceil(500 / Math.max(names.length, 1)));
  for (let r = 0; r < repeats; r++) {
    const shuffled = names.slice().sort(() => Math.random() - 0.5);
    strip.push(...shuffled);
  }
  return strip;
}

function createReelItem(name) {
  const div = document.createElement('div');
  div.className = 'reel-item';
  const badge = document.createElement('div');
  badge.className = 'reel-badge';
  const c = getNameColor(name);
  badge.style.background = c.bg;
  badge.style.border = `1px solid ${c.border}`;
  badge.style.color = c.text;
  badge.textContent = escapeHtml(name);
  div.appendChild(badge);
  return div;
}

function getActiveNames() {
  // Names eligible to appear on the reels (not-yet-won, if removeWinners is on)
  if (!STATE.removeWinners) return STATE.names.slice();
  const won = new Set(STATE.sessionWinners.map(w => w.name));
  const active = STATE.names.filter(n => !won.has(n));
  return active.length > 0 ? active : STATE.names.slice();
}

function getEligibleWinners() {
  // Names that can win next spin
  if (!STATE.removeWinners) return STATE.names.slice();
  const won = new Set(STATE.sessionWinners.map(w => w.name));
  const eligible = STATE.names.filter(n => !won.has(n));
  return eligible.length > 0 ? eligible : STATE.names.slice();
}

function populateReels() {
  const names = getActiveNames();
  const isEmpty = names.length === 0;
  document.getElementById('empty-state').classList.toggle('visible', isEmpty);

  for (let r = 0; r < REEL_COUNT; r++) {
    const strip = document.getElementById(`strip-${r}`);
    strip.innerHTML = '';
    if (isEmpty) continue;
    const items = buildStrip(names);
    items.forEach(name => strip.appendChild(createReelItem(name)));
    const startIndex = Math.floor(items.length / 2);
    positionStripAtIndex(strip, startIndex);
    strip._items = items;
    strip._currentIndex = startIndex;
  }
}

function positionStripAtIndex(strip, idx) {
  const offsetY = -(idx * ITEM_HEIGHT) + (PAYLINE_CENTER - ITEM_HEIGHT / 2);
  strip.style.transform = `translateY(${offsetY}px)`;
  strip._currentIndex = idx;
}

/* ═══════════════════════════════════════════════
   WIN DETERMINATION
   ═══════════════════════════════════════════════ */
function getMaxDrought(sliderValue) {
  // slider 0 → 50 max pulls, slider 100 → 1 (guaranteed every time)
  return Math.max(1, Math.round(50 - (sliderValue / 100) * 49));
}

function determineOutcome() {
  const allNames = STATE.names;
  if (allNames.length === 0) return { win: false, results: ['?', '?', '?'] };

  const eligible = getEligibleWinners();
  const maxDrought = getMaxDrought(STATE.winFloor);
  const naturalWin = Math.random() < (1 / allNames.length);
  const forcedWin  = STATE.pullsSinceLastWin >= maxDrought;
  const isWin      = naturalWin || forcedWin;

  if (isWin) {
    const winner = eligible[Math.floor(Math.random() * eligible.length)];
    return { win: true, results: [winner, winner, winner], winner };
  }

  // ~20% chance of near-miss (2 of 3 matching)
  const nearMiss = Math.random() < 0.2 && allNames.length >= 2;
  let results;
  if (nearMiss) {
    const matchName = allNames[Math.floor(Math.random() * allNames.length)];
    const others = allNames.filter(n => n !== matchName);
    const diffName = others.length > 0
      ? others[Math.floor(Math.random() * others.length)]
      : allNames[(allNames.indexOf(matchName) + 1) % allNames.length];
    const mismatchPos = Math.floor(Math.random() * 3);
    results = [matchName, matchName, matchName];
    results[mismatchPos] = diffName;
  } else {
    // Ensure no accidental 3-of-a-kind
    let attempts = 0;
    do {
      results = Array.from({length: 3}, () =>
        allNames[Math.floor(Math.random() * allNames.length)]
      );
      attempts++;
    } while (results[0] === results[1] && results[1] === results[2] && attempts < 10);
  }
  return { win: false, results };
}

/* ═══════════════════════════════════════════════
   SPIN LOGIC
   ═══════════════════════════════════════════════ */
function spin() {
  if (STATE.spinning || STATE.gameOver) return;
  if (STATE.names.length < 1) { setStatus('Add names first!', false); return; }

  // Credit check for Credit Stack mode
  if (STATE.mode === 'creditstack') {
    if (STATE.credits <= 0) {
      setStatus('No credits! Add credits to continue.', false);
      if (STATE.speed !== 'manual') stopAutoSpin();
      return;
    }
    STATE.credits--;
    updateMainDisplay();
  }

  STATE.spinning = true;
  STATE.totalSpins++;
  updateStats();
  setStatus('Spinning...', true);
  clearWinState();

  playSound('lever');
  setTimeout(() => playSound('spin'), 150);

  const outcome = determineOutcome();
  const stopTimes = [1500, 2100, 2700];

  for (let r = 0; r < REEL_COUNT; r++) {
    startReelSpin(r, outcome.results[r], stopTimes[r], r === REEL_COUNT - 1, outcome);
  }
}

function startReelSpin(reelIdx, targetName, stopMs, isLast, outcome) {
  const win_ = document.getElementById(`reel-${reelIdx}`);
  const strip = document.getElementById(`strip-${reelIdx}`);
  if (!strip._items || strip._items.length === 0) {
    if (isLast) finalizeSpin(outcome);
    return;
  }

  win_.classList.remove('stopped', 'slowing');
  win_.classList.add('spinning');

  const startTime = performance.now();
  const spinDuration = stopMs - 300;
  const slowDuration = 300;
  let startY = parseInt(strip.style.transform.replace(/[^-\d.]/g, '')) || 0;
  const fastSpeed = 1.4;

  let animId;
  let slowStartY;
  let slowing = false;
  let currentY = startY;

  function animate(now) {
    const elapsed = now - startTime;

    if (!slowing && elapsed >= spinDuration) {
      slowing = true;
      win_.classList.remove('spinning');
      win_.classList.add('slowing');
      playSound('spin');
      slowStartY = currentY;
    }

    if (!slowing) {
      const y = startY - elapsed * fastSpeed;
      strip.style.transform = `translateY(${y}px)`;
      currentY = y;
      animId = requestAnimationFrame(animate);
    } else {
      const slowElapsed = now - (startTime + spinDuration);
      const progress = Math.min(slowElapsed / slowDuration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      const targetIdx = findBestLandingIndex(strip._items, targetName, slowStartY);
      const targetY = -(targetIdx * ITEM_HEIGHT) + (PAYLINE_CENTER - ITEM_HEIGHT / 2);
      const y = slowStartY + (targetY - slowStartY) * ease;
      strip.style.transform = `translateY(${y}px)`;

      if (progress < 1) {
        animId = requestAnimationFrame(animate);
      } else {
        strip.style.transform = `translateY(${targetY}px)`;
        strip._currentIndex = targetIdx;
        win_.classList.remove('slowing');
        win_.classList.add('stopped');
        playSound('click');
        if (isLast) finalizeSpin(outcome);
      }
    }
  }

  animId = requestAnimationFrame(animate);
  STATE.spinTimeouts.push(animId);
}

function findBestLandingIndex(items, targetName, currentY) {
  const approxIdx = Math.round((-currentY + PAYLINE_CENTER - ITEM_HEIGHT / 2) / ITEM_HEIGHT);
  for (let offset = 0; offset < items.length; offset++) {
    const idx = (approxIdx + offset) % items.length;
    if (items[idx] === targetName) return idx;
  }
  return items.indexOf(targetName) || 0;
}

function finalizeSpin(outcome) {
  STATE.spinning = false;

  if (outcome.win) {
    STATE.totalWins++;
    STATE.pullsSinceLastWin = 0;
    STATE.sessionWinners.push({ name: outcome.winner, spin: STATE.totalSpins });

    if (STATE.removeWinners) {
      // Rebuild reels without this winner
      setTimeout(() => populateReels(), 500);
    }

    triggerWin(outcome.winner, outcome.results);
    updateStats();

    // Check for game over after win
    if (STATE.mode === 'spintillx' && STATE.sessionWinners.length >= STATE.winnersNeeded) {
      // Wait for jackpot celebration, then game over
      STATE.autoWinPause = true;
      setTimeout(() => {
        STATE.autoWinPause = false;
        stopAutoSpin();
        showGameOver();
      }, 6000);
    } else if (STATE.speed !== 'manual') {
      // In auto/turbo: pause 2s after win so celebration can play
      STATE.autoWinPause = true;
      setTimeout(() => { STATE.autoWinPause = false; }, 2200);
    }

    // Credit Stack: game over if credits ran out on this pull
    if (STATE.mode === 'creditstack' && STATE.credits <= 0) {
      const alreadyScheduled = STATE.mode === 'spintillx' &&
        STATE.sessionWinners.length >= STATE.winnersNeeded;
      if (!alreadyScheduled) {
        setTimeout(() => {
          if (!STATE.gameOver) { stopAutoSpin(); showGameOver(); }
        }, 6500);
      }
    }
  } else {
    STATE.pullsSinceLastWin++;
    setStatus(`${outcome.results.join('  ·  ')}`, false);
    emitMessage('slots:result', { symbols: outcome.results });

    // Credit Stack: game over when credits hit 0 after a losing spin
    if (STATE.mode === 'creditstack' && STATE.credits <= 0) {
      setTimeout(() => {
        if (!STATE.gameOver) { stopAutoSpin(); showGameOver(); }
      }, 1200);
    }
  }
}

/* ═══════════════════════════════════════════════
   WIN STATE
   ═══════════════════════════════════════════════ */
function triggerWin(winner, symbols) {
  for (let r = 0; r < REEL_COUNT; r++) {
    document.getElementById(`reel-${r}`).classList.add('win-highlight');
  }
  const wd = document.getElementById('win-display');
  wd.textContent = `🎉 ${escapeHtml(winner)} WINS! 🎉`;
  wd.classList.add('visible');
  document.getElementById('jackpot-overlay').classList.add('visible');
  document.getElementById('winner-name-display').textContent = winner;
  startLedFlash();
  startCoinShower();
  playSound('jackpot');
  setStatus(`🏆 WINNER: ${winner}!`, false, true);
  emitMessage('slots:winner', { winner, symbols });
  setTimeout(() => clearWinState(), 6000);
}

function clearWinState() {
  for (let r = 0; r < REEL_COUNT; r++) {
    document.getElementById(`reel-${r}`).classList.remove('win-highlight');
  }
  document.getElementById('win-display').classList.remove('visible');
  document.getElementById('jackpot-overlay').classList.remove('visible');
  stopLedFlash();
  stopCoinShower();
  updateLedIdle();
}

/* ═══════════════════════════════════════════════
   GAME OVER
   ═══════════════════════════════════════════════ */
function showGameOver() {
  if (STATE.gameOver) return;
  STATE.gameOver = true;
  stopAutoSpin();
  clearWinState();
  playSound('gameover');

  const overlay = document.getElementById('gameover-overlay');
  overlay.classList.add('visible');

  const podium = document.getElementById('gameover-podium');
  podium.innerHTML = '';

  if (STATE.sessionWinners.length === 0) {
    const msg = document.createElement('div');
    msg.id = 'gameover-no-winners';
    msg.textContent = 'No winners this session.';
    podium.appendChild(msg);
  } else {
    STATE.sessionWinners.forEach((w, i) => {
      const item = document.createElement('div');
      item.className = 'podium-item';
      item.style.animationDelay = `${i * 0.08}s`;
      const medals = ['🥇','🥈','🥉'];
      const rank = i < 3 ? medals[i] : `${i + 1}.`;
      item.innerHTML = `
        <span class="podium-rank">${rank}</span>
        <span class="podium-name">${escapeHtml(w.name)}</span>
        <span class="podium-spin">spin #${w.spin}</span>
      `;
      const c = getNameColor(w.name);
      item.style.borderColor = c.border;
      podium.appendChild(item);
    });
  }

  const wc = STATE.sessionWinners.length;
  document.getElementById('gameover-stats').textContent =
    `${wc} winner${wc !== 1 ? 's' : ''} from ${STATE.totalSpins} spin${STATE.totalSpins !== 1 ? 's' : ''}`;

  startCoinShower();
  emitMessage('slots:gameover', {
    winners: STATE.sessionWinners.map(w => w.name),
    totalSpins: STATE.totalSpins,
  });
}

function playAgain() {
  STATE.gameOver = false;
  STATE.spinning = false;
  STATE.totalSpins = 0;
  STATE.totalWins = 0;
  STATE.pullsSinceLastWin = 0;
  STATE.sessionWinners = [];
  STATE.autoWinPause = false;
  if (STATE.mode === 'creditstack') STATE.credits = 0;

  document.getElementById('gameover-overlay').classList.remove('visible');
  clearWinState();
  stopCoinShower();
  populateReels();
  updateStats();
  updateMainDisplay();
  setStatus('Ready — pull the lever!', false);

  // Restart auto if still in auto/turbo mode
  if (STATE.speed !== 'manual') {
    // Wait a beat before resuming
    setTimeout(() => { if (!STATE.gameOver) startAutoSpin(); }, 1000);
  }
}

/* ═══════════════════════════════════════════════
   AUTO / TURBO SPEED
   ═══════════════════════════════════════════════ */
function setSpeed(speed) {
  STATE.speed = speed;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.speed === speed);
  });
  const stopBtn  = document.getElementById('speed-stop');
  const pullBtn  = document.getElementById('pull-btn');
  if (speed === 'manual') {
    stopAutoSpin();
    stopBtn.style.display = 'none';
    pullBtn.style.display = '';
  } else {
    stopBtn.style.display = '';
    pullBtn.style.display = 'none';
    startAutoSpin();
  }
  try { localStorage.setItem('slots_speed', speed); } catch(e) {}
}

function startAutoSpin() {
  stopAutoSpin();
  if (STATE.gameOver) return;
  const ms = STATE.speed === 'turbo' ? 1000 : 3000;
  STATE.autoInterval = setInterval(() => {
    if (STATE.spinning || STATE.autoWinPause || STATE.gameOver) return;
    if (STATE.mode === 'creditstack' && STATE.credits <= 0) { stopAutoSpin(); return; }
    animateLeverAuto();
    // Small delay so the lever animation is visible before spin begins
    setTimeout(() => spin(), 280);
  }, ms);
}

function stopAutoSpin() {
  if (STATE.autoInterval) { clearInterval(STATE.autoInterval); STATE.autoInterval = null; }
}

function animateLeverAuto() {
  const assembly = document.getElementById('lever-assembly');
  assembly.classList.remove('auto-pulling');
  void assembly.offsetWidth; // force reflow to restart animation
  assembly.classList.add('auto-pulling');
  setTimeout(() => assembly.classList.remove('auto-pulling'), 650);
  playSound('lever');
}

/* ═══════════════════════════════════════════════
   CREDITS
   ═══════════════════════════════════════════════ */
function addCredits(amount) {
  STATE.credits += amount;
  updateMainDisplay();
  setStatus(`+${amount} credit${amount !== 1 ? 's' : ''} added!`, false);
  emitMessage('slots:credits', { credits: STATE.credits });
  // If in auto/turbo with no interval (stopped due to 0 credits), restart
  if (STATE.speed !== 'manual' && !STATE.autoInterval && !STATE.gameOver) {
    startAutoSpin();
  }
}

function updateMainDisplay() {
  const labelEl = document.getElementById('credits-label');
  const valueEl = document.getElementById('credits-display');
  const adminEl = document.getElementById('credits-admin-display');
  if (STATE.mode === 'creditstack') {
    labelEl.textContent = 'CREDITS';
    valueEl.textContent = STATE.credits;
  } else {
    labelEl.textContent = 'PROGRESS';
    valueEl.textContent = `${STATE.sessionWinners.length}/${STATE.winnersNeeded}`;
  }
  if (adminEl) adminEl.textContent = STATE.credits;
}

/* ═══════════════════════════════════════════════
   MODE
   ═══════════════════════════════════════════════ */
function setMode(mode) {
  STATE.mode = mode;
  stopAutoSpin();
  // Reset speed to manual on mode switch
  STATE.speed = 'manual';
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.dataset.speed === 'manual'));
  document.getElementById('speed-stop').style.display = 'none';
  document.getElementById('pull-btn').style.display = '';

  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('section-spintillx').style.display = mode === 'spintillx' ? '' : 'none';
  document.getElementById('section-creditstack').style.display = mode === 'creditstack' ? '' : 'none';
  updateMainDisplay();
  try { localStorage.setItem('slots_mode', mode); } catch(e) {}
}

/* ═══════════════════════════════════════════════
   LED ANIMATIONS
   ═══════════════════════════════════════════════ */
function buildLeds() {
  const strip = document.getElementById('led-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const led = document.createElement('div');
    led.className = 'led';
    strip.appendChild(led);
  }
}

function updateLedIdle() {
  document.querySelectorAll('.led').forEach((led, i) => {
    led.className = 'led';
    const phase = i % 3;
    if (phase === 0) led.classList.add('on-1');
    else if (phase === 1) led.classList.add('on-2');
    else led.classList.add('on-3');
  });
}

function startLedFlash() {
  document.querySelectorAll('.led').forEach((led, i) => {
    led.className = 'led';
    const phase = i % 3;
    if (phase === 0) led.classList.add('flashing-1');
    else if (phase === 1) led.classList.add('flashing-2');
    else led.classList.add('flashing-3');
  });
}

function stopLedFlash() { updateLedIdle(); }

/* ═══════════════════════════════════════════════
   COIN SHOWER
   ═══════════════════════════════════════════════ */
function startCoinShower() {
  stopCoinShower();
  const canvas = document.getElementById('coin-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  STATE.coins = [];

  function spawnCoin() {
    STATE.coins.push({
      x: Math.random() * canvas.width,
      y: -20,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      r: 8 + Math.random() * 10,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      gravity: 0.15 + Math.random() * 0.1,
      color: Math.random() < 0.7 ? '#ffd700' : '#ff6600',
      opacity: 1,
    });
    if (Math.random() < 0.3) playSound('coin');
  }

  let spawnInterval = setInterval(spawnCoin, 50);
  setTimeout(() => clearInterval(spawnInterval), 3000);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    STATE.coins = STATE.coins.filter(c => c.y < canvas.height + 40 && c.opacity > 0.05);
    STATE.coins.forEach(c => {
      c.x += c.vx; c.y += c.vy; c.vy += c.gravity; c.rot += c.rotSpeed;
      if (c.y > canvas.height * 0.7) c.opacity -= 0.015;
      ctx.save();
      ctx.globalAlpha = c.opacity;
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      const scaleX = Math.abs(Math.cos(c.rot)) * 0.7 + 0.3;
      ctx.scale(scaleX, 1);
      ctx.beginPath();
      ctx.ellipse(0, 0, c.r, c.r * 0.85, 0, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(-c.r * 0.3, -c.r * 0.3, 0, 0, 0, c.r);
      grad.addColorStop(0, '#fff8a0');
      grad.addColorStop(0.4, c.color);
      grad.addColorStop(1, '#8b6914');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.font = `bold ${Math.floor(c.r * 0.9)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 0);
      ctx.restore();
    });
    STATE.coinAnimId = requestAnimationFrame(animate);
  }
  STATE.coinAnimId = requestAnimationFrame(animate);
}

function stopCoinShower() {
  if (STATE.coinAnimId) { cancelAnimationFrame(STATE.coinAnimId); STATE.coinAnimId = null; }
  STATE.coins = [];
  const canvas = document.getElementById('coin-canvas');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

/* ═══════════════════════════════════════════════
   NAMES MANAGEMENT
   ═══════════════════════════════════════════════ */
function addName(name) {
  const trimmed = name.trim();
  if (!trimmed || trimmed.length > 24) return false;
  STATE.names.push(trimmed);
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
  return true;
}

function removeName(name) {
  STATE.names = STATE.names.filter(n => n !== name);
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
}

function clearNames() {
  STATE.spinTimeouts.forEach(id => cancelAnimationFrame(id));
  STATE.spinTimeouts = [];
  STATE.names = [];
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
}

function renderNameList() {
  const list = document.getElementById('name-list');
  list.innerHTML = '';
  const counts = {};
  STATE.names.forEach(n => { counts[n] = (counts[n] || 0) + 1; });
  Object.keys(counts).forEach(name => {
    const item = document.createElement('div');
    item.className = 'name-item';
    const c = getNameColor(name);
    const dot = document.createElement('div');
    dot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${c.text};flex-shrink:0`;
    const text = document.createElement('div');
    text.className = 'name-item-text';
    text.textContent = name;
    if (counts[name] > 1) {
      const cnt = document.createElement('span');
      cnt.style.cssText = 'margin-left:4px;opacity:0.5;font-size:11px';
      cnt.textContent = `×${counts[name]}`;
      text.appendChild(cnt);
    }
    const removeBtn = document.createElement('button');
    removeBtn.className = 'name-remove';
    removeBtn.textContent = '×';
    removeBtn.title = `Remove "${name}"`;
    removeBtn.addEventListener('click', () => removeName(name));
    item.appendChild(dot);
    item.appendChild(text);
    item.appendChild(removeBtn);
    list.appendChild(item);
  });
}

function updateNameCount() {
  const count = STATE.names.length;
  document.getElementById('name-count').textContent = count;
  document.getElementById('names-count-display').textContent = count;
}

function updateStats() {
  document.getElementById('spins-display').textContent = STATE.totalSpins;
  document.getElementById('wins-display').textContent = STATE.totalWins;
  updateMainDisplay();
}

/* ═══════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════ */
function saveNames() {
  try { localStorage.setItem('slots_names', JSON.stringify(STATE.names)); } catch(e) {}
}
function loadNames() {
  try {
    const saved = localStorage.getItem('slots_names');
    if (saved) STATE.names = JSON.parse(saved);
  } catch(e) {}
}

/* ═══════════════════════════════════════════════
   STATUS
   ═══════════════════════════════════════════════ */
function setStatus(msg, active, win) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.classList.remove('active', 'win');
  if (win) dot.classList.add('win');
  else if (active) dot.classList.add('active');
}

/* ═══════════════════════════════════════════════
   POSTMESSAGE API
   ═══════════════════════════════════════════════ */
function emitMessage(type, data) {
  const msg = Object.assign({ type }, data || {});
  window.parent.postMessage(msg, '*');
  window.dispatchEvent(new MessageEvent('message', { data: msg }));
}

window.addEventListener('message', function(e) {
  const d = e.data;
  if (!d || typeof d.type !== 'string') return;
  switch (d.type) {
    // Inbound: names
    case 'slots:add':
      if (d.name) addName(String(d.name).substring(0, 24));
      if (Array.isArray(d.names)) d.names.forEach(n => addName(String(n).substring(0, 24)));
      break;
    case 'slots:remove':
      if (d.name) removeName(String(d.name));
      break;
    case 'slots:clear':
      clearNames();
      break;
    case 'slots:names':
      emitMessage('slots:names', { names: STATE.names.slice() });
      break;
    // Inbound: game control
    case 'slots:pull':
      if (STATE.speed === 'manual') spin();
      break;
    case 'slots:start':
      spin();
      break;
    case 'slots:auto':
      setSpeed('auto');
      break;
    case 'slots:turbo':
      setSpeed('turbo');
      break;
    case 'slots:stop':
      setSpeed('manual');
      break;
    // Inbound: credits
    case 'slots:addcredits':
      if (typeof d.amount === 'number' && d.amount > 0) addCredits(d.amount);
      break;
    // Inbound: mode / config
    case 'slots:mode':
      if (d.mode === 'spintillx' || d.mode === 'creditstack') setMode(d.mode);
      break;
    case 'slots:setwins':
      if (typeof d.count === 'number' && d.count >= 1) {
        STATE.winnersNeeded = d.count;
        document.getElementById('winners-needed').value = d.count;
        updateMainDisplay();
      }
      break;
  }
});

/* ═══════════════════════════════════════════════
   URL PARAMS
   ═══════════════════════════════════════════════ */
function applyUrlParams() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('bg') === 'transparent') document.body.classList.add('transparent-bg');
  const theme = p.get('theme');
  if (theme && ['dark','light','neon'].includes(theme)) setTheme(theme);
  const admin = p.get('admin');
  if (admin === 'false') {
    STATE.adminVisible = false;
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('admin-toggle').style.display = 'none';
  }
  const names = p.get('names');
  if (names) {
    const rawNames = names.split(',').map(n => n.trim()).filter(n => n);
    [...new Set(rawNames)].forEach(n => addName(n.substring(0, 24)));
  }
}

/* ═══════════════════════════════════════════════
   THEME
   ═══════════════════════════════════════════════ */
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
  try { localStorage.setItem('slots_theme', theme); } catch(e) {}
}

/* ═══════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════ */
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════ */
function bindEvents() {
  // Add name
  document.getElementById('add-btn').addEventListener('click', () => {
    const inp = document.getElementById('name-input');
    if (addName(inp.value)) inp.value = '';
    inp.focus();
  });
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  // Bulk add
  document.getElementById('bulk-add-btn').addEventListener('click', () => {
    const ta = document.getElementById('bulk-input');
    const lines = ta.value.split('\n');
    let added = 0;
    lines.forEach(l => { if (addName(l)) added++; });
    if (added > 0) ta.value = '';
  });

  // Clear
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (STATE.names.length === 0 || confirm('Clear all names?')) clearNames();
  });

  // Pull lever button (manual mode only)
  document.getElementById('pull-btn').addEventListener('click', () => {
    if (STATE.speed === 'manual') spin();
  });

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  // Speed buttons
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => setSpeed(btn.dataset.speed));
  });

  // Stop auto
  document.getElementById('speed-stop').addEventListener('click', () => setSpeed('manual'));

  // Winners needed
  document.getElementById('winners-needed').addEventListener('input', function() {
    const v = parseInt(this.value);
    if (v >= 1) { STATE.winnersNeeded = v; updateMainDisplay(); }
  });

  // Credit buttons
  [1, 5, 10, 25].forEach(amt => {
    document.getElementById(`credit-btn-${amt}`).addEventListener('click', () => addCredits(amt));
  });
  document.getElementById('add-custom-credits').addEventListener('click', () => {
    const inp = document.getElementById('custom-credits');
    const v = parseInt(inp.value);
    if (v >= 1) { addCredits(v); inp.value = ''; }
  });
  document.getElementById('custom-credits').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-custom-credits').click();
  });

  // Remove winners toggle
  document.getElementById('remove-winners-toggle').addEventListener('change', function() {
    STATE.removeWinners = this.checked;
    populateReels();
    try { localStorage.setItem('slots_removewins', this.checked ? '1' : '0'); } catch(e) {}
  });

  // Win floor slider
  document.getElementById('win-floor-slider').addEventListener('input', function() {
    STATE.winFloor = parseInt(this.value);
    try { localStorage.setItem('slots_winfloor', this.value); } catch(e) {}
  });

  // Play again
  document.getElementById('gameover-play-again').addEventListener('click', playAgain);

  // ─────────────────────────────────────────────
  // LEVER DRAG INTERACTION (vertical)
  // ─────────────────────────────────────────────
  (() => {
    const assembly = document.getElementById('lever-assembly');
    const ball = document.getElementById('lever-ball');
    const shaft = document.getElementById('lever-shaft');

    const RESTING_TOP = 0;
    const SHAFT_HEIGHT = 160;
    const SHAFT_TOP = 20;
    const TRIGGER_PERCENT = 0.45;
    const MAX_PULL = SHAFT_HEIGHT;
    const OVERSHOOT = SHAFT_HEIGHT * 0.2;

    let isDragging = false;
    let startY = 0;
    let currentPull = 0;

    function updateLever(pullAmount) {
      pullAmount = Math.max(0, Math.min(pullAmount, MAX_PULL));
      currentPull = pullAmount;
      ball.style.top = pullAmount + 'px';
      const newHeight = SHAFT_HEIGHT - pullAmount;
      shaft.style.height = Math.max(0, newHeight) + 'px';
      shaft.style.top = (SHAFT_TOP + pullAmount) + 'px';
      const progress = pullAmount / MAX_PULL;
      if (progress >= TRIGGER_PERCENT) {
        ball.style.boxShadow = `0 4px 12px rgba(200,0,0,0.6),
          inset 0 -2px 4px rgba(0,0,0,0.4),
          inset 0 2px 4px rgba(255,100,68,0.6),
          0 0 ${20 * progress}px rgba(255,68,34,${0.3 + progress * 0.4})`;
      } else {
        ball.style.boxShadow = '';
      }
    }

    function snapBack() {
      ball.style.transition = 'top 0.4s cubic-bezier(0.22, 1.2, 0.36, 1)';
      shaft.style.transition = 'height 0.4s cubic-bezier(0.22, 1.2, 0.36, 1), top 0.4s cubic-bezier(0.22, 1.2, 0.36, 1)';
      ball.style.top = RESTING_TOP + 'px';
      shaft.style.height = SHAFT_HEIGHT + 'px';
      shaft.style.top = SHAFT_TOP + 'px';
      ball.style.boxShadow = '';
      setTimeout(() => { ball.style.transition = ''; shaft.style.transition = ''; }, 450);
      currentPull = 0;
    }

    function autoComplete() {
      isDragging = false;
      ball.style.transition = 'top 0.25s cubic-bezier(0.4, 0, 1, 1)';
      shaft.style.transition = 'height 0.25s cubic-bezier(0.4, 0, 1, 1), top 0.25s cubic-bezier(0.4, 0, 1, 1)';
      ball.style.top = (MAX_PULL + OVERSHOOT) + 'px';
      shaft.style.height = '0px';
      shaft.style.top = (SHAFT_TOP + MAX_PULL) + 'px';
      setTimeout(() => {
        ball.style.transition = 'top 0.5s cubic-bezier(0.22, 1.4, 0.36, 1)';
        shaft.style.transition = 'height 0.5s cubic-bezier(0.22, 1.4, 0.36, 1), top 0.5s cubic-bezier(0.22, 1.4, 0.36, 1)';
        ball.style.top = RESTING_TOP + 'px';
        shaft.style.height = SHAFT_HEIGHT + 'px';
        shaft.style.top = SHAFT_TOP + 'px';
        ball.style.boxShadow = '';
        setTimeout(() => { ball.style.transition = ''; shaft.style.transition = ''; }, 550);
      }, 300);
      spin();
    }

    function onStart(e) {
      if (STATE.spinning || STATE.speed !== 'manual') return;
      e.preventDefault();
      isDragging = true;
      startY = (e.touches ? e.touches[0].clientY : e.clientY) - currentPull;
      ball.style.transition = 'none';
      shaft.style.transition = 'none';
      assembly.style.cursor = 'grabbing';
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const pullAmount = clientY - startY;
      updateLever(pullAmount);
      if (currentPull / MAX_PULL >= TRIGGER_PERCENT) {
        autoComplete();
      }
    }

    function onEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      assembly.style.cursor = 'grab';
      if (currentPull / MAX_PULL < TRIGGER_PERCENT) {
        snapBack();
      }
    }

    ball.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    ball.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);

    assembly.addEventListener('click', (e) => {
      if (e.target === ball) return;
      if (!STATE.spinning && STATE.speed === 'manual') spin();
    });

    assembly.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && !STATE.spinning && STATE.speed === 'manual') {
        e.preventDefault();
        autoComplete();
      }
    });
  })();

  // Spacebar
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
      e.preventDefault();
      if (STATE.speed === 'manual') {
        const assembly = document.getElementById('lever-assembly');
        assembly.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
      }
    }
  });

  // Admin toggle
  document.getElementById('admin-toggle').addEventListener('click', () => {
    STATE.adminVisible = !STATE.adminVisible;
    document.getElementById('admin-panel').classList.toggle('hidden', !STATE.adminVisible);
  });

  // Sound toggle
  document.getElementById('sound-toggle').addEventListener('click', () => {
    STATE.soundEnabled = !STATE.soundEnabled;
    document.getElementById('sound-icon').textContent = STATE.soundEnabled ? '🔊' : '🔇';
    document.getElementById('sound-label').textContent = STATE.soundEnabled ? 'Sound On' : 'Sound Off';
    try { localStorage.setItem('slots_sound', STATE.soundEnabled ? '1' : '0'); } catch(e) {}
  });

  // Theme buttons
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.dataset.theme));
  });

  // Canvas resize
  window.addEventListener('resize', () => {
    const canvas = document.getElementById('coin-canvas');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  });
}

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
function init() {
  buildLeds();
  updateLedIdle();
  loadNames();

  // Restore saved settings
  try {
    const savedTheme = localStorage.getItem('slots_theme');
    if (savedTheme && ['dark','light','neon'].includes(savedTheme)) setTheme(savedTheme);
    const s = localStorage.getItem('slots_sound');
    if (s === '0') {
      STATE.soundEnabled = false;
      document.getElementById('sound-icon').textContent = '🔇';
      document.getElementById('sound-label').textContent = 'Sound Off';
    }
    const m = localStorage.getItem('slots_mode');
    if (m === 'creditstack') {
      // setMode will be called after bindEvents; store for later
      STATE.mode = 'creditstack';
    }
    const wf = localStorage.getItem('slots_winfloor');
    if (wf !== null) {
      STATE.winFloor = parseInt(wf);
      document.getElementById('win-floor-slider').value = STATE.winFloor;
    }
    const rw = localStorage.getItem('slots_removewins');
    if (rw === '0') {
      STATE.removeWinners = false;
      document.getElementById('remove-winners-toggle').checked = false;
    }
  } catch(e) {}

  applyUrlParams();
  bindEvents();

  // Apply restored mode after events are bound
  if (STATE.mode === 'creditstack') setMode('creditstack');

  renderNameList();
  updateNameCount();
  updateStats();
  updateMainDisplay();
  populateReels();
  setStatus('Ready — pull the lever!', false);
  setTimeout(() => { const inp = document.getElementById('name-input'); if (inp) inp.focus(); }, 100);

  const canvas = document.getElementById('coin-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}

document.addEventListener('DOMContentLoaded', init);

})();
</script>
