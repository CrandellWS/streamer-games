<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Machine — Streamer Games</title>
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg2: #14141f;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.5);
  --danger: #ff4466;
  --success: #44ff88;
  --panel-width: 360px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --chrome: linear-gradient(135deg, #c8c8d8 0%, #e8e8f0 30%, #a0a0b8 50%, #d0d0e0 70%, #f0f0f8 100%);
  --chrome-border: #8888aa;
  --reel-bg: #0a0a16;
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --bg2: #e8e8f0;
  --surface: #fff;
  --surface2: #f5f5fa;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-dim: #666680;
  --chrome: linear-gradient(135deg, #d8d8e8 0%, #f0f0f8 30%, #b0b0c8 50%, #e0e0f0 70%, #f8f8ff 100%);
  --chrome-border: #9090b0;
  --reel-bg: #1a1a2e;
}

[data-theme="neon"] {
  --bg: #0a0a0a;
  --bg2: #111;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #333;
  --text: #fff;
  --text-dim: #888;
  --accent: #00ffcc;
  --accent-glow: rgba(0,255,204,0.4);
  --gold: #ff00ff;
  --gold-glow: rgba(255,0,255,0.5);
  --chrome: linear-gradient(135deg, #1a2a2a 0%, #00ffcc22 30%, #0a1a1a 50%, #003322 70%, #00ffcc11 100%);
  --chrome-border: #00ffcc;
  --reel-bg: #050510;
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body.transparent-bg { background: transparent !important; }

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
}

#game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════════ */
#admin-panel {
  width: var(--panel-width);
  height: 100%;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  z-index: 100;
  flex-shrink: 0;
}

#admin-panel.hidden {
  transform: translateX(100%);
  opacity: 0;
  position: absolute;
  right: 0; top: 0;
  pointer-events: none;
}

#admin-toggle {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 200;
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
}
#admin-toggle:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.panel-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.panel-header p { font-size: 12px; color: var(--text-dim); }

.panel-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.panel-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.input-group { display: flex; gap: 8px; margin-bottom: 8px; }

input[type="text"], textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea {
  resize: vertical;
  min-height: 80px;
  font-size: 12px;
  line-height: 1.6;
}

.btn {
  padding: 10px 18px;
  min-height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { filter: brightness(1.15); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-2px); }
.btn-danger { color: var(--danger); border-color: rgba(255,68,102,0.3); }
.btn-danger:hover { background: rgba(255,68,102,0.1); border-color: var(--danger); }
.btn-gold {
  background: linear-gradient(135deg, #b8860b, var(--gold));
  border-color: var(--gold);
  color: #111;
  font-weight: 700;
  box-shadow: 0 4px 16px var(--gold-glow);
}
.btn-gold:hover { filter: brightness(1.1); box-shadow: 0 6px 24px var(--gold-glow); transform: translateY(-2px); }
.btn-sm { padding: 6px 12px; min-height: 36px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-group { display: flex; gap: 8px; }

/* PULL LEVER BUTTON */
#pull-btn {
  padding: 16px 24px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 14px;
  background: linear-gradient(135deg, #cc2200, #ff4422, #cc2200);
  border: 2px solid #ff6644;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 30px rgba(255,68,34,0.5);
  width: 100%;
  position: relative;
  overflow: hidden;
}
#pull-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
#pull-btn:hover::before { left: 100%; }
#pull-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
#pull-btn:active { transform: scale(0.98) translateY(0); }
#pull-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Names list */
.name-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.name-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  transition: all 0.15s;
}
.name-item:hover { border-color: var(--accent); }
.name-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.name-remove {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.name-remove:hover { color: var(--danger); background: rgba(255,68,102,0.1); }

.count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 0 6px;
}

/* Status bar */
#status-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 44px;
}
#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: background 0.3s;
}
#status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
#status-dot.win { background: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
#status-text { flex: 1; }

/* ═══════════════════════════════════════════════
   SLOT MACHINE CABINET
   ═══════════════════════════════════════════════ */
#slot-machine {
  position: relative;
  width: 520px;
  display: flex;
  flex-direction: column;
  align-items: center;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
  transition: transform 0.1s;
}

/* Cabinet body */
#cabinet {
  width: 100%;
  background: var(--chrome);
  border-radius: 32px 32px 24px 24px;
  padding: 20px 24px 28px;
  position: relative;
  border: 3px solid var(--chrome-border);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.4),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    0 8px 32px rgba(0,0,0,0.5);
}

/* Cabinet legs */
#cabinet::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 60px;
  right: 60px;
  height: 20px;
  background: var(--chrome);
  border-radius: 0 0 16px 16px;
  border: 3px solid var(--chrome-border);
  border-top: none;
  box-shadow: 0 8px 16px rgba(0,0,0,0.4);
}

/* ═══════════════════════════════════════════════
   TOP DISPLAY PANEL
   ═══════════════════════════════════════════════ */
#display-panel {
  width: 100%;
  background: #0a0a1a;
  border-radius: 16px;
  padding: 14px 20px;
  margin-bottom: 18px;
  border: 3px solid #222244;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 2px 8px rgba(0,0,0,0.8),
    0 0 20px rgba(124,92,252,0.2);
}

#display-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
}

#display-title {
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(180deg, #fff8c0, var(--gold), #c8980a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
  font-family: 'Georgia', serif;
  position: relative;
  z-index: 1;
}

#led-strip {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  position: relative;
  z-index: 1;
}

.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #330033;
  transition: background 0.15s, box-shadow 0.15s;
}
.led.on-1 { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow), 0 0 16px var(--gold-glow); }
.led.on-2 { background: #ff6600; box-shadow: 0 0 8px rgba(255,102,0,0.8); }
.led.on-3 { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

#win-display {
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  margin-top: 6px;
  min-height: 20px;
  position: relative;
  z-index: 1;
  text-shadow: 0 0 12px var(--gold-glow);
  opacity: 0;
  transition: opacity 0.3s;
}
#win-display.visible { opacity: 1; }

/* ═══════════════════════════════════════════════
   REEL SECTION
   ═══════════════════════════════════════════════ */
#reel-section {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  position: relative;
}

#reels-container {
  flex: 1;
  display: flex;
  gap: 10px;
  background: #050510;
  border-radius: 16px;
  padding: 12px;
  border: 4px solid #1a1a3a;
  box-shadow:
    inset 0 4px 12px rgba(0,0,0,0.9),
    inset 0 -2px 6px rgba(0,0,0,0.5);
  position: relative;
}

/* Payline overlay */
#reels-container::after {
  content: '';
  position: absolute;
  left: 8px; right: 8px;
  top: 50%;
  transform: translateY(-50%);
  height: 64px;
  border-top: 2px solid rgba(255,215,0,0.8);
  border-bottom: 2px solid rgba(255,215,0,0.8);
  pointer-events: none;
  z-index: 10;
  box-shadow:
    0 -1px 8px var(--gold-glow),
    0 1px 8px var(--gold-glow);
}

/* Payline left/right triangles */
#payline-left, #payline-right {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 11;
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
}
#payline-left {
  left: 2px;
  border-right: 14px solid var(--gold);
  filter: drop-shadow(0 0 4px var(--gold-glow));
}
#payline-right {
  right: 2px;
  border-left: 14px solid var(--gold);
  filter: drop-shadow(0 0 4px var(--gold-glow));
}

/* Individual reel window */
.reel-window {
  flex: 1;
  height: 200px;
  background: var(--reel-bg);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  border: 2px solid #0a0a20;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.8),
    inset 0 2px 4px rgba(0,0,0,0.9);
}

/* Top and bottom fade masks */
.reel-window::before, .reel-window::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  z-index: 5;
  pointer-events: none;
}
.reel-window::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(5,5,16,0.95), transparent);
}
.reel-window::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(5,5,16,0.95), transparent);
}

/* The scrolling strip */
.reel-strip {
  position: absolute;
  width: 100%;
  top: 0;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.reel-item {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 6px;
  flex-shrink: 0;
}

.reel-badge {
  width: 100%;
  padding: 6px 8px;
  border-radius: 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.3px;
  transition: none;
}

/* Motion blur during spin */
.reel-window.spinning .reel-strip {
  filter: blur(3px);
}
.reel-window.slowing .reel-strip {
  filter: blur(1px);
}
.reel-window.stopped .reel-strip {
  filter: none;
}

/* Win highlight on center item */
.reel-window.win-highlight {
  border-color: var(--gold);
  box-shadow:
    0 0 20px var(--gold-glow),
    0 0 40px var(--gold-glow),
    inset 0 0 20px rgba(255,215,0,0.1);
}

/* ═══════════════════════════════════════════════
   LEVER
   ═══════════════════════════════════════════════ */
#lever-assembly {
  width: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-left: 10px;
  position: relative;
  height: 200px;
  cursor: pointer;
}

#lever-shaft {
  width: 14px;
  height: 160px;
  background: linear-gradient(90deg, #666, #ccc, #888, #ddd, #666);
  border-radius: 7px;
  position: absolute;
  top: 20px;
  transform-origin: bottom center;
  transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 2px 0 8px rgba(0,0,0,0.5);
  z-index: 2;
}

#lever-ball {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6644, #cc2200, #880000);
  border: 2px solid #ff4422;
  box-shadow:
    0 4px 12px rgba(200,0,0,0.6),
    inset 0 -2px 4px rgba(0,0,0,0.4),
    inset 0 2px 4px rgba(255,100,68,0.6);
  position: absolute;
  top: 0;
  transform-origin: bottom center;
  transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
  z-index: 3;
}

#lever-base {
  width: 28px;
  height: 20px;
  background: linear-gradient(90deg, #555, #aaa, #777);
  border-radius: 6px 6px 0 0;
  position: absolute;
  bottom: 0;
  z-index: 1;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.lever-pulled #lever-shaft {
  transform: rotate(28deg);
}
.lever-pulled #lever-ball {
  transform: rotate(28deg) translateY(8px);
}

/* ═══════════════════════════════════════════════
   BOTTOM PANEL (credits, buttons)
   ═══════════════════════════════════════════════ */
#bottom-panel {
  width: calc(100% - 50px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
  padding: 14px 20px;
  background: #0a0a1a;
  border-radius: 12px;
  border: 2px solid #1a1a3a;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
}

.credits-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.credits-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.credits-value {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 10px var(--gold-glow);
  font-family: 'Georgia', monospace;
  letter-spacing: 2px;
  min-width: 60px;
  text-align: center;
}

/* ═══════════════════════════════════════════════
   JACKPOT OVERLAY
   ═══════════════════════════════════════════════ */
#jackpot-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.4s;
}
#jackpot-overlay.visible { opacity: 1; }

#jackpot-text {
  font-size: 56px;
  font-weight: 900;
  font-family: 'Georgia', serif;
  text-transform: uppercase;
  letter-spacing: 8px;
  background: linear-gradient(180deg, #fff8a0, var(--gold), #c87000);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 20px rgba(255,215,0,0.9));
  animation: jackpotBounce 0.5s ease infinite alternate;
  text-align: center;
}

#winner-name-display {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-top: 8px;
  text-shadow: 0 0 20px var(--gold);
  letter-spacing: 2px;
}

@keyframes jackpotBounce {
  from { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 4px 20px rgba(255,215,0,0.9)); }
  to   { transform: scale(1.06) rotate(1deg); filter: drop-shadow(0 4px 40px rgba(255,215,0,1)); }
}

/* ═══════════════════════════════════════════════
   COIN PARTICLE CANVAS
   ═══════════════════════════════════════════════ */
#coin-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 40;
}

/* ═══════════════════════════════════════════════
   LED FLASH ANIMATION
   ═══════════════════════════════════════════════ */
@keyframes ledFlash1 {
  0%,100% { background:#ffd700; box-shadow:0 0 8px var(--gold-glow),0 0 16px var(--gold-glow); }
  50%      { background:#330033; box-shadow:none; }
}
@keyframes ledFlash2 {

<script>
'use strict';
(function() {

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const STATE = {
  names: [],
  spinning: false,
  soundEnabled: true,
  totalSpins: 0,
  totalWins: 0,
  adminVisible: true,
  lastResult: null,
  audioCtx: null,
  ledInterval: null,
  coinAnimId: null,
  coins: [],
  spinTimeouts: [],
};

const REEL_COUNT = 3;
const ITEM_HEIGHT = 64;   // px per reel item
const VISIBLE_ITEMS = 3;  // items visible in window (window height = 200px ≈ 3.1 items)
const REEL_WINDOW_HEIGHT = 200;
const PAYLINE_CENTER = REEL_WINDOW_HEIGHT / 2; // 100px

// Reel badge color palettes
const BADGE_COLORS = [
  { bg: 'rgba(124,92,252,0.25)', border: 'rgba(124,92,252,0.6)', text: '#c8b0ff' },
  { bg: 'rgba(255,100,50,0.25)', border: 'rgba(255,100,50,0.6)', text: '#ffb090' },
  { bg: 'rgba(68,255,136,0.25)', border: 'rgba(68,255,136,0.6)', text: '#80ffa8' },
  { bg: 'rgba(255,215,0,0.25)',  border: 'rgba(255,215,0,0.6)',  text: '#ffe566' },
  { bg: 'rgba(0,200,255,0.25)',  border: 'rgba(0,200,255,0.6)',  text: '#80e8ff' },
  { bg: 'rgba(255,80,160,0.25)', border: 'rgba(255,80,160,0.6)', text: '#ffb0d8' },
  { bg: 'rgba(160,255,80,0.25)', border: 'rgba(160,255,80,0.6)', text: '#c8ffb0' },
  { bg: 'rgba(255,180,0,0.25)',  border: 'rgba(255,180,0,0.6)',  text: '#ffdf80' },
];

// Per-name stable color assignment
const nameColorMap = new Map();
let colorIdx = 0;

function getNameColor(name) {
  if (!nameColorMap.has(name)) {
    nameColorMap.set(name, BADGE_COLORS[colorIdx % BADGE_COLORS.length]);
    colorIdx++;
  }
  return nameColorMap.get(name);
}

/* ═══════════════════════════════════════════════
   AUDIO (Web Audio API)
   ═══════════════════════════════════════════════ */
function getAudioCtx() {
  if (!STATE.audioCtx) {
    STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return STATE.audioCtx;
}

function playSound(type) {
  if (!STATE.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    if (type === 'lever') {
      // Creaky lever pull — low oscillating noise burst
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.35, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        const creak = Math.sin(2 * Math.PI * (80 + t * 40) * t) * 0.5;
        const noise = (Math.random() * 2 - 1) * 0.15 * (1 - t * 2.5);
        data[i] = (creak + noise) * Math.max(0, 1 - t * 3);
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      src.connect(g); g.connect(ctx.destination);
      src.start(now);
    }

    if (type === 'spin') {
      // Mechanical hum — sawtooth wave slowly fading
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(160, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.8);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.8);
    }

    if (type === 'click') {
      // Sharp mechanical click — short noise burst + thump
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.3, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.1);
    }

    if (type === 'jackpot') {
      // Ascending arpeggio + siren wail
      const notes = [523, 659, 784, 1047, 1319];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        const t = now + i * 0.12;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.4);
      });

      // Siren
      const siren = ctx.createOscillator();
      siren.type = 'sawtooth';
      siren.frequency.setValueAtTime(400, now + 0.7);
      siren.frequency.linearRampToValueAtTime(800, now + 1.2);
      siren.frequency.linearRampToValueAtTime(400, now + 1.7);
      siren.frequency.linearRampToValueAtTime(800, now + 2.2);
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0.15, now + 0.7);
      sg.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
      siren.connect(sg); sg.connect(ctx.destination);
      siren.start(now + 0.7); siren.stop(now + 2.5);
    }

    if (type === 'coin') {
      // High ping for coins
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200 + Math.random() * 400, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.2);
    }
  } catch(e) { /* audio errors are non-fatal */ }
}

/* ═══════════════════════════════════════════════
   REEL CONSTRUCTION
   ═══════════════════════════════════════════════ */
function buildStrip(names) {
  // Repeat names ~25x to make a long scrollable strip
  const strip = [];
  const repeats = Math.max(25, Math.ceil(500 / Math.max(names.length, 1)));
  for (let r = 0; r < repeats; r++) {
    const shuffled = names.slice().sort(() => Math.random() - 0.5);
    strip.push(...shuffled);
  }
  return strip;
}

function createReelItem(name) {
  const div = document.createElement('div');
  div.className = 'reel-item';
  const badge = document.createElement('div');
  badge.className = 'reel-badge';
  const c = getNameColor(name);
  badge.style.background = c.bg;
  badge.style.border = `1px solid ${c.border}`;
  badge.style.color = c.text;
  badge.textContent = escapeHtml(name);
  div.appendChild(badge);
  return div;
}

function populateReels() {
  const names = STATE.names;
  const isEmpty = names.length === 0;
  document.getElementById('empty-state').classList.toggle('visible', isEmpty);

  for (let r = 0; r < REEL_COUNT; r++) {
    const strip = document.getElementById(`strip-${r}`);
    strip.innerHTML = '';

    if (isEmpty) continue;

    const items = buildStrip(names);
    items.forEach(name => {
      strip.appendChild(createReelItem(name));
    });

    // Position strip so center item is on payline
    // We want item at index (items.length/2 approx) centered
    const startIndex = Math.floor(items.length / 2);
    positionStripAtIndex(strip, startIndex);
    strip._items = items;
    strip._currentIndex = startIndex;
  }
}

function positionStripAtIndex(strip, idx) {
  // Center the item at idx on the payline (center of reel window)
  // top = -(idx * ITEM_HEIGHT) + (REEL_WINDOW_HEIGHT/2 - ITEM_HEIGHT/2)
  const offsetY = -(idx * ITEM_HEIGHT) + (PAYLINE_CENTER - ITEM_HEIGHT / 2);
  strip.style.transform = `translateY(${offsetY}px)`;
  strip._currentIndex = idx;
}

/* ═══════════════════════════════════════════════
   SPIN LOGIC
   ═══════════════════════════════════════════════ */
function spin(forceWin) {
  if (STATE.spinning) return;
  if (STATE.names.length < 1) {
    setStatus('Add names first!', false);
    return;
  }

  STATE.spinning = true;
  STATE.totalSpins++;
  updateStats();
  document.getElementById('pull-btn').disabled = true;
  document.getElementById('force-win-btn').disabled = true;
  clearWinState();

  // Lever animation
  const lever = document.getElementById('lever-assembly');
  lever.classList.add('lever-pulled');
  setTimeout(() => lever.classList.remove('lever-pulled'), 400);

  playSound('lever');
  setTimeout(() => playSound('spin'), 150);

  // Determine outcome BEFORE animating
  let results;
  if (forceWin) {
    // Pick a random name and put it in all 3 reels center
    const winner = STATE.names[Math.floor(Math.random() * STATE.names.length)];
    results = [winner, winner, winner];
  } else {
    results = Array.from({length: REEL_COUNT}, () =>
      STATE.names[Math.floor(Math.random() * STATE.names.length)]
    );
  }

  const isWin = results[0] === results[1] && results[1] === results[2];

  // Stop times per reel (ms after spin starts)
  const stopTimes = [1500, 2100, 2700];

  // Start spinning each reel
  for (let r = 0; r < REEL_COUNT; r++) {
    startReelSpin(r, results[r], stopTimes[r], r === REEL_COUNT - 1, isWin, results);
  }

  setStatus('Spinning...', true);
}

function startReelSpin(reelIdx, targetName, stopMs, isLast, isWin, allResults) {
  const window_ = document.getElementById(`reel-${reelIdx}`);
  const strip = document.getElementById(`strip-${reelIdx}`);
  if (!strip._items || strip._items.length === 0) return;

  window_.classList.remove('stopped', 'slowing');
  window_.classList.add('spinning');

  // Animate strip scrolling rapidly using requestAnimationFrame
  const startTime = performance.now();
  const spinDuration = stopMs - 300; // slow down 300ms before stop
  const slowDuration = 300;
  let startY = parseInt(strip.style.transform.replace(/[^-\d.]/g, '')) || 0;

  // Speed: pixels per ms during fast spin
  const fastSpeed = 1.4; // px per ms (roughly 2 items per ~90ms)

  let animId;
  let slowStartY;
  let slowing = false;

  function animate(now) {
    const elapsed = now - startTime;

    if (!slowing && elapsed >= spinDuration) {
      slowing = true;
      window_.classList.remove('spinning');
      window_.classList.add('slowing');
      playSound('spin');
      slowStartY = currentY;
    }

    if (!slowing) {
      // Fast scroll
      const currentY2 = startY - elapsed * fastSpeed;
      strip.style.transform = `translateY(${currentY2}px)`;
      currentY = currentY2;
      animId = requestAnimationFrame(animate);
    } else {
      // Decelerate to target
      const slowElapsed = now - (startTime + spinDuration);
      const progress = Math.min(slowElapsed / slowDuration, 1);
      const ease = 1 - Math.pow(1 - progress, 3); // cubic ease-out

      // Find where target name is on the strip
      const targetIdx = findBestLandingIndex(strip._items, targetName, slowStartY);
      const targetY = -(targetIdx * ITEM_HEIGHT) + (PAYLINE_CENTER - ITEM_HEIGHT / 2);

      const y = slowStartY + (targetY - slowStartY) * ease;
      strip.style.transform = `translateY(${y}px)`;

      if (progress < 1) {
        animId = requestAnimationFrame(animate);
      } else {
        // Snapped to position
        strip.style.transform = `translateY(${targetY}px)`;
        strip._currentIndex = targetIdx;
        window_.classList.remove('slowing');
        window_.classList.add('stopped');
        playSound('click');

        if (isLast) {
          finalizeSpin(isWin, allResults);
        }
      }
    }
  }

  let currentY = startY;
  animId = requestAnimationFrame(animate);
  STATE.spinTimeouts.push(animId);
}

function findBestLandingIndex(items, targetName, currentY) {
  // Find the current approximate center index
  const approxIdx = Math.round((-currentY + PAYLINE_CENTER - ITEM_HEIGHT / 2) / ITEM_HEIGHT);

  // Search forward from approxIdx to find next occurrence of targetName
  for (let offset = 0; offset < items.length; offset++) {
    const idx = (approxIdx + offset) % items.length;
    if (items[idx] === targetName) return idx;
  }
  // Fallback
  return items.indexOf(targetName) || 0;
}

function finalizeSpin(isWin, results) {
  STATE.spinning = false;
  document.getElementById('pull-btn').disabled = false;
  document.getElementById('force-win-btn').disabled = false;
  STATE.lastResult = results;

  if (isWin) {
    STATE.totalWins++;
    updateStats();
    triggerWin(results[0], results);
  } else {
    setStatus(`Result: ${results.join(', ')}`, false);
    // Emit outbound result
    emitMessage('slots:result', { symbols: results });
  }
}

/* ═══════════════════════════════════════════════
   WIN STATE
   ═══════════════════════════════════════════════ */
function triggerWin(winner, symbols) {
  // Highlight reels
  for (let r = 0; r < REEL_COUNT; r++) {
    document.getElementById(`reel-${r}`).classList.add('win-highlight');
  }

  // Win display in LED panel
  const wd = document.getElementById('win-display');
  wd.textContent = `🎉 ${escapeHtml(winner)} WINS! 🎉`;
  wd.classList.add('visible');

  // Jackpot overlay
  document.getElementById('jackpot-overlay').classList.add('visible');
  document.getElementById('winner-name-display').textContent = winner;

  // LED flash
  startLedFlash();

  // Coins
  startCoinShower();

  // Sound
  playSound('jackpot');

  // Status
  setStatus(`🏆 WINNER: ${winner}!`, false, true);

  // Emit outbound
  emitMessage('slots:winner', { winner, symbols });

  // Auto-clear win state after 6s
  setTimeout(() => clearWinState(), 6000);
}

function clearWinState() {
  for (let r = 0; r < REEL_COUNT; r++) {
    document.getElementById(`reel-${r}`).classList.remove('win-highlight');
  }
  document.getElementById('win-display').classList.remove('visible');
  document.getElementById('jackpot-overlay').classList.remove('visible');
  stopLedFlash();
  stopCoinShower();
  updateLedIdle();
}

/* ═══════════════════════════════════════════════
   LED ANIMATIONS
   ═══════════════════════════════════════════════ */
function buildLeds() {
  const strip = document.getElementById('led-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const led = document.createElement('div');
    led.className = 'led';
    strip.appendChild(led);
  }
}

function updateLedIdle() {
  const leds = document.querySelectorAll('.led');
  leds.forEach((led, i) => {
    led.className = 'led';
    const phase = i % 3;
    if (phase === 0) led.classList.add('on-1');
    else if (phase === 1) led.classList.add('on-2');
    else led.classList.add('on-3');
  });
}

function startLedFlash() {
  stopLedFlash();
  const leds = document.querySelectorAll('.led');
  leds.forEach((led, i) => {
    led.className = 'led';
    const phase = i % 3;
    if (phase === 0) led.classList.add('flashing-1');
    else if (phase === 1) led.classList.add('flashing-2');
    else led.classList.add('flashing-3');
  });
}

function stopLedFlash() {
  updateLedIdle();
}

/* ═══════════════════════════════════════════════
   COIN SHOWER
   ═══════════════════════════════════════════════ */
function startCoinShower() {
  stopCoinShower();
  const canvas = document.getElementById('coin-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  STATE.coins = [];

  function spawnCoin() {
    STATE.coins.push({
      x: Math.random() * canvas.width,
      y: -20,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      r: 8 + Math.random() * 10,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      gravity: 0.15 + Math.random() * 0.1,
      color: Math.random() < 0.7 ? '#ffd700' : '#ff6600',
      opacity: 1,
    });
    if (Math.random() < 0.3) playSound('coin');
  }

  let spawnInterval = setInterval(spawnCoin, 50);
  setTimeout(() => clearInterval(spawnInterval), 3000);
  let startTime = performance.now();

  function animate(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    STATE.coins = STATE.coins.filter(c => c.y < canvas.height + 40 && c.opacity > 0.05);

    STATE.coins.forEach(c => {
      c.x += c.vx;
      c.y += c.vy;
      c.vy += c.gravity;
      c.rot += c.rotSpeed;
      if (c.y > canvas.height * 0.7) c.opacity -= 0.015;

      ctx.save();
      ctx.globalAlpha = c.opacity;
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);

      // Draw coin as ellipse (3D perspective)
      const scaleX = Math.abs(Math.cos(c.rot)) * 0.7 + 0.3;
      ctx.scale(scaleX, 1);

      // Coin body
      ctx.beginPath();
      ctx.ellipse(0, 0, c.r, c.r * 0.85, 0, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(-c.r * 0.3, -c.r * 0.3, 0, 0, 0, c.r);
      grad.addColorStop(0, '#fff8a0');
      grad.addColorStop(0.4, c.color);
      grad.addColorStop(1, '#8b6914');
      ctx.fillStyle = grad;
      ctx.fill();

      // Coin edge highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Dollar sign or $ symbol
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.font = `bold ${Math.floor(c.r * 0.9)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 0);

      ctx.restore();
    });

    STATE.coinAnimId = requestAnimationFrame(animate);
  }

  STATE.coinAnimId = requestAnimationFrame(animate);
}

function stopCoinShower() {
  if (STATE.coinAnimId) {
    cancelAnimationFrame(STATE.coinAnimId);
    STATE.coinAnimId = null;
  }
  STATE.coins = [];
  const canvas = document.getElementById('coin-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ═══════════════════════════════════════════════
   NAMES MANAGEMENT
   ═══════════════════════════════════════════════ */
function addName(name) {
  const trimmed = name.trim();
  if (!trimmed || trimmed.length > 24) return false;
  // Allow duplicates — more times = higher chance
  STATE.names.push(trimmed);
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
  return true;
}

function removeName(index) {
  STATE.names.splice(index, 1);
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
}

function clearNames() {
  STATE.names = [];
  saveNames();
  renderNameList();
  populateReels();
  updateNameCount();
}

function renderNameList() {
  const list = document.getElementById('name-list');
  list.innerHTML = '';
  // Show unique names with counts
  const counts = {};
  STATE.names.forEach(n => { counts[n] = (counts[n] || 0) + 1; });
  const unique = Object.keys(counts);

  unique.forEach(name => {
    const item = document.createElement('div');
    item.className = 'name-item';
    const c = getNameColor(name);

    const dot = document.createElement('div');
    dot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${c.text};flex-shrink:0`;

    const text = document.createElement('div');
    text.className = 'name-item-text';
    text.textContent = name;
    if (counts[name] > 1) {
      const cnt = document.createElement('span');
      cnt.style.cssText = 'margin-left:4px;opacity:0.5;font-size:11px';
      cnt.textContent = `×${counts[name]}`;
      text.appendChild(cnt);
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'name-remove';
    removeBtn.textContent = '×';
    removeBtn.title = `Remove all "${name}"`;
    removeBtn.addEventListener('click', () => {
      // Remove ALL instances of this name
      STATE.names = STATE.names.filter(n => n !== name);
      saveNames();
      renderNameList();
      populateReels();
      updateNameCount();
    });

    item.appendChild(dot);
    item.appendChild(text);
    item.appendChild(removeBtn);
    list.appendChild(item);
  });
}

function updateNameCount() {
  const count = STATE.names.length;
  document.getElementById('name-count').textContent = count;
  document.getElementById('names-count-display').textContent = count;
}

function updateStats() {
  document.getElementById('spins-display').textContent = STATE.totalSpins;
  document.getElementById('wins-display').textContent = STATE.totalWins;
  const credits = Math.max(0, 99 - STATE.totalSpins + STATE.totalWins * 10);
  document.getElementById('credits-display').textContent = credits;
}

/* ═══════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════ */
function saveNames() {
  try { localStorage.setItem('slots_names', JSON.stringify(STATE.names)); } catch(e) {}
}

function loadNames() {
  try {
    const saved = localStorage.getItem('slots_names');
    if (saved) STATE.names = JSON.parse(saved);
  } catch(e) {}
}

/* ═══════════════════════════════════════════════
   STATUS
   ═══════════════════════════════════════════════ */
function setStatus(msg, active, win) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.classList.remove('active', 'win');
  if (win) dot.classList.add('win');
  else if (active) dot.classList.add('active');
}

/* ═══════════════════════════════════════════════
   POSTMESSAGE API
   ═══════════════════════════════════════════════ */
function emitMessage(type, data) {
  const msg = Object.assign({ type }, data || {});
  window.parent.postMessage(msg, '*');
  window.dispatchEvent(new MessageEvent('message', { data: msg }));
}

window.addEventListener('message', function(e) {
  const d = e.data;
  if (!d || typeof d.type !== 'string') return;

  switch(d.type) {
    case 'slots:add':
      if (d.name) addName(String(d.name).substring(0, 24));
      if (Array.isArray(d.names)) d.names.forEach(n => addName(String(n).substring(0, 24)));
      break;
    case 'slots:pull':
      spin(false);
      break;
    case 'slots:winner':
      // Force a specific winner
      if (d.name && STATE.names.includes(d.name)) {
        spin(true); // simplified — just force win
      }
      break;
    case 'slots:clear':
      clearNames();
      break;
    case 'slots:names':
      emitMessage('slots:names', { names: STATE.names.slice() });
      break;
  }
});

/* ═══════════════════════════════════════════════
   URL PARAMS
   ═══════════════════════════════════════════════ */
function applyUrlParams() {
  const p = new URLSearchParams(window.location.search);

  if (p.get('bg') === 'transparent') {
    document.body.classList.add('transparent-bg');
  }

  const theme = p.get('theme');
  if (theme && ['dark','light','neon'].includes(theme)) {
    setTheme(theme);
  }

  const admin = p.get('admin');
  if (admin === 'false') {
    STATE.adminVisible = false;
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('admin-toggle').style.display = 'none';
  }

  const names = p.get('names');
  if (names) {
    names.split(',').forEach(n => n.trim() && addName(n.trim().substring(0, 24)));
  }
}

/* ═══════════════════════════════════════════════
   THEME
   ═══════════════════════════════════════════════ */
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
  try { localStorage.setItem('slots_theme', theme); } catch(e) {}
}

/* ═══════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════ */
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════ */
function bindEvents() {
  // Add name
  document.getElementById('add-btn').addEventListener('click', () => {
    const inp = document.getElementById('name-input');
    if (addName(inp.value)) inp.value = '';
    inp.focus();
  });
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  // Bulk add
  document.getElementById('bulk-add-btn').addEventListener('click', () => {
    const ta = document.getElementById('bulk-input');
    const lines = ta.value.split('\n');
    let added = 0;
    lines.forEach(l => { if (addName(l)) added++; });
    if (added > 0) ta.value = '';
  });

  // Clear
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (STATE.names.length === 0 || confirm('Clear all names?')) clearNames();
  });

  // Pull lever button
  document.getElementById('pull-btn').addEventListener('click', () => spin(false));

  // Force win
  document.getElementById('force-win-btn').addEventListener('click', () => {
    if (STATE.names.length > 0) spin(true);
    else setStatus('Add names first!', false);
  });

  // Lever click
  document.getElementById('lever-assembly').addEventListener('click', () => spin(false));
  document.getElementById('lever-assembly').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); spin(false); }
  });

  // Spacebar
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
      e.preventDefault();
      spin(false);
    }
  });

  // Admin toggle
  document.getElementById('admin-toggle').addEventListener('click', () => {
    STATE.adminVisible = !STATE.adminVisible;
    document.getElementById('admin-panel').classList.toggle('hidden', !STATE.adminVisible);
  });

  // Sound toggle
  document.getElementById('sound-toggle').addEventListener('click', () => {
    STATE.soundEnabled = !STATE.soundEnabled;
    document.getElementById('sound-icon').textContent = STATE.soundEnabled ? '🔊' : '🔇';
    document.getElementById('sound-label').textContent = STATE.soundEnabled ? 'Sound On' : 'Sound Off';
    try { localStorage.setItem('slots_sound', STATE.soundEnabled ? '1' : '0'); } catch(e) {}
  });

  // Theme buttons
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.dataset.theme));
  });

  // Canvas resize
  window.addEventListener('resize', () => {
    const canvas = document.getElementById('coin-canvas');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  });
}

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
function init() {
  buildLeds();
  updateLedIdle();
  loadNames();

  // Load saved theme (URL param takes priority over localStorage)
  const _urlTheme = new URLSearchParams(location.search).get('theme');
  if (_urlTheme && ['dark','light','neon'].includes(_urlTheme)) {
    setTheme(_urlTheme);
  } else {
    try {
      const t = localStorage.getItem('slots_theme');
      if (t && ['dark','light','neon'].includes(t)) setTheme(t);
    } catch(e) {}
  }

  // Load sound pref
  try {
    const s = localStorage.getItem('slots_sound');
    if (s === '0') {
      STATE.soundEnabled = false;
      document.getElementById('sound-icon').textContent = '🔇';
      document.getElementById('sound-label').textContent = 'Sound Off';
    }
  } catch(e) {}

  applyUrlParams();
  renderNameList();
  updateNameCount();
  updateStats();
  populateReels();
  bindEvents();
  setStatus('Ready — pull the lever!', false);
  // Auto-focus name input for fast entry
  setTimeout(() => { const inp = document.getElementById('name-input'); if (inp) inp.focus(); }, 100);

  // Canvas sizing
  const canvas = document.getElementById('coin-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}

document.addEventListener('DOMContentLoaded', init);

})();
</script>
