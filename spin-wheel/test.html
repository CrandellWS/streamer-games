<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin Wheel — postMessage API Test</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e8e8f0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .test-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  button { padding: 8px 16px; border-radius: 8px; border: 1px solid #444; background: #2a2a4a; color: #e8e8f0; cursor: pointer; font-size: 13px; }
  button:hover { background: #3a3a5a; }
  .log { background: #0d0d14; border: 1px solid #333; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; }
  .pass { color: #44ff88; }
  .fail { color: #ff4466; }
  .info { color: #42a5f5; }
  iframe { border: 1px solid #444; border-radius: 8px; width: 100%; height: 500px; margin-top: 16px; }
  .section { margin-bottom: 24px; }
</style>
</head>
<body>
<h1>Spin Wheel — postMessage API Test Suite</h1>

<div class="section">
  <h3>Interactive Controls</h3>
  <div class="test-row">
    <button onclick="sendMsg({type:'spinwheel:add', name:'TestUser_' + Date.now()})">Add Random Name</button>
    <button onclick="sendMsg({type:'spinwheel:add', names:['Alice','Bob','Charlie','Diana','Eve']})">Add 5 Names</button>
    <button onclick="sendMsg({type:'spinwheel:spin'})">Spin</button>
    <button onclick="sendMsg({type:'spinwheel:names'})">Query Names</button>
    <button onclick="sendMsg({type:'spinwheel:remove', name:'Alice'})">Remove Alice</button>
    <button onclick="sendMsg({type:'spinwheel:clear'})">Clear All</button>
  </div>
  <div class="test-row">
    <button onclick="runAllTests()">Run All Tests</button>
  </div>
</div>

<div class="section">
  <h3>URL Parameter Tests</h3>
  <div class="test-row">
    <button onclick="testUrl('?names=Alpha,Beta,Gamma&admin=false')">?names=...&admin=false</button>
    <button onclick="testUrl('?bg=transparent&theme=neon')">?bg=transparent&theme=neon</button>
    <button onclick="testUrl('?theme=light')">?theme=light</button>
    <button onclick="testUrl('')">Default (no params)</button>
  </div>
</div>

<div class="log" id="log"></div>

<iframe id="wheel-frame" src="index.html"></iframe>

<script>
const logEl = document.getElementById('log');
const frame = document.getElementById('wheel-frame');

function log(msg, cls = 'info') {
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML += `<span class="${cls}">[${time}] ${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function sendMsg(data) {
  log(`→ Sending: ${JSON.stringify(data)}`);
  frame.contentWindow.postMessage(data, '*');
}

function testUrl(params) {
  log(`Loading: index.html${params}`, 'info');
  frame.src = 'index.html' + params;
}

// Listen for messages from the wheel
window.addEventListener('message', (event) => {
  if (event.data && event.data.type) {
    if (event.data.type === 'spinwheel:winner') {
      log(`🏆 WINNER: ${event.data.winner} (index: ${event.data.index})`, 'pass');
    } else if (event.data.type === 'spinwheel:names') {
      log(`Names response: [${event.data.names.join(', ')}]`, 'info');
    }
  }
});

// Automated test suite
async function runAllTests() {
  log('═══ Starting Automated Tests ═══', 'info');
  let pass = 0, fail = 0;

  // Helper to wait
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // Helper to wait for a specific message type
  function waitForMessage(type, timeout = 3000) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        window.removeEventListener('message', handler);
        reject(new Error(`Timeout waiting for ${type}`));
      }, timeout);
      function handler(event) {
        if (event.data && event.data.type === type) {
          clearTimeout(timer);
          window.removeEventListener('message', handler);
          resolve(event.data);
        }
      }
      window.addEventListener('message', handler);
    });
  }

  // Test 1: Clear
  try {
    sendMsg({type: 'spinwheel:clear'});
    await wait(200);
    const namesPromise = waitForMessage('spinwheel:names');
    sendMsg({type: 'spinwheel:names'});
    const result = await namesPromise;
    if (result.names.length === 0) {
      log('✓ Test 1 PASS: Clear works', 'pass'); pass++;
    } else {
      log('✗ Test 1 FAIL: Clear did not empty names', 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 1 FAIL: ${e.message}`, 'fail'); fail++;
  }

  // Test 2: Add single name
  try {
    sendMsg({type: 'spinwheel:add', name: 'TestUser1'});
    await wait(200);
    const namesPromise = waitForMessage('spinwheel:names');
    sendMsg({type: 'spinwheel:names'});
    const result = await namesPromise;
    if (result.names.includes('TestUser1')) {
      log('✓ Test 2 PASS: Add single name works', 'pass'); pass++;
    } else {
      log('✗ Test 2 FAIL: Name not found after add', 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 2 FAIL: ${e.message}`, 'fail'); fail++;
  }

  // Test 3: Add multiple names
  try {
    sendMsg({type: 'spinwheel:add', names: ['A', 'B', 'C']});
    await wait(200);
    const namesPromise = waitForMessage('spinwheel:names');
    sendMsg({type: 'spinwheel:names'});
    const result = await namesPromise;
    if (result.names.includes('A') && result.names.includes('B') && result.names.includes('C')) {
      log('✓ Test 3 PASS: Add multiple names works', 'pass'); pass++;
    } else {
      log('✗ Test 3 FAIL: Names not all found', 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 3 FAIL: ${e.message}`, 'fail'); fail++;
  }

  // Test 4: Remove name
  try {
    sendMsg({type: 'spinwheel:remove', name: 'B'});
    await wait(200);
    const namesPromise = waitForMessage('spinwheel:names');
    sendMsg({type: 'spinwheel:names'});
    const result = await namesPromise;
    if (!result.names.includes('B') && result.names.includes('A')) {
      log('✓ Test 4 PASS: Remove name works', 'pass'); pass++;
    } else {
      log('✗ Test 4 FAIL: Remove did not work correctly', 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 4 FAIL: ${e.message}`, 'fail'); fail++;
  }

  // Test 5: Spin (need at least 2 names)
  try {
    sendMsg({type: 'spinwheel:add', names: ['SpinTest1', 'SpinTest2', 'SpinTest3']});
    await wait(300);
    const winnerPromise = waitForMessage('spinwheel:winner', 12000);
    sendMsg({type: 'spinwheel:spin'});
    const result = await winnerPromise;
    if (result.winner && typeof result.index === 'number') {
      log(`✓ Test 5 PASS: Spin works — winner: ${result.winner}`, 'pass'); pass++;
    } else {
      log('✗ Test 5 FAIL: Invalid winner response', 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 5 FAIL: ${e.message}`, 'fail'); fail++;
  }

  // Test 6: Duplicate name prevention
  try {
    sendMsg({type: 'spinwheel:clear'});
    await wait(200);
    sendMsg({type: 'spinwheel:add', name: 'Dupe'});
    sendMsg({type: 'spinwheel:add', name: 'Dupe'});
    await wait(200);
    const namesPromise = waitForMessage('spinwheel:names');
    sendMsg({type: 'spinwheel:names'});
    const result = await namesPromise;
    const dupeCount = result.names.filter(n => n === 'Dupe').length;
    if (dupeCount === 1) {
      log('✓ Test 6 PASS: Duplicate prevention works', 'pass'); pass++;
    } else {
      log(`✗ Test 6 FAIL: Found ${dupeCount} copies of "Dupe"`, 'fail'); fail++;
    }
  } catch(e) {
    log(`✗ Test 6 FAIL: ${e.message}`, 'fail'); fail++;
  }

  log(`\n═══ Results: ${pass} passed, ${fail} failed ═══`, fail === 0 ? 'pass' : 'fail');
}

log('Test harness loaded. Click buttons above or "Run All Tests" to verify the postMessage API.', 'info');
</script>
</body>
</html>
