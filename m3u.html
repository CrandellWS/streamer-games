<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Playlist Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0d0d14; color: #e8e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
.container { max-width: 660px; width: 100%; }
h1 { font-size: 1.5rem; margin-bottom: 8px; background: linear-gradient(135deg, #7c5cfc, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p.sub { font-size: 0.85rem; color: #888; margin-bottom: 20px; line-height: 1.5; }
code { color: #7c5cfc; }
textarea { width: 100%; height: 140px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; padding: 12px; font-family: monospace; font-size: 0.85rem; resize: vertical; }
textarea:focus { outline: none; border-color: #7c5cfc; }
textarea::placeholder { color: #555; }
.btn { margin-top: 12px; padding: 12px 24px; min-height: 44px; background: linear-gradient(135deg, #7c5cfc, #5c3cdc); color: #fff; border: none; border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.15s cubic-bezier(0.4,0,0.2,1), box-shadow 0.15s; width: 100%; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124, 92, 252, 0.4); }
.btn:active { transform: translateY(0); }
.stats { margin-top: 12px; font-size: 0.85rem; color: #888; line-height: 1.6; }
.error { color: #ff4444; }
.warn { color: #ffaa00; }
.ok { color: #44ff88; }

/* Track list */
.tracks { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }

/* Ready track row */
.track { display: flex; align-items: center; gap: 8px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 12px; }
.track-num { color: #555; font-size: 0.75rem; font-weight: 700; width: 22px; text-align: center; flex-shrink: 0; }
.track-id { flex: 1; font-family: monospace; font-size: 0.78rem; color: #7c5cfc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sm-btn { background: none; border: 1px solid #2a2a4a; color: #e8e8f0; border-radius: 4px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; min-height: 32px; flex-shrink: 0; }
.sm-btn:hover { border-color: #7c5cfc; color: #7c5cfc; }
.sm-btn.playing { border-color: #44ff88; color: #44ff88; }
.sm-btn.dl:hover { border-color: #ffd700; color: #ffd700; }
.sm-btn.done { border-color: #44ff88; color: #44ff88; }
.sm-btn.busy { opacity: 0.5; pointer-events: none; }

/* Unresolved short URL row */
.track-unresolved { display: flex; flex-direction: column; gap: 6px; background: #1a1a2e; border: 1px solid #ffaa0044; border-radius: 6px; padding: 10px 12px; }
.track-unresolved .top { display: flex; align-items: center; gap: 8px; }
.track-unresolved .track-num { color: #ffaa00; }
.track-unresolved .hint { font-size: 0.75rem; color: #666; }
.track-unresolved a { color: #7c5cfc; text-decoration: none; font-family: monospace; font-size: 0.85rem; padding: 4px 10px; background: #22223a; border-radius: 4px; transition: background 0.15s; flex-shrink: 0; }
.track-unresolved a:hover { background: #2a2a5a; }
.track-unresolved .resolve-row { display: flex; gap: 8px; align-items: center; }
.track-unresolved input { flex: 1; background: #14141f; border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0; padding: 6px 10px; font-family: monospace; font-size: 0.8rem; }
.track-unresolved input:focus { outline: none; border-color: #7c5cfc; }

/* Action bar */
.action-bar { display: flex; gap: 8px; margin-top: 14px; }
.action-bar .btn { flex: 1; font-size: 0.9rem; padding: 10px 16px; }
.btn-dim { background: linear-gradient(135deg, #2a2a4a, #22223a) !important; }
.btn-dim:hover { box-shadow: 0 4px 20px rgba(255,255,255,0.05) !important; }

.now-playing { margin-top: 10px; font-size: 0.8rem; color: #44ff88; min-height: 1.2em; }
</style>
</head>
<body>
<div class="container">
  <h1>Suno Playlist Tool</h1>
  <p class="sub">Paste Suno song URLs, one per line.<br>
  Full URLs (<code>suno.com/song/...</code>) and bare UUIDs work instantly.<br>
  Short links (<code>suno.com/s/...</code>) will need one extra step.</p>
  <textarea id="urls" placeholder="https://suno.com/song/cd71ebad-7358-4c72-8e68-72c2f51879e5
cd71ebad-7358-4c72-8e68-72c2f51879e5
https://suno.com/s/4F2a6OBXdyOw6pcr"></textarea>
  <button class="btn" onclick="build()">Build Playlist</button>
  <div class="stats" id="stats"></div>
  <div class="tracks" id="tracks"></div>
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="btn" onclick="downloadM3U()">Download M3U</button>
    <button class="btn btn-dim" onclick="downloadAllMp3()">Download All MP3s</button>
  </div>
  <div class="now-playing" id="np"></div>
</div>
<script>
'use strict';

const UUID_RE = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
const SHORT_RE = /suno\.com\/s\/([A-Za-z0-9_-]+)/;
const CDN = 'https://cdn1.suno.ai/';

// Each entry: { id: uuid|null, shortCode: string|null, resolved: bool, idx: number }
let playlist = [];
let audio = null;
let playingIdx = -1;

function cdnUrl(id) { return CDN + id + '.mp3'; }

function build() {
  const raw = document.getElementById('urls').value;
  const lines = raw.split('\n').filter(l => l.trim());
  if (!lines.length) {
    document.getElementById('stats').innerHTML = '<span class="error">Paste some URLs first.</span>';
    return;
  }

  if (audio) { audio.pause(); audio = null; playingIdx = -1; }

  playlist = [];
  let bad = 0;

  lines.forEach(line => {
    const id = (line.trim().match(UUID_RE) || [])[0];
    if (id) {
      playlist.push({ id, shortCode: null, resolved: true });
      return;
    }
    const sm = line.trim().match(SHORT_RE);
    if (sm) {
      playlist.push({ id: null, shortCode: sm[1], resolved: false });
      return;
    }
    bad++;
  });

  if (playlist.length === 0) {
    document.getElementById('stats').innerHTML = '<span class="error">No valid Suno URLs found.</span>';
    return;
  }

  const ready = playlist.filter(t => t.resolved).length;
  const shorts = playlist.filter(t => !t.resolved).length;
  let msg = '';
  if (ready) msg += `<span class="ok">${ready} ready</span> `;
  if (shorts) msg += `<span class="warn">${shorts} need resolving</span> `;
  if (bad) msg += `<span class="error">${bad} skipped</span>`;
  document.getElementById('stats').innerHTML = msg;

  render();
}

function render() {
  const el = document.getElementById('tracks');
  el.innerHTML = '';

  playlist.forEach((t, i) => {
    if (t.resolved) {
      el.appendChild(makeReadyRow(t, i));
    } else {
      el.appendChild(makeUnresolvedRow(t, i));
    }
  });

  const hasReady = playlist.some(t => t.resolved);
  document.getElementById('actionBar').style.display = hasReady ? 'flex' : 'none';
}

function makeReadyRow(t, i) {
  const row = document.createElement('div');
  row.className = 'track';
  row.id = 'row-' + i;
  const shortId = t.id.slice(0, 8);
  row.innerHTML = `
    <span class="track-num">${i + 1}</span>
    <span class="track-id" title="${t.id}">${shortId}...</span>
    <button class="sm-btn" onclick="togglePlay(${i})" id="play-${i}">Play</button>
    <button class="sm-btn dl" onclick="dlMp3(${i})" id="dl-${i}">MP3</button>
  `;
  return row;
}

function makeUnresolvedRow(t, i) {
  const row = document.createElement('div');
  row.className = 'track-unresolved';
  row.id = 'row-' + i;
  row.innerHTML = `
    <div class="top">
      <span class="track-num">${i + 1}</span>
      <a href="https://suno.com/s/${t.shortCode}" target="_blank" rel="noopener">Open /s/${t.shortCode}</a>
      <span class="hint">click, then copy URL from address bar</span>
    </div>
    <div class="resolve-row">
      <input type="text" placeholder="Paste full song URL here" oninput="tryResolve(${i}, this)">
    </div>
  `;
  return row;
}

function tryResolve(i, input) {
  const val = input.value.trim();
  const id = (val.match(UUID_RE) || [])[0];
  if (!id) return;

  playlist[i].id = id;
  playlist[i].resolved = true;

  // Replace the unresolved row with a ready row in-place
  const old = document.getElementById('row-' + i);
  old.replaceWith(makeReadyRow(playlist[i], i));

  // Update stats
  const ready = playlist.filter(t => t.resolved).length;
  const shorts = playlist.filter(t => !t.resolved).length;
  let msg = `<span class="ok">${ready} ready</span> `;
  if (shorts) msg += `<span class="warn">${shorts} remaining</span>`;
  document.getElementById('stats').innerHTML = msg;
  document.getElementById('actionBar').style.display = 'flex';
}

function togglePlay(idx) {
  const np = document.getElementById('np');
  const btn = document.getElementById('play-' + idx);
  if (!btn) return;

  if (playingIdx === idx && audio && !audio.paused) {
    audio.pause(); audio = null; playingIdx = -1;
    btn.textContent = 'Play'; btn.classList.remove('playing');
    np.textContent = '';
    return;
  }

  // Stop current
  if (audio) {
    audio.pause();
    const ob = document.getElementById('play-' + playingIdx);
    if (ob) { ob.textContent = 'Play'; ob.classList.remove('playing'); }
  }

  audio = new Audio(cdnUrl(playlist[idx].id));
  playingIdx = idx;
  btn.textContent = 'Stop'; btn.classList.add('playing');
  np.textContent = 'Playing track ' + (idx + 1);

  audio.play().catch(() => { btn.textContent = 'Error'; np.textContent = ''; });

  audio.onended = () => {
    btn.textContent = 'Play'; btn.classList.remove('playing');
    playingIdx = -1;
    // Auto-advance to next resolved track
    for (let n = idx + 1; n < playlist.length; n++) {
      if (playlist[n].resolved) { togglePlay(n); return; }
    }
    np.textContent = '';
  };
}

async function dlMp3(idx) {
  const btn = document.getElementById('dl-' + idx);
  if (!btn) return;
  btn.textContent = '...'; btn.classList.add('busy');
  try {
    const resp = await fetch(cdnUrl(playlist[idx].id));
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'suno-' + playlist[idx].id.slice(0, 8) + '.mp3';
    a.click();
    URL.revokeObjectURL(a.href);
    btn.textContent = 'Done'; btn.classList.remove('busy'); btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'MP3'; btn.classList.remove('done'); }, 2000);
  } catch {
    btn.textContent = 'Fail'; btn.classList.remove('busy');
    setTimeout(() => { btn.textContent = 'MP3'; }, 2000);
  }
}

async function downloadAllMp3() {
  for (let i = 0; i < playlist.length; i++) {
    if (playlist[i].resolved) {
      await dlMp3(i);
      if (i < playlist.length - 1) await new Promise(r => setTimeout(r, 500));
    }
  }
}

function downloadM3U() {
  const ready = playlist.filter(t => t.resolved);
  if (!ready.length) return;
  let m3u = '#EXTM3U\n';
  ready.forEach((t, i) => {
    m3u += `#EXTINF:-1,Track ${i + 1}\n` + cdnUrl(t.id) + '\n';
  });
  const blob = new Blob([m3u], { type: 'audio/x-mpegurl' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'suno-playlist-' + ready.length + 'tracks.m3u';
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById('stats').innerHTML = `<span class="ok">M3U downloaded (${ready.length} tracks)</span>`;
}
</script>
</body>
</html>
