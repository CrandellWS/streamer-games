<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Playlist Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0d0d14; color: #e8e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
.container { max-width: 660px; width: 100%; }
h1 { font-size: 1.5rem; margin-bottom: 8px; background: linear-gradient(135deg, #7c5cfc, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p.sub { font-size: 0.85rem; color: #888; margin-bottom: 20px; line-height: 1.5; }
code { color: #7c5cfc; }

/* Input bar */
.input-bar { display: flex; gap: 8px; }
.input-bar input { flex: 1; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; padding: 10px 14px; font-family: monospace; font-size: 0.85rem; }
.input-bar input:focus { outline: none; border-color: #7c5cfc; }
.input-bar input::placeholder { color: #555; }
.add-btn { background: linear-gradient(135deg, #7c5cfc, #5c3cdc); color: #fff; border: none; border-radius: 6px; padding: 10px 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; min-height: 44px; transition: transform 0.15s cubic-bezier(0.4,0,0.2,1), box-shadow 0.15s; flex-shrink: 0; }
.add-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124, 92, 252, 0.4); }
.add-btn:active { transform: translateY(0); }

.msg { margin-top: 8px; font-size: 0.8rem; min-height: 1.2em; }

/* Track list */
.tracks { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }

/* Ready track */
.track { display: flex; align-items: center; gap: 8px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 10px; }
.t-num { color: #555; font-size: 0.75rem; font-weight: 700; width: 20px; text-align: center; flex-shrink: 0; }
.t-id { flex: 1; font-family: monospace; font-size: 0.78rem; color: #7c5cfc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb { background: none; border: 1px solid #2a2a4a; color: #e8e8f0; border-radius: 4px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; min-height: 32px; flex-shrink: 0; }
.sb:hover { border-color: #7c5cfc; color: #7c5cfc; }
.sb.playing { border-color: #44ff88; color: #44ff88; }
.sb.dl:hover { border-color: #ffd700; color: #ffd700; }
.sb.done { border-color: #44ff88; color: #44ff88; }
.sb.busy { opacity: 0.5; pointer-events: none; }
.sb.rm { font-size: 0.9rem; padding: 4px 8px; }
.sb.rm:hover { border-color: #ff4444; color: #ff4444; }

/* Unresolved short URL */
.track-short { display: flex; flex-direction: column; gap: 6px; background: #1a1a2e; border: 1px solid #ffaa0044; border-radius: 6px; padding: 10px; }
.track-short .row1 { display: flex; align-items: center; gap: 8px; }
.track-short .hint { font-size: 0.75rem; color: #666; flex: 1; }
.track-short a { color: #7c5cfc; text-decoration: none; font-family: monospace; font-size: 0.85rem; padding: 4px 10px; background: #22223a; border-radius: 4px; transition: background 0.15s; flex-shrink: 0; }
.track-short a:hover { background: #2a2a5a; }
.track-short .row2 { display: flex; gap: 8px; align-items: center; }
.track-short input { flex: 1; background: #14141f; border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0; padding: 6px 10px; font-family: monospace; font-size: 0.8rem; }
.track-short input:focus { outline: none; border-color: #7c5cfc; }

/* Bottom bar */
.bottom { display: flex; gap: 8px; margin-top: 14px; display: none; }
.bottom .btn { flex: 1; padding: 10px 16px; min-height: 44px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: transform 0.15s cubic-bezier(0.4,0,0.2,1), box-shadow 0.15s; }
.bottom .btn:hover { transform: translateY(-2px); }
.bottom .btn:active { transform: translateY(0); }
.btn-m3u { background: linear-gradient(135deg, #7c5cfc, #5c3cdc); color: #fff; }
.btn-m3u:hover { box-shadow: 0 4px 20px rgba(124, 92, 252, 0.4); }
.btn-all { background: #22223a; color: #e8e8f0; }
.btn-all:hover { box-shadow: 0 4px 20px rgba(255,255,255,0.05); }

.np { margin-top: 10px; font-size: 0.8rem; color: #44ff88; min-height: 1.2em; }
</style>
</head>
<body>
<div class="container">
  <h1>Suno Playlist Tool</h1>
  <p class="sub">Paste a Suno URL and hit Add. Builds your playlist one song at a time.</p>
  <div class="input-bar">
    <input type="text" id="inp" placeholder="Paste a Suno URL or UUID..." autofocus>
    <button class="add-btn" onclick="addSong()">Add</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="tracks" id="tracks"></div>
  <div class="bottom" id="bottom">
    <button class="btn btn-m3u" onclick="playAll()">Play All</button>
    <button class="btn btn-all" onclick="dlM3U()">Download M3U</button>
    <button class="btn btn-all" onclick="dlAll()">Download All MP3s</button>
  </div>
  <div class="np" id="np"></div>
</div>
<script>
'use strict';

const UUID_RE = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
const SHORT_RE = /suno\.com\/s\/([A-Za-z0-9_-]+)/;
const CDN = 'https://cdn1.suno.ai/';

let tracks = []; // { id, shortCode, resolved }
let audio = null;
let playIdx = -1;

function cdnUrl(id) { return CDN + id + '.mp3'; }

const inp = document.getElementById('inp');
inp.addEventListener('keydown', e => { if (e.key === 'Enter') addSong(); });
inp.addEventListener('paste', e => {
  // If pasting multiple lines, intercept and batch-add
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (text.includes('\n')) {
    e.preventDefault();
    text.split('\n').filter(l => l.trim()).forEach(line => {
      inp.value = line;
      addSong();
    });
  }
});

function addSong() {
  const inp = document.getElementById('inp');
  const val = inp.value.trim();
  if (!val) return;

  const id = (val.match(UUID_RE) || [])[0];
  const sm = (val.match(SHORT_RE) || [])[1];

  if (id) {
    tracks.push({ id, shortCode: null, resolved: true });
    inp.value = '';
    msg('');
    render();
  } else if (sm) {
    tracks.push({ id: null, shortCode: sm, resolved: false });
    inp.value = '';
    msg('<span class="warn">Short URL added — click the link to get the full URL</span>');
    render();
  } else {
    msg('<span class="error">Not a valid Suno URL or UUID</span>');
  }

  inp.focus();
}

function msg(html) { document.getElementById('msg').innerHTML = html; }

function remove(i) {
  if (playIdx === i && audio) { audio.pause(); audio = null; playIdx = -1; document.getElementById('np').textContent = ''; }
  if (playIdx > i) playIdx--;
  tracks.splice(i, 1);
  render();
}

function resolve(i, input) {
  const id = (input.value.trim().match(UUID_RE) || [])[0];
  if (!id) return;
  tracks[i].id = id;
  tracks[i].resolved = true;
  render();
}

function render() {
  const el = document.getElementById('tracks');
  el.innerHTML = '';

  tracks.forEach((t, i) => {
    if (t.resolved) {
      const row = document.createElement('div');
      row.className = 'track';
      row.innerHTML = `
        <span class="t-num">${i + 1}</span>
        <span class="t-id" title="${t.id}">${t.id.slice(0, 8)}...</span>
        <button class="sb" id="p${i}" onclick="play(${i})">Play</button>
        <button class="sb dl" id="d${i}" onclick="dl(${i})">MP3</button>
        <button class="sb rm" onclick="remove(${i})">&#128465;</button>
      `;
      el.appendChild(row);
    } else {
      const row = document.createElement('div');
      row.className = 'track-short';
      row.innerHTML = `
        <div class="row1">
          <span class="t-num">${i + 1}</span>
          <a href="https://suno.com/s/${t.shortCode}" target="_blank">/s/${t.shortCode}</a>
          <span class="hint">click link, copy address bar URL</span>
          <button class="sb rm" onclick="remove(${i})">&#128465;</button>
        </div>
        <div class="row2">
          <input type="text" placeholder="Paste full song URL here" onpaste="setTimeout(()=>resolve(${i},this),0)" oninput="resolve(${i},this)">
        </div>
      `;
      el.appendChild(row);
    }
  });

  // Update playing state
  if (playIdx >= 0) {
    const pb = document.getElementById('p' + playIdx);
    if (pb) { pb.textContent = 'Stop'; pb.classList.add('playing'); }
  }

  document.getElementById('bottom').style.display = tracks.some(t => t.resolved) ? 'flex' : 'none';
}

function play(i) {
  const np = document.getElementById('np');

  if (playIdx === i && audio && !audio.paused) {
    audio.pause(); audio = null; playIdx = -1;
    const b = document.getElementById('p' + i);
    if (b) { b.textContent = 'Play'; b.classList.remove('playing'); }
    np.textContent = '';
    return;
  }

  if (audio) {
    audio.pause();
    const ob = document.getElementById('p' + playIdx);
    if (ob) { ob.textContent = 'Play'; ob.classList.remove('playing'); }
  }

  audio = new Audio(cdnUrl(tracks[i].id));
  playIdx = i;
  const b = document.getElementById('p' + i);
  if (b) { b.textContent = 'Stop'; b.classList.add('playing'); }
  np.textContent = 'Playing track ' + (i + 1);

  audio.play().catch(() => { if (b) b.textContent = 'Error'; np.textContent = ''; });

  audio.onended = () => {
    if (b) { b.textContent = 'Play'; b.classList.remove('playing'); }
    playIdx = -1;
    for (let n = i + 1; n < tracks.length; n++) {
      if (tracks[n].resolved) { play(n); return; }
    }
    np.textContent = '';
  };
}

function playAll() {
  for (let i = 0; i < tracks.length; i++) {
    if (tracks[i].resolved) { play(i); return; }
  }
}

async function dl(i) {
  const b = document.getElementById('d' + i);
  if (!b) return;
  b.textContent = '...'; b.classList.add('busy');
  try {
    const r = await fetch(cdnUrl(tracks[i].id));
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'suno-' + tracks[i].id.slice(0, 8) + '.mp3';
    a.click();
    URL.revokeObjectURL(a.href);
    b.textContent = 'Done'; b.classList.remove('busy'); b.classList.add('done');
    setTimeout(() => { b.textContent = 'MP3'; b.classList.remove('done'); }, 2000);
  } catch {
    b.textContent = 'Fail'; b.classList.remove('busy');
    setTimeout(() => { b.textContent = 'MP3'; }, 2000);
  }
}

async function dlAll() {
  for (let i = 0; i < tracks.length; i++) {
    if (tracks[i].resolved) {
      await dl(i);
      if (i < tracks.length - 1) await new Promise(r => setTimeout(r, 500));
    }
  }
}

function dlM3U() {
  const ready = tracks.filter(t => t.resolved);
  if (!ready.length) return;
  let m3u = '#EXTM3U\n';
  ready.forEach((t, i) => { m3u += `#EXTINF:-1,Track ${i + 1}\n` + cdnUrl(t.id) + '\n'; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([m3u], { type: 'audio/x-mpegurl' }));
  a.download = 'suno-playlist-' + ready.length + 'tracks.m3u';
  a.click();
}
</script>
</body>
</html>
